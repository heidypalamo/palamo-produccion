  const desc=reg=>{if(reg.etapa!=="extrusion")return;[["ldpe",reg.ldpe],["mlldpe",reg.mlldpe]].forEach(([id,val])=>{const c=Number(val);if(!c)return;const m=mat.find(x=>x.id===id);if(!m)return;setMat(p=>p.map(x=>x.id===id?{...x,stockActual:Math.max(0,x.stockActual-c)}:x));setMovs(p=>[{id:Date.now()+Math.random(),tipo:"descuento",materialId:id,materialNombre:m.nombre,cantidad:c,unidad:m.unidad,maquina:reg.maquina,fecha:reg.fecha,supervisor:reg.supervisorNombre,notas:`Prod: ${reg.producto}`},...p]);});};
  const save=()=>{const r={...form,id:Date.now(),supervisorNombre:sup.nombre,supervisorCodigo:sup.codigo};setRegs(p=>[r,...p]);desc(r);setSaved(true);setTimeout(()=>setSaved(false),2000);setForm({...F0,etapa:form.etapa,maquina:MAQUINAS[form.etapa][0]});};

function Dashboard({regs,mat,setVista}){

  const tM=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.mlldpe)||0),0);
  const tP=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||0),0);
  const tD=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.desperdicio)||0),0);
  const tF=regs.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const tR=regs.filter(r=>r.etapa==="reciclaje").reduce((s,r)=>s+(Number(r.materialRecuperado)||0),0);

  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo);
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><h2 style={{color:B.textDark,fontSize:22,fontWeight:800,margin:"0 0 2px"}}>Dashboard</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Resumen de producción</p></div>{alts.length>0&&<div style={{background:`${B.red}12`,border:`1.5px solid ${B.red}44`,borderRadius:12,padding:"12px 16px",display:"flex",gap:10,alignItems:"center",cursor:"pointer"}} onClick={()=>setVista("inventario")}><span style={{fontSize:20}}>🚨</span><div style={{flex:1}}><div style={{color:B.red,fontWeight:700,fontSize:14}}>Stock Bajo</div><div style={{color:B.textMid,fontSize:13}}>{alts.map(a=>a.nombre).join(", ")}</div></div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>}<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Stat label="LDPE" value={tL.toFixed(0)} unit="lbs" color={B.teal} sub={`Stock: ${mat.find(m=>m.id==="ldpe")?.stockActual.toFixed(0)} lbs`}/><Stat label="MLLDPE" value={tM.toFixed(0)} unit="lbs" color={B.navy} sub={`Stock: ${mat.find(m=>m.id==="mlldpe")?.stockActual.toFixed(0)} lbs`}/><Stat label="Película" value={tP.toFixed(0)} unit="lbs" color={B.green}/><Stat label="Desperdicio" value={tD.toFixed(0)} unit="lbs" color={B.red}/><Stat label="Fundas" value={tF.toLocaleString()} unit="uds" color={B.tealDark}/><Stat label="Recuperado" value={tR.toFixed(0)} unit="lbs" color="#6B7280"/></div>{yld&&<Card accent={B.green} ch={<><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Eficiencia de Extrusión</div><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{flex:1,height:10,background:B.bg,borderRadius:5,overflow:"hidden"}}><div style={{width:`${yld}%`,height:"100%",background:`linear-gradient(90deg,${B.teal},${B.green})`,borderRadius:5}}/></div><span style={{color:B.green,fontWeight:800,fontSize:20}}>{yld}%</span></div></>}/>}<Card ch={<><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Flujo de Producción</div><div style={{display:"flex",overflowX:"auto",gap:0}}>{ETAPAS.map((e,i)=>{const n=regs.filter(r=>r.etapa===e).length,c=CE[e];return(<div key={e} style={{display:"flex",alignItems:"center",flexShrink:0}}><div style={{background:B.bg,border:`1.5px solid ${c}44`,borderRadius:12,padding:"12px 10px",textAlign:"center",minWidth:72}}><div style={{fontSize:20}}>{ICONOS[e]}</div><div style={{color:c,fontSize:9,fontWeight:700,textTransform:"uppercase",margin:"3px 0"}}>{ETIQUETAS[e]}</div><div style={{color:B.textDark,fontWeight:800,fontSize:20}}>{n}</div></div>{i<ETAPAS.length-1&&<div style={{color:B.border,fontSize:18,padding:"0 3px"}}>›</div>}</div>);})}</div></>}/><Card ch={<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Inventario</div><button onClick={()=>setVista("inventario")} style={{background:"none",border:`1px solid ${B.border}`,color:B.teal,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Ver →</button></div>{mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green;return(<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${B.border}`}}><span style={{color:B.textDark,fontSize:14,fontWeight:600}}>{m.nombre}</span><div style={{display:"flex",alignItems:"center",gap:8}}>{(bj||cr)&&<span>{cr?"🚨":"⚠️"}</span>}<span style={{color:bc,fontWeight:800,fontSize:15}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div></div>);})}</>}/>{regs.length===0&&<Card style={{textAlign:"center",padding:40,border:`1.5px dashed ${B.border}`}} ch={<><div style={{fontSize:40,marginBottom:10}}>📋</div><div style={{color:B.textMid,fontSize:15,fontWeight:700}}>Sin registros aún</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca <strong>Registrar</strong> para agregar el primer turno</div></>}/> }</div>);
}

function Maquinas({regs}){
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Máquinas</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Actividad por máquina</p></div>{[{label:"Extrusoras",mqs:MAQUINAS.extrusion,c:CE.extrusion,i:"⚙️"},{label:"Impresoras",mqs:MAQUINAS.impresion,c:CE.impresion,i:"🖨️"},{label:"Slitters",mqs:MAQUINAS.corte_rollo,c:CE.corte_rollo,i:"✂️"},{label:"Cortadoras",mqs:MAQUINAS.cortadora,c:CE.cortadora,i:"🛠️"},{label:"Reciclaje",mqs:MAQUINAS.reciclaje,c:CE.reciclaje,i:"♻️"}].map(g=>(<Card key={g.label} ch={<><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}><span style={{fontSize:18}}>{g.i}</span><span style={{color:B.textDark,fontSize:15,fontWeight:700}}>{g.label}</span></div><div style={{display:"flex",flexDirection:"column",gap:8}}>{g.mqs.map(m=>{const n=regs.filter(r=>r.maquina===m).length,mx=Math.max(...g.mqs.map(mm=>regs.filter(r=>r.maquina===mm).length),1);return(<div key={m} style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:g.c,fontWeight:800,fontSize:13,width:50,flexShrink:0}}>{m}</span><div style={{flex:1,height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:`${(n/mx)*100}%`,height:"100%",background:g.c,borderRadius:4}}/></div><span style={{color:B.textDark,fontWeight:700,fontSize:14,width:28,textAlign:"right",flexShrink:0}}>{n}</span>{n===0&&<span style={{color:B.textLight,fontSize:10,fontWeight:600}}>IDLE</span>}</div>);})}</div></>}/>))}</div>);
}

function App(){
  const [sup,setSup]=useState(null);
  const [regs,setRegs]=useState([]);
  const [mat,setMat]=useState(MATERIALES_INIT);
  const [movs,setMovs]=useState([]);
  const [vista,setVista]=useState("dashboard");
  if(!sup)return <Login onLogin={setSup}/>;
  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo).length;
  const NAV=[{id:"dashboard",icon:"📊",label:"Inicio"},{id:"registro",icon:"➕",label:"Registrar"},{id:"inventario",icon:"📦",label:"Inventario",badge:alts},{id:"maquinas",icon:"⚙️",label:"Máquinas"}];
  return(<div style={{minHeight:"100dvh",background:B.bg,paddingBottom:80}}>
    <div style={{background:`linear-gradient(135deg,${B.navyDeep},${B.tealDark})`,padding:"env(safe-area-inset-top,0px) 16px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><Logo s={30}/><div><div style={{color:"#fff",fontSize:15,fontWeight:800,lineHeight:1.1}}><span style={{opacity:.5,fontWeight:300}}>p</span>alamo</div><div style={{color:B.tealLight,fontSize:9,fontWeight:700,letterSpacing:1.5}}>PRODUCCIÓN</div></div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{textAlign:"right"}}><div style={{color:"#fff",fontSize:13,fontWeight:700,lineHeight:1.1}}>{sup.nombre.split(" ")[0]}</div><div style={{color:B.tealLight,fontSize:10,fontWeight:600}}>{sup.codigo}</div></div><button onClick={()=>setSup(null)} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"7px 10px",color:"rgba(255,255,255,.8)",fontSize:12,fontWeight:700,cursor:"pointer"}}>Salir</button></div>
      </div>
    </div>
    <div style={{padding:"16px 16px 0"}}>
      {vista==="dashboard"&&<Dashboard regs={regs} mat={mat} setVista={setVista}/>}
      {vista==="registro"&&<Registro sup={sup} regs={regs} setRegs={setRegs} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs}/>}
      {vista==="inventario"&&<Inventario mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} sup={sup}/>}
      {vista==="maquinas"&&<Maquinas regs={regs}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:`1px solid ${B.border}`,paddingBottom:"env(safe-area-inset-bottom,0px)",boxShadow:"0 -2px 16px rgba(0,0,0,.08)"}}>
      <div style={{display:"grid",gridTemplateColumns:`repeat(${NAV.length},1fr)`}}>
        {NAV.map(n=>(<button key={n.id} onClick={()=>setVista(n.id)} style={{background:"none",border:"none",padding:"10px 4px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",position:"relative"}}><span style={{fontSize:22,lineHeight:1}}>{n.icon}</span><span style={{fontSize:10,fontWeight:700,color:vista===n.id?B.teal:B.textLight}}>{n.label}</span>{vista===n.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:28,height:3,borderRadius:2,background:B.teal}}/>}{n.badge>0&&<div style={{position:"absolute",top:6,right:"calc(50% - 18px)",background:B.red,color:"#fff",borderRadius:10,width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{n.badge}</div>}</button>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
