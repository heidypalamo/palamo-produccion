const SH={"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY};
async function dbSave(r){try{await fetch(SUPA_URL+"/rest/v1/registros",{method:"POST",headers:Object.assign({},SH,{"Prefer":"return=minimal"}),body:JSON.stringify({id:String(r.id),etapa:r.etapa,fecha:r.fecha,maquina:r.maquina,producto:r.producto||null,cliente:r.cliente||null,supervisor_codigo:r.supervisorCodigo,supervisor_nombre:r.supervisorNombre,ldpe:r.ldpe?Number(r.ldpe):null,mlldpe:r.mlldpe?Number(r.mlldpe):null,pelicula:r.pelicula?Number(r.pelicula):null,desperdicio:r.desperdicio?Number(r.desperdicio):null,rollos_producidos:r.rollosProducidos?Number(r.rollosProducidos):null,lbs_impresion:r.lbsImpresion?Number(r.lbsImpresion):null,desperdicio_impresion:r.desperdicioImpresion?Number(r.desperdicioImpresion):null,lbs_corte_rollo:r.lbsCorteRollo?Number(r.lbsCorteRollo):null,desperdicio_corte_rollo:r.desperdicioCorteRollo?Number(r.desperdicioCorteRollo):null,ancho_rollo:r.anchoRollo?Number(r.anchoRollo):null,lbs_cortadora:r.lbsCortadora?Number(r.lbsCortadora):null,bolsas_producidas:r.bolsasProducidas?Number(r.bolsasProducidas):null,desperdicio_corte:r.desperdicioCorte?Number(r.desperdicioCorte):null,desperdicio_reciclado:r.desperdicioReciclado?Number(r.desperdicioReciclado):null,material_recuperado:r.materialRecuperado?Number(r.materialRecuperado):null,notas:r.notas||null})})}catch(e){console.error("dbSave",e);}}
async function dbLoad(){try{const r=await fetch(SUPA_URL+"/rest/v1/registros?order=created_at.desc&limit=500",{headers:SH});const rows=await r.json();return Array.isArray(rows)?rows.map(x=>({id:x.id,etapa:x.etapa,fecha:x.fecha,maquina:x.maquina,producto:x.producto,cliente:x.cliente,supervisorCodigo:x.supervisor_codigo,supervisorNombre:x.supervisor_nombre,ldpe:x.ldpe,mlldpe:x.mlldpe,pelicula:x.pelicula,desperdicio:x.desperdicio,rollosProducidos:x.rollos_producidos,lbsImpresion:x.lbs_impresion,desperdicioImpresion:x.desperdicio_impresion,lbsCorteRollo:x.lbs_corte_rollo,desperdicioCorteRollo:x.desperdicio_corte_rollo,anchoRollo:x.ancho_rollo,lbsCortadora:x.lbs_cortadora,bolsasProducidas:x.bolsas_producidas,desperdicioCorte:x.desperdicio_corte,desperdicioReciclado:x.desperdicio_reciclado,materialRecuperado:x.material_recuperado,notas:x.notas})):[];}catch(e){console.error("dbLoad",e);return[];}}
async function dbDelete(id){try{await fetch(SUPA_URL+"/rest/v1/registros?id=eq."+id,{method:"DELETE",headers:SH});}catch(e){console.error("dbDelete",e);}}
async function dbSaveOrder(o){try{const payload={id:String(o.id),cliente:o.cliente,fecha_envio:o.fechaEnvio,puerto:o.puerto,notas:o.notas,items:JSON.stringify(o.items),etapa:o.etapa,creado_por:o.creadoPor,creado_en:o.creadoEn};await fetch(SUPA_URL+"/rest/v1/ordenes",{method:"POST",headers:Object.assign({},SH,{"Prefer":"return=minimal"}),body:JSON.stringify(payload)});}catch(e){console.error("dbSaveOrder",e);}}
async function dbLoadOrders(){try{const r=await fetch(SUPA_URL+"/rest/v1/ordenes?order=created_at.desc&limit=200",{headers:SH});const rows=await r.json();return Array.isArray(rows)?rows.map(x=>({id:x.id,cliente:x.cliente,fechaEnvio:x.fecha_envio,puerto:x.puerto,notas:x.notas,items:typeof x.items==="string"?JSON.parse(x.items):x.items,etapa:x.etapa,creadoPor:x.creado_por,creadoEn:x.creado_en})):[];}catch(e){return[];}}
async function dbUpdateOrder(id,patch){try{await fetch(SUPA_URL+"/rest/v1/ordenes?id=eq."+id,{method:"PATCH",headers:Object.assign({},SH,{"Prefer":"return=minimal"}),body:JSON.stringify(patch)});}catch(e){console.error("dbUpdateOrder",e);}}
async function dbDeleteOrder(id){try{await fetch(SUPA_URL+"/rest/v1/ordenes?id=eq."+id,{method:"DELETE",headers:SH});}catch(e){console.error("dbDeleteOrder",e);}}

const Card=({ch,style,accent,onClick})=>{const s=Object.assign({background:"#fff",borderRadius:16,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,.06)",border:"1.5px solid "+(accent||B.border)},style||{});return <div onClick={onClick} style={s}>{ch}</div>;};
const Badge=({label,color})=>(<span style={{background:color+"18",color,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:800,letterSpacing:.3}}>{label}</span>);
const Stat=({label,value,unit,color,sub})=>(<div style={{background:"#fff",borderRadius:14,padding:"14px",boxShadow:"0 1px 3px rgba(0,0,0,.06)",border:"1.5px solid "+B.border}}><div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>{label}</div><div style={{color,fontSize:24,fontWeight:800,lineHeight:1}}>{value}<span style={{fontSize:12,fontWeight:600,marginLeft:3}}>{unit}</span></div>{sub&&<div style={{color:B.textLight,fontSize:11,marginTop:4}}>{sub}</div>}</div>);
const F=({label,value,onChange,type,placeholder})=>(<div><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:6}}>{label}</div><input type={type||"text"} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""} style={iS}/></div>);
const S=({label,value,onChange,options})=>(<div><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:6}}>{label}</div><select value={value} onChange={e=>onChange(e.target.value)} style={iS}>{(options||[]).map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select></div>);
const Btn=({ch,fn,color,outline,small,full})=>(<button onClick={fn} style={{background:outline?"transparent":(color||("linear-gradient(135deg,"+B.teal+","+B.navy+")")),border:outline?"1.5px solid "+(color||B.teal):"none",borderRadius:12,padding:small?"9px 16px":"14px 20px",color:outline?(color||B.teal):"#fff",fontSize:small?13:15,fontWeight:700,cursor:"pointer",width:full?"100%":"auto",boxShadow:outline?"none":"0 2px 8px rgba(0,0,0,.15)"}}>{ch}</button>);

function Logo({s}){const sz=s||32;return(<svg width={sz} height={sz} viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill={B.teal}/><text x="50" y="67" textAnchor="middle" fontSize="52" fontWeight="900" fontFamily="Inter,sans-serif" fill="#fff">P</text></svg>);}
function Pair({k,v,color}){return(<div><div style={{color:B.textLight,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.6,marginBottom:2}}>{k}</div><div style={{color:color||B.textDark,fontSize:14,fontWeight:700}}>{v}</div></div>);}

function LogRow({log,onDel}){
  const [exp,setExp]=useState(false);
  const c=CE[log.etapa];
  return(<Card style={{padding:0,overflow:"hidden"}} ch={
    <div>
      <div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:12}} onClick={()=>setExp(!exp)}>
        <div style={{width:36,height:36,borderRadius:10,background:c+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ICONOS[log.etapa]}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}><Badge label={ETIQUETAS[log.etapa]} color={c}/><span style={{color:B.textLight,fontSize:12}}>{log.maquina}</span></div>
          <div style={{color:B.textMid,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{log.producto||log.cliente||"—"} · {log.fecha}</div>
        </div>
        <span style={{color:B.textLight,fontSize:18,transform:exp?"rotate(180deg)":"rotate(0)",display:"inline-block"}}>v</span>
      </div>
      {exp&&(<div style={{borderTop:"1px solid "+B.border,padding:"12px 14px",background:B.bg}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          {log.supervisorNombre&&<Pair k="Supervisor" v={log.supervisorNombre.split(" ")[0]}/>}
          {log.ldpe&&<Pair k="LDPE" v={log.ldpe+" lbs"}/>}
          {log.mlldpe&&<Pair k="MLLDPE" v={log.mlldpe+" lbs"}/>}
          {log.pelicula&&<Pair k="Pelicula" v={log.pelicula+" lbs"} color={B.green}/>}
          {log.desperdicio&&<Pair k="Desperdicio" v={log.desperdicio+" lbs"} color={B.red}/>}
          {log.rollosProducidos&&<Pair k="Rollos" v={log.rollosProducidos}/>}
          {log.bolsasProducidas&&<Pair k="Fundas" v={Number(log.bolsasProducidas).toLocaleString()}/>}
          {log.desperdicioReciclado&&<Pair k="Entrada" v={log.desperdicioReciclado+" lbs"}/>}
          {log.materialRecuperado&&<Pair k="Recuperado" v={log.materialRecuperado+" lbs"} color={B.green}/>}
          {log.notas&&<Pair k="Notas" v={log.notas}/>}
        </div>
        <Btn ch="Eliminar" fn={()=>onDel(log.id)} color={B.red} outline small/>
      </div>)}
    </div>
  }/>);
}

  const go=()=>{const s=SUPERVISORES.find(x=>x.codigo===c.toUpperCase().trim());if(s)onLogin(s);else{setE("Codigo incorrecto");setC("");}};
  return(<div style={{minHeight:"100dvh",background:"linear-gradient(160deg,"+B.navyDeep+" 0%,"+B.navyDark+" 55%,"+B.tealDark+" 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{width:"100%",maxWidth:400}}>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:14,background:"rgba(255,255,255,.08)",borderRadius:20,padding:"14px 24px"}}>
          <Logo s={48}/>
          <div style={{textAlign:"left"}}>
            <div style={{color:"#fff",fontSize:18,fontWeight:800}}>palamo</div>
            <div style={{color:B.tealLight,fontSize:12,fontWeight:800,letterSpacing:1}}>lasticos</div>
            <div style={{color:"rgba(255,255,255,.4)",fontSize:10,letterSpacing:1.5}}>Dominicano S.R.L.</div>
          </div>
        </div>

      </div>
      <div style={{background:"rgba(255,255,255,.95)",borderRadius:20,padding:24,marginBottom:20,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:8}}>Codigo de Supervisor</div>
        <input type="text" value={c} onChange={ev=>{setC(ev.target.value.toUpperCase());setE("");}} onKeyDown={ev=>ev.key==="Enter"&&go()} placeholder="Ej: DLS001" style={Object.assign({},iS,{fontSize:22,textAlign:"center",letterSpacing:6,fontWeight:800,color:B.navy,borderColor:e?B.red:B.border,marginBottom:e?8:16})}/>
        {e&&<div style={{color:B.red,fontSize:13,fontWeight:600,textAlign:"center",marginBottom:12}}>!! {e}</div>}
        <Btn ch="Entrar" fn={go} full/>

        {SUPERVISORES.map(s=>(<div key={s.codigo} onClick={()=>{setC(s.codigo);setE("");}} style={{background:"rgba(255,255,255,.1)",borderRadius:12,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",border:"1px solid rgba(255,255,255,.15)"}}>
          <div><div style={{color:"#fff",fontSize:14,fontWeight:600}}>{s.nombre}</div><div style={{color:"rgba(255,255,255,.5)",fontSize:12}}>{s.cargo}</div></div>
          <span style={{color:B.tealLight,fontWeight:800,fontSize:14,letterSpacing:1}}>{s.codigo}</span>
        </div>))}
      </div>
    </div>
  </div>);
}

function Inventario({mat,setMat,movs,setMovs,sup}){
  const [modo,setModo]=useState(false);
  const [sel,setSel]=useState(mat[0].id);
  const [cant,setCant]=useState(""); const [prov,setProv]=useState(""); const [nota,setNota]=useState("");
  const [eMin,setEMin]=useState(null); const [mVal,setMVal]=useState("");
  const save=()=>{if(!cant||Number(cant)<=0)return;const n=Number(cant),m=mat.find(x=>x.id===sel);setMovs(p=>[{id:Date.now(),tipo:"entrada",materialId:sel,materialNombre:m.nombre,cantidad:n,unidad:m.unidad,proveedor:prov,notas:nota,fecha:new Date().toISOString().split("T")[0],supervisor:sup.nombre},...p]);setMat(p=>p.map(x=>x.id===sel?Object.assign({},x,{stockActual:x.stockActual+n}):x));setCant("");setProv("");setNota("");setModo(false);};
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Inventario</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Materia prima en stock</p></div>
      <Btn ch={modo?"X Cancelar":"+ Entrada"} fn={()=>setModo(!modo)} color={modo?B.textMid:("linear-gradient(135deg,"+B.green+","+B.tealDark+")")} small/>
    </div>
    {modo&&<Card accent={B.teal} ch={<div>
      <div style={{color:B.teal,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>Nueva Entrada</div>
      <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:16}}>
        <S label="Material" value={sel} onChange={setSel} options={mat.map(m=>({v:m.id,l:m.nombre}))}/>
        <F label={"Cantidad ("+((mat.find(m=>m.id===sel)||{}).unidad||"")+")"}  value={cant} onChange={setCant} type="number" placeholder="0"/>
        <F label="Proveedor" value={prov} onChange={setProv} placeholder="Nombre del proveedor"/>
        <F label="Notas" value={nota} onChange={setNota} placeholder="Opcional"/>
      </div>
      <Btn ch="Confirmar Entrada" fn={save} color={"linear-gradient(135deg,"+B.green+","+B.tealDark+")"} full/>
    </div>}/>}
    {mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green,pct=Math.min(100,m.stockMinimo>0?(m.stockActual/(m.stockMinimo*3))*100:100);return(<Card key={m.id} style={{border:"1.5px solid "+(cr?B.red+"44":bj?B.amber+"44":B.border)}} ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div><div style={{color:B.textDark,fontSize:16,fontWeight:700}}>{m.nombre}</div><div style={{color:B.textLight,fontSize:12,marginTop:2}}>{m.unidad}</div></div>
        {(bj||cr)&&<span style={{background:cr?B.red+"15":B.amber+"15",color:cr?B.red:B.amber,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:800}}>{cr?"CRITICO":"BAJO"}</span>}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:B.textLight,fontSize:12,fontWeight:600}}>Stock actual</span><span style={{color:bc,fontWeight:800,fontSize:18}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div>
      <div style={{height:8,background:B.bg,borderRadius:4,overflow:"hidden",marginBottom:12}}><div style={{width:pct+"%",height:"100%",background:bc,borderRadius:4}}/></div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:B.bg,borderRadius:8,padding:"10px 12px"}}>
        <span style={{color:B.textLight,fontSize:12,fontWeight:600}}>Minimo de alerta</span>
        {eMin===m.id?(<div style={{display:"flex",gap:6,alignItems:"center"}}><input type="number" value={mVal} onChange={e=>setMVal(e.target.value)} autoFocus style={Object.assign({},iS,{width:80,padding:"7px 10px",fontSize:15})}/><button onClick={()=>{const v=Number(mVal);if(!isNaN(v)&&v>=0)setMat(p=>p.map(x=>x.id===m.id?Object.assign({},x,{stockMinimo:v}):x));setEMin(null);}} style={{background:B.green,border:"none",borderRadius:8,color:"#fff",padding:"8px 12px",cursor:"pointer",fontWeight:700,fontSize:14}}>OK</button></div>):(<div style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:B.textDark,fontWeight:700,fontSize:14}}>{m.stockMinimo} {m.unidad}</span><button onClick={()=>{setEMin(m.id);setMVal(String(m.stockMinimo));}} style={{background:"none",border:"1px solid "+B.border,borderRadius:7,color:B.textLight,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>Editar</button></div>)}
      </div>
      {movs.filter(x=>x.materialId===m.id).slice(0,2).map(mv=>(<div key={mv.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderTop:"1px solid "+B.border,marginTop:6}}><span style={{color:B.textLight,fontSize:12}}>{mv.fecha}</span>{mv.proveedor&&<span style={{color:B.textMid,fontSize:12}}>{mv.proveedor}</span>}<span style={{color:B.green,fontWeight:700,fontSize:13}}>+{mv.cantidad} {mv.unidad}</span></div>))}
    </div>}/>);})}
    {movs.length>0&&<div>

}

function Registro({sup,regs,setRegs,mat,setMat,movs,setMovs}){

  const pelNeta=()=>{if(form.etapa!=="extrusion")return null;const p=Number(form.pelicula),n=Number(form.pesoNucleo||PESO_NUCLEO_DEFAULT),r=Number(form.rollosProducidos||0);if(!p)return null;return Math.max(0,r>0?p-(r*n):p).toFixed(2);};
  const save=()=>{const r=Object.assign({},form,{id:Date.now(),supervisorNombre:sup.nombre,supervisorCodigo:sup.codigo});setRegs(p=>[r,...p]);dbSave(r);desc(r);setSaved(true);setTimeout(()=>setSaved(false),2000);setForm(Object.assign({},F0,{etapa:form.etapa,maquina:MAQUINAS[form.etapa][0]}));};
  const fil=filt==="all"?regs:regs.filter(r=>r.etapa===filt);

        {ETAPAS.map(e=>(<button key={e} onClick={()=>set("etapa")(e)} style={{background:form.etapa===e?CE[e]:"transparent",border:"2px solid "+(form.etapa===e?CE[e]:B.border),borderRadius:20,padding:"9px 16px",color:form.etapa===e?"#fff":B.textMid,fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{ICONOS[e]} {ETIQUETAS[e]}</button>))}
      </div>
      {form.etapa==="extrusion"&&(form.ldpe||form.mlldpe)&&<div style={{background:B.teal+"12",border:"1px solid "+B.teal+"33",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:B.tealDark,fontWeight:500}}>Se descontara {form.ldpe||0} lbs LDPE y {form.mlldpe||0} lbs MLLDPE del inventario.</div>}
      {pn&&<div style={{background:B.green+"12",border:"1px solid "+B.green+"33",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:B.green,fontWeight:600}}>Pelicula neta (sin nucleo): {pn} lbs</div>}

    <div>

const ETAPAS_ORDEN=["pendiente","extrusion","impresion","corte_rollo","cortadora","listo"];
const ETIQ_ORDEN={pendiente:"Pendiente",extrusion:"Extrusion",impresion:"Impresion",corte_rollo:"Slitter",cortadora:"Cortadora",listo:"Listo"};
const COLOR_ORDEN={pendiente:B.textLight,extrusion:B.teal,impresion:B.navy,corte_rollo:B.tealDark,cortadora:"#4E7C59",listo:B.green};

function Ordenes({ordenes,setOrdenes,sup}){
  const [modo,setModo]=useState(false);
  const [exp,setExp]=useState(null);
  const [form,setForm]=useState({cliente:"",fechaEnvio:"",puerto:PUERTOS[0],notas:"",items:[{producto:"",cantidad:"",unidad:"uds"}]});
  const addItem=()=>setForm(f=>Object.assign({},f,{items:[...f.items,{producto:"",cantidad:"",unidad:"uds"}]}));
  const setItem=(i,k,v)=>setForm(f=>{const it=[...f.items];it[i]=Object.assign({},it[i],{[k]:v});return Object.assign({},f,{items:it});});
  const removeItem=i=>setForm(f=>Object.assign({},f,{items:f.items.filter((_,x)=>x!==i)}));
  const save=()=>{
    if(!form.cliente||form.items.some(x=>!x.producto))return;
    const o={id:Date.now(),cliente:form.cliente,fechaEnvio:form.fechaEnvio,puerto:form.puerto,notas:form.notas,items:form.items,etapa:"pendiente",creadoPor:sup.nombre,creadoEn:new Date().toISOString().split("T")[0]};
    setOrdenes(p=>[o,...p]);
    dbSaveOrder(o);
    setForm({cliente:"",fechaEnvio:"",puerto:PUERTOS[0],notas:"",items:[{producto:"",cantidad:"",unidad:"uds"}]});
    setModo(false);
  };
  const avanzar=o=>{
    const idx=ETAPAS_ORDEN.indexOf(o.etapa);
    if(idx>=ETAPAS_ORDEN.length-1)return;
    const next=ETAPAS_ORDEN[idx+1];
    setOrdenes(p=>p.map(x=>x.id===o.id?Object.assign({},x,{etapa:next}):x));
    dbUpdateOrder(o.id,{etapa:next});
  };
  const eliminar=id=>{setOrdenes(p=>p.filter(x=>x.id!==id));dbDeleteOrder(id);};
  const abiertas=ordenes.filter(o=>o.etapa!=="listo");
  const cerradas=ordenes.filter(o=>o.etapa==="listo");

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Ordenes de Produccion</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>{abiertas.length} activas · {cerradas.length} completadas</p></div>
      <Btn ch={modo?"X Cancelar":"+ Nueva"} fn={()=>setModo(!modo)} color={modo?B.textMid:("linear-gradient(135deg,"+B.teal+","+B.navy+")")} small/>
    </div>
    {modo&&<Card accent={B.teal} ch={<div>
      <div style={{color:B.teal,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:16}}>Nueva Orden de Produccion</div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <F label="Cliente" value={form.cliente} onChange={v=>setForm(f=>Object.assign({},f,{cliente:v}))} placeholder="Ej: Ouesplast"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <F label="Fecha de Envio" value={form.fechaEnvio} onChange={v=>setForm(f=>Object.assign({},f,{fechaEnvio:v}))} type="date"/>
          <S label="Puerto de Destino" value={form.puerto} onChange={v=>setForm(f=>Object.assign({},f,{puerto:v}))} options={PUERTOS.map(p=>({v:p,l:p}))}/>
        </div>
        <div>
          <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:10}}>Productos de la Orden</div>
          {form.items.map((it,i)=>(<div key={i} style={{background:B.bg,borderRadius:12,padding:"12px",marginBottom:8}}>
            <div style={{marginBottom:8}}><F label={"Producto "+(i+1)} value={it.producto} onChange={v=>setItem(i,"producto",v)} placeholder="Ej: Eau Lakay"/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <F label="Cantidad" value={it.cantidad} onChange={v=>setItem(i,"cantidad",v)} type="number" placeholder="0"/>
              <S label="Unidad" value={it.unidad} onChange={v=>setItem(i,"unidad",v)} options={[{v:"uds",l:"Unidades"},{v:"lbs",l:"Libras"},{v:"rollos",l:"Rollos"},{v:"bolsas",l:"Bolsas"}]}/>
            </div>
            {form.items.length>1&&<button onClick={()=>removeItem(i)} style={{background:"none",border:"1px solid "+B.red+"44",color:B.red,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>X Quitar</button>}
          </div>))}
          <button onClick={addItem} style={{background:"none",border:"1.5px dashed "+B.teal,borderRadius:10,padding:"10px",width:"100%",color:B.teal,fontWeight:700,cursor:"pointer",fontSize:13}}>+ Agregar Producto</button>
        </div>
        <F label="Notas" value={form.notas} onChange={v=>setForm(f=>Object.assign({},f,{notas:v}))} placeholder="Instrucciones especiales..."/>
        <Btn ch="Crear Orden" fn={save} full/>
      </div>
    </div>}/>}
    {abiertas.length===0&&!modo&&<Card style={{textAlign:"center",padding:32,border:"1.5px dashed "+B.border}} ch={<div><div style={{fontSize:36,marginBottom:8}}>📋</div><div style={{color:B.textMid,fontSize:14,fontWeight:700}}>Sin ordenes activas</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca "+ Nueva" para registrar una orden</div></div>}/>}
    {abiertas.map(o=>{
      const ei=ETAPAS_ORDEN.indexOf(o.etapa);
      const c=COLOR_ORDEN[o.etapa];
      const items=o.items||[];
      return(<Card key={o.id} accent={c} ch={<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,cursor:"pointer"}} onClick={()=>setExp(exp===o.id?null:o.id)}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><Badge label={ETIQ_ORDEN[o.etapa]} color={c}/>{o.fechaEnvio&&<span style={{color:B.textLight,fontSize:12}}>📅 {o.fechaEnvio}</span>}</div>
            <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>{o.cliente}</div>
            {o.puerto&&<div style={{color:B.textLight,fontSize:12,marginTop:2}}>📍 {o.puerto}</div>}
          </div>
          <span style={{color:B.textLight,fontSize:16}}>{exp===o.id?"▲":"▼"}</span>
        </div>
        <div style={{display:"flex",gap:2,marginBottom:6}}>
          {ETAPAS_ORDEN.map((e,i)=>{const done=i<=ei;const curr=i===ei;return(<div key={e} style={{flex:1,height:5,borderRadius:3,background:done?(curr?c:B.green):B.border}}/>);})}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:B.textLight,marginBottom:12}}><span>Inicio</span><span style={{color:B.green,fontWeight:700}}>Listo</span></div>
        <div style={{marginBottom:8}}>
          {items.slice(0,exp===o.id?99:2).map((it,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+B.border}}><span style={{color:B.textDark,fontSize:13,fontWeight:600}}>{it.producto}</span><span style={{color:B.teal,fontWeight:800,fontSize:13}}>{Number(it.cantidad||0).toLocaleString()} {it.unidad}</span></div>))}
          {!exp&&items.length>2&&<div style={{color:B.textLight,fontSize:12,marginTop:4}}>+{items.length-2} mas...</div>}
        </div>
        {exp===o.id&&<div>
          {o.notas&&<div style={{color:B.textMid,fontSize:13,background:B.bg,borderRadius:8,padding:"8px 10px",marginBottom:10}}>📝 {o.notas}</div>}
          <div style={{color:B.textLight,fontSize:11,marginBottom:10}}>Creado por {o.creadoPor} · {o.creadoEn}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {o.etapa!=="listo"&&<Btn ch={"Avanzar -> "+(ETIQ_ORDEN[ETAPAS_ORDEN[ei+1]]||"")} fn={()=>avanzar(o)} color={B.green} small/>}
            <Btn ch="Eliminar" fn={()=>eliminar(o.id)} color={B.red} outline small/>
          </div>
        </div>}
      </div>}/>);
    })}
    {cerradas.length>0&&<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Completadas ({cerradas.length})</div>
      {cerradas.slice(0,5).map(o=>(<Card key={o.id} style={{opacity:.7,padding:"12px 14px"}} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{color:B.textDark,fontSize:14,fontWeight:700}}>{o.cliente}</div><div style={{color:B.textLight,fontSize:12}}>{o.fechaEnvio} · {o.puerto}</div></div><div style={{display:"flex",alignItems:"center",gap:8}}><Badge label="Listo" color={B.green}/><button onClick={()=>eliminar(o.id)} style={{background:"none",border:"none",color:B.textLight,cursor:"pointer",fontSize:16}}>X</button></div></div>}/>))}
    </div>}
  </div>);
}

function Rendimiento({regs}){
  const [periodo,setPeriodo]=useState("diario");
  const [etapa,setEtapa]=useState("all");
  const hoy=new Date().toISOString().split("T")[0];
  const semanaAtras=new Date(Date.now()-7*86400000).toISOString().split("T")[0];
  const mesAtras=new Date(Date.now()-30*86400000).toISOString().split("T")[0];
  const filtFecha=r=>{if(periodo==="diario")return r.fecha===hoy;if(periodo==="semanal")return r.fecha>=semanaAtras;return r.fecha>=mesAtras;};
  const base=regs.filter(filtFecha).filter(r=>etapa==="all"||r.etapa===etapa);
  const porSup=useMemo(()=>{
    const m={};
    SUPERVISORES.forEach(s=>{m[s.codigo]={nombre:s.nombre,codigo:s.codigo,registros:0,pelicula:0,fundas:0,rollos:0,desperdicio:0};});
    base.forEach(r=>{const k=r.supervisorCodigo;if(!m[k])return;m[k].registros++;m[k].pelicula+=Number(r.pelicula||0);m[k].fundas+=Number(r.bolsasProducidas||0);m[k].rollos+=Number(r.rollosProducidos||0);m[k].desperdicio+=Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioCorteRollo||0)+Number(r.desperdicioCorte||0);});
    return Object.values(m).sort((a,b)=>b.registros-a.registros);
  },[base]);
  const maxReg=Math.max(...porSup.map(s=>s.registros),1);
  const maxFilm=Math.max(...porSup.map(s=>s.pelicula),1);
  const maxFundas=Math.max(...porSup.map(s=>s.fundas),1);
  const totalRegs=base.length;
  const totalFilm=base.reduce((s,r)=>s+Number(r.pelicula||0),0);
  const totalFundas=base.reduce((s,r)=>s+Number(r.bolsasProducidas||0),0);
  const totalDesp=base.reduce((s,r)=>s+Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioCorteRollo||0)+Number(r.desperdicioCorte||0),0);
  const perLabel={diario:"hoy",semanal:"esta semana",mensual:"este mes"};
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Rendimiento del Equipo</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Comparativa de supervisores</p></div>
    <div style={{display:"flex",gap:8}}>
      {["diario","semanal","mensual"].map(p=>(<button key={p} onClick={()=>setPeriodo(p)} style={{flex:1,background:periodo===p?("linear-gradient(135deg,"+B.teal+","+B.navy+")"):"#fff",border:"1.5px solid "+(periodo===p?B.teal:B.border),borderRadius:12,padding:"10px 6px",color:periodo===p?"#fff":B.textMid,fontSize:13,fontWeight:700,cursor:"pointer"}}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>))}
    </div>
    <div style={{display:"flex",gap:7,overflowX:"auto",scrollbarWidth:"none"}}>
      {["all",...ETAPAS].map(e=>(<button key={e} onClick={()=>setEtapa(e)} style={{background:etapa===e?(CE[e]||B.teal):"transparent",border:"1.5px solid "+(etapa===e?(CE[e]||B.teal):B.border),borderRadius:20,padding:"7px 14px",color:etapa===e?"#fff":B.textMid,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{e==="all"?"Todas":ETIQUETAS[e]}</button>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Registros" value={totalRegs} unit="" color={B.teal} sub={perLabel[periodo]}/>
      <Stat label="Pelicula" value={totalFilm.toFixed(0)} unit="lbs" color={B.green} sub={perLabel[periodo]}/>
      <Stat label="Fundas" value={totalFundas.toLocaleString()} unit="uds" color={B.navy} sub={perLabel[periodo]}/>
      <Stat label="Desperdicio" value={totalDesp.toFixed(0)} unit="lbs" color={B.red} sub={perLabel[periodo]}/>
    </div>
    <Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:14}}>Por Supervisor</div>
      {porSup.every(s=>s.registros===0)?<div style={{textAlign:"center",padding:24,color:B.textLight,fontSize:14}}>Sin datos para {perLabel[periodo]}</div>:
      porSup.map(s=>{
        const pctR=(s.registros/maxReg)*100;
        const pctF=maxFundas>0?(s.fundas/maxFundas)*100:0;
        const pctP=maxFilm>0?(s.pelicula/maxFilm)*100:0;
        return(<div key={s.codigo} style={{marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div style={{color:B.textDark,fontSize:14,fontWeight:700}}>{s.nombre.split(" ")[0]} <span style={{color:B.textLight,fontSize:12}}>{s.codigo}</span></div>
            <div style={{textAlign:"right"}}><div style={{color:B.teal,fontWeight:800,fontSize:16}}>{s.registros}</div><div style={{color:B.textLight,fontSize:10}}>registros</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <span style={{color:B.textLight,fontSize:11,width:56,flexShrink:0}}>Registros</span>
            <div style={{flex:1,height:7,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:pctR+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.tealLight+")",borderRadius:4}}/></div>
            <span style={{color:B.textDark,fontSize:12,fontWeight:700,width:24,textAlign:"right"}}>{s.registros}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <span style={{color:B.textLight,fontSize:11,width:56,flexShrink:0}}>Fundas</span>
            <div style={{flex:1,height:7,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:pctF+"%",height:"100%",background:"linear-gradient(90deg,"+B.navy+",#6B85B8)",borderRadius:4}}/></div>
            <span style={{color:B.textDark,fontSize:12,fontWeight:700,width:44,textAlign:"right"}}>{s.fundas>0?s.fundas.toLocaleString():"—"}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:B.textLight,fontSize:11,width:56,flexShrink:0}}>Pelicula</span>
            <div style={{flex:1,height:7,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:pctP+"%",height:"100%",background:"linear-gradient(90deg,"+B.green+",#68D391)",borderRadius:4}}/></div>
            <span style={{color:B.textDark,fontSize:12,fontWeight:700,width:44,textAlign:"right"}}>{s.pelicula>0?s.pelicula.toFixed(0)+"lb":"—"}</span>
          </div>
        </div>);
      })}
    </div>}/>
    {base.length>0&&<Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Ranking {perLabel[periodo]}</div>
      {porSup.filter(s=>s.registros>0).map((s,i)=>{
        const medals=["🥇","🥈","🥉"];
        return(<div key={s.codigo} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<porSup.filter(x=>x.registros>0).length-1?"1px solid "+B.border:"none"}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:i===0?"linear-gradient(135deg,#F6E05E,#D97706)":i===1?"linear-gradient(135deg,#CBD5E0,#718096)":i===2?"linear-gradient(135deg,#C05621,#9C4221)":B.bg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:i<3?14:13,color:i<3?"#fff":B.textLight,flexShrink:0}}>{i<3?medals[i]:i+1}</div>
          <div style={{flex:1}}><div style={{color:B.textDark,fontSize:14,fontWeight:700}}>{s.nombre.split(" ")[0]}</div><div style={{color:B.textLight,fontSize:12}}>{s.registros} registros · {s.fundas>0?s.fundas.toLocaleString()+" fundas":s.pelicula>0?s.pelicula.toFixed(0)+" lbs":""}</div></div>
          {i===0&&<span style={{fontSize:20}}>⭐</span>}
        </div>);
      })}
    </div>}/>}
  </div>);
}

function Dashboard({regs,mat,ordenes,setVista}){
  const tL=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.ldpe)||0),0);
  const tM=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.mlldpe)||0),0);
  const tP=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||0),0);
  const tD=regs.reduce((s,r)=>s+(Number(r.desperdicio)||0)+(Number(r.desperdicioImpresion)||0)+(Number(r.desperdicioCorteRollo)||0)+(Number(r.desperdicioCorte)||0),0);
  const tF=regs.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const tR=regs.filter(r=>r.etapa==="reciclaje").reduce((s,r)=>s+(Number(r.materialRecuperado)||0),0);
  const yld=tP>0?((tP/(tP+tD))*100).toFixed(1):null;
  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo);
  const ordenesActivas=(ordenes||[]).filter(o=>o.etapa!=="listo");
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{color:B.textDark,fontSize:22,fontWeight:800,margin:"0 0 2px"}}>Dashboard</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Resumen de produccion</p></div>
    {alts.length>0&&<div style={{background:B.red+"12",border:"1.5px solid "+B.red+"44",borderRadius:12,padding:"12px 16px",display:"flex",gap:10,alignItems:"center",cursor:"pointer"}} onClick={()=>setVista("inventario")}><span style={{fontSize:20}}>🚨</span><div style={{flex:1}}><div style={{color:B.red,fontWeight:700,fontSize:14}}>Stock Bajo</div><div style={{color:B.textMid,fontSize:13}}>{alts.map(a=>a.nombre).join(", ")}</div></div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>}
    {ordenesActivas.length>0&&<div style={{background:B.teal+"10",border:"1.5px solid "+B.teal+"44",borderRadius:12,padding:"12px 16px",cursor:"pointer"}} onClick={()=>setVista("ordenes")}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{color:B.teal,fontWeight:700,fontSize:14}}>Ordenes Activas ({ordenesActivas.length})</div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>
      {ordenesActivas.slice(0,2).map(o=>(<div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}><span style={{color:B.textDark,fontSize:13,fontWeight:600}}>{o.cliente}</span><Badge label={ETIQ_ORDEN[o.etapa]} color={COLOR_ORDEN[o.etapa]}/></div>))}
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Stat label="LDPE" value={tL.toFixed(0)} unit="lbs" color={B.teal} sub={"Stock: "+(mat.find(m=>m.id==="ldpe")||{stockActual:0}).stockActual.toFixed(0)+" lbs"}/>
      <Stat label="MLLDPE" value={tM.toFixed(0)} unit="lbs" color={B.navy} sub={"Stock: "+(mat.find(m=>m.id==="mlldpe")||{stockActual:0}).stockActual.toFixed(0)+" lbs"}/>
      <Stat label="Pelicula" value={tP.toFixed(0)} unit="lbs" color={B.green}/>
      <Stat label="Desperdicio" value={tD.toFixed(0)} unit="lbs" color={B.red}/>
      <Stat label="Fundas" value={tF.toLocaleString()} unit="uds" color={B.tealDark}/>
      <Stat label="Recuperado" value={tR.toFixed(0)} unit="lbs" color="#6B7280"/>
    </div>
    {yld&&<Card accent={B.green} ch={<div><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Eficiencia de Extrusion</div><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{flex:1,height:10,background:B.bg,borderRadius:5,overflow:"hidden"}}><div style={{width:yld+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.green+")",borderRadius:5}}/></div><span style={{color:B.green,fontWeight:800,fontSize:20}}>{yld}%</span></div></div>}/>}
    <Card ch={<div><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Flujo de Produccion</div><div style={{display:"flex",overflowX:"auto",gap:0}}>{ETAPAS.map((e,i)=>{const n=regs.filter(r=>r.etapa===e).length,c=CE[e];return(<div key={e} style={{display:"flex",alignItems:"center",flexShrink:0}}><div style={{background:B.bg,border:"1.5px solid "+c+"44",borderRadius:12,padding:"12px 10px",textAlign:"center",minWidth:72}}><div style={{fontSize:20}}>{ICONOS[e]}</div><div style={{color:c,fontSize:9,fontWeight:700,textTransform:"uppercase",margin:"3px 0"}}>{ETIQUETAS[e]}</div><div style={{color:B.textDark,fontWeight:800,fontSize:20}}>{n}</div></div>{i<ETAPAS.length-1&&<div style={{color:B.border,fontSize:18,padding:"0 3px"}}>›</div>}</div>);})}</div></div>}/>
    <Card ch={<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Inventario</div><button onClick={()=>setVista("inventario")} style={{background:"none",border:"1px solid "+B.border,color:B.teal,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Ver →</button></div>{mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green;return(<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+B.border}}><span style={{color:B.textDark,fontSize:14,fontWeight:600}}>{m.nombre}</span><div style={{display:"flex",alignItems:"center",gap:8}}>{(bj||cr)&&<span>{cr?"🚨":"⚠️"}</span>}<span style={{color:bc,fontWeight:800,fontSize:15}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div></div>);})}</div>}/>
    {regs.length===0&&<Card style={{textAlign:"center",padding:40,border:"1.5px dashed "+B.border}} ch={<div><div style={{fontSize:40,marginBottom:10}}>📋</div><div style={{color:B.textMid,fontSize:15,fontWeight:700}}>Sin registros aun</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca Registrar para agregar el primer turno</div></div>}/>}
  </div>);
}

function Maquinas({regs}){
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Maquinas</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Actividad por maquina</p></div>{[{label:"Extrusoras",mqs:MAQUINAS.extrusion,c:CE.extrusion,i:"⚙️"},{label:"Impresoras",mqs:MAQUINAS.impresion,c:CE.impresion,i:"🖨️"},{label:"Slitters",mqs:MAQUINAS.corte_rollo,c:CE.corte_rollo,i:"✂️"},{label:"Cortadoras",mqs:MAQUINAS.cortadora,c:CE.cortadora,i:"🛠️"},{label:"Reciclaje",mqs:MAQUINAS.reciclaje,c:CE.reciclaje,i:"♻️"}].map(g=>(<Card key={g.label} ch={<div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}><span style={{fontSize:18}}>{g.i}</span><span style={{color:B.textDark,fontSize:15,fontWeight:700}}>{g.label}</span></div><div style={{display:"flex",flexDirection:"column",gap:8}}>{g.mqs.map(m=>{const n=regs.filter(r=>r.maquina===m).length,mx=Math.max(...g.mqs.map(mm=>regs.filter(r=>r.maquina===mm).length),1);return(<div key={m} style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:g.c,fontWeight:800,fontSize:13,width:50,flexShrink:0}}>{m}</span><div style={{flex:1,height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:((n/mx)*100)+"%",height:"100%",background:g.c,borderRadius:4}}/></div><span style={{color:B.textDark,fontWeight:700,fontSize:14,width:28,textAlign:"right",flexShrink:0}}>{n}</span>{n===0&&<span style={{color:B.textLight,fontSize:10,fontWeight:600}}>IDLE</span>}</div>);})}</div></div>}/>))}</div>);
}

function App(){
  const [sup,setSup]=useState(null);
  const [regs,setRegs]=useState([]);
  const [mat,setMat]=useState(MATERIALES_INIT);
  const [movs,setMovs]=useState([]);
  const [ordenes,setOrdenes]=useState([]);
  const [vista,setVista]=useState("dashboard");
  const [dbLoading,setDbLoading]=useState(true);
  useEffect(()=>{
    Promise.all([dbLoad(),dbLoadOrders()]).then(([r,o])=>{setRegs(r);setOrdenes(o);setDbLoading(false);}).catch(()=>setDbLoading(false));
  },[]);
  if(!sup)return <Login onLogin={setSup}/>;
  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo).length;
  const ordenesActivas=ordenes.filter(o=>o.etapa!=="listo").length;
  const NAV=[
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"registro",icon:"➕",label:"Registrar"},
    {id:"ordenes",icon:"📋",label:"Ordenes",badge:ordenesActivas},
    {id:"rendimiento",icon:"📈",label:"Equipo"},
    {id:"inventario",icon:"📦",label:"Stock",badge:alts},
  ];
  return(<div style={{minHeight:"100dvh",background:B.bg,paddingBottom:80}}>
    <div style={{background:"linear-gradient(135deg,"+B.navyDeep+","+B.tealDark+")",padding:"env(safe-area-inset-top,0px) 16px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><Logo s={30}/><div><div style={{color:"#fff",fontSize:15,fontWeight:800,lineHeight:1.1}}>palamo</div><div style={{color:B.tealLight,fontSize:9,fontWeight:700,letterSpacing:1.5}}>PRODUCCION</div></div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{textAlign:"right"}}><div style={{color:"#fff",fontSize:13,fontWeight:700,lineHeight:1.1}}>{sup.nombre.split(" ")[0]}</div><div style={{color:B.tealLight,fontSize:10,fontWeight:600}}>{sup.codigo}</div></div><button onClick={()=>setSup(null)} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"7px 10px",color:"rgba(255,255,255,.8)",fontSize:12,fontWeight:700,cursor:"pointer"}}>Salir</button></div>
      </div>
    </div>
    <div style={{padding:"16px 16px 0"}}>
      {dbLoading&&<div style={{textAlign:"center",padding:40,color:B.textLight}}><div style={{fontSize:32,marginBottom:8}}>⏳</div><div style={{fontSize:14}}>Cargando datos...</div></div>}
      {!dbLoading&&vista==="dashboard"&&<Dashboard regs={regs} mat={mat} ordenes={ordenes} setVista={setVista}/>}
      {!dbLoading&&vista==="registro"&&<Registro sup={sup} regs={regs} setRegs={setRegs} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs}/>}
      {!dbLoading&&vista==="ordenes"&&<Ordenes ordenes={ordenes} setOrdenes={setOrdenes} sup={sup}/>}
      {!dbLoading&&vista==="rendimiento"&&<Rendimiento regs={regs}/>}
      {!dbLoading&&vista==="inventario"&&<Inventario mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} sup={sup}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:"1px solid "+B.border,paddingBottom:"env(safe-area-inset-bottom,0px)",boxShadow:"0 -2px 16px rgba(0,0,0,.08)"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat("+NAV.length+",1fr)"}}>
        {NAV.map(n=>(<button key={n.id} onClick={()=>setVista(n.id)} style={{background:"none",border:"none",padding:"10px 4px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",position:"relative"}}><span style={{fontSize:20,lineHeight:1}}>{n.icon}</span><span style={{fontSize:10,fontWeight:700,color:vista===n.id?B.teal:B.textLight}}>{n.label}</span>{vista===n.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:28,height:3,borderRadius:2,background:B.teal}}/>}{n.badge>0&&<div style={{position:"absolute",top:6,right:"calc(50% - 18px)",background:B.red,color:"#fff",borderRadius:10,width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{n.badge}</div>}</button>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    if('serviceWorker' in navigator){
      const sw = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
    }
  </script>
</body>
</html>
