function LogRow({log,onDel}){
  const [exp,setExp]=useState(false);
  const c=CE[log.etapa];
  return(<Card style={{padding:0,overflow:"hidden"}} ch={<><div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:12}} onClick={()=>setExp(!exp)}><div style={{width:36,height:36,borderRadius:10,background:c+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ICONOS[log.etapa]}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}><Badge label={ETIQUETAS[log.etapa]} color={c}/><span style={{color:B.textLight,fontSize:12}}>{log.maquina}</span></div><div style={{color:B.textMid,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{log.producto||log.cliente||"—"} · {log.fecha}</div></div><span style={{color:B.textLight,fontSize:18,transform:exp?"rotate(180deg)":"rotate(0)",display:"inline-block"}}>⌄</span></div>{exp&&(<div style={{borderTop:`1px solid ${B.border}`,padding:"12px 14px",background:B.bg}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>{log.supervisorNombre&&<Pair k="Supervisor" v={log.supervisorNombre.split(" ")[0]}/>}{log.ldpe&&<Pair k="LDPE" v={`${log.ldpe} lbs`}/>}{log.mlldpe&&<Pair k="MLLDPE" v={`${log.mlldpe} lbs`}/>}{log.pelicula&&<Pair k="Película" v={`${log.pelicula} lbs`} color={B.green}/>}{log.desperdicio&&<Pair k="Desperdicio" v={`${log.desperdicio} lbs`} color={B.red}/>}{log.rollosProducidos&&<Pair k="Rollos" v={log.rollosProducidos}/>}{log.lbsImpresion&&<Pair k="Entrada" v={`${log.lbsImpresion} lbs`}/>}{log.desperdicioImpresion&&<Pair k="Desperdicio" v={`${log.desperdicioImpresion} lbs`} color={B.red}/>}{log.lbsCorteRollo&&<Pair k="Entrada" v={`${log.lbsCorteRollo} lbs`}/>}{log.desperdicioCorteRollo&&<Pair k="Desperdicio" v={`${log.desperdicioCorteRollo} lbs`} color={B.red}/>}{log.lbsCortadora&&<Pair k="Entrada" v={`${log.lbsCortadora} lbs`}/>}{log.bolsasProducidas&&<Pair k="Fundas" v={Number(log.bolsasProducidas).toLocaleString()}/>}{log.desperdicioCorte&&<Pair k="Desperdicio" v={`${log.desperdicioCorte} lbs`} color={B.red}/>}{log.desperdicioReciclado&&<Pair k="Entrada" v={`${log.desperdicioReciclado} lbs`}/>}{log.materialRecuperado&&<Pair k="Recuperado" v={`${log.materialRecuperado} lbs`} color={B.green}/>}{log.notas&&<Pair k="Notas" v={log.notas}/>}</div><Btn ch="🗑 Eliminar" fn={()=>onDel(log.id)} color={B.red} outline small/></div>)}</>}/>);
}

function Login({onLogin}){
  const [c,setC]=useState(""); const [e,setE]=useState("");
  const go=()=>{const s=SUPERVISORES.find(x=>x.codigo===c.toUpperCase().trim());if(s)onLogin(s);else{setE("Código incorrecto");setC("");}};
  return(<div style={{minHeight:"100dvh",background:`linear-gradient(160deg,${B.navyDeep} 0%,${B.navyDark} 55%,${B.tealDark} 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}><div style={{width:"100%",maxWidth:400}}><div style={{textAlign:"center",marginBottom:36}}><div style={{display:"inline-flex",alignItems:"center",gap:14,background:"rgba(255,255,255,.08)",borderRadius:20,padding:"14px 24px"}}><Logo s={48}/><div style={{textAlign:"left"}}><div style={{display:"flex",alignItems:"baseline"}}><span style={{color:"rgba(255,255,255,.5)",fontSize:18,fontWeight:300}}>p</span><span style={{color:"#fff",fontSize:18,fontWeight:800}}>alamo</span></div><div style={{color:B.tealLight,fontSize:12,fontWeight:800,letterSpacing:1}}>lásticos</div><div style={{color:"rgba(255,255,255,.4)",fontSize:10,letterSpacing:1.5}}>Dominicano S.R.L.</div></div></div><div style={{color:"rgba(255,255,255,.5)",fontSize:13,letterSpacing:2,textTransform:"uppercase",marginTop:16}}>Control de Producción</div></div><div style={{background:"rgba(255,255,255,.95)",borderRadius:20,padding:24,marginBottom:20,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:8}}>Código de Supervisor</div><input type="text" value={c} onChange={ev=>{setC(ev.target.value.toUpperCase());setE("")}} onKeyDown={ev=>ev.key==="Enter"&&go()} placeholder="Ej: DLS001" style={{...iS,fontSize:22,textAlign:"center",letterSpacing:6,fontWeight:800,color:B.navy,borderColor:e?B.red:B.border,marginBottom:e?8:16}} onFocus={ev=>ev.target.style.borderColor=B.teal} onBlur={ev=>ev.target.style.borderColor=e?B.red:B.border}/>{e&&<div style={{color:B.red,fontSize:13,fontWeight:600,textAlign:"center",marginBottom:12}}>⚠ {e}</div>}<Btn ch="Entrar →" fn={go} full/></div><div style={{display:"flex",flexDirection:"column",gap:8}}>{SUPERVISORES.map(s=>(<div key={s.codigo} onClick={()=>{setC(s.codigo);setE("")}} style={{background:"rgba(255,255,255,.1)",borderRadius:12,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",border:"1px solid rgba(255,255,255,.15)"}}><div><div style={{color:"#fff",fontSize:14,fontWeight:600}}>{s.nombre}</div><div style={{color:"rgba(255,255,255,.5)",fontSize:12}}>{s.cargo}</div></div><span style={{color:B.tealLight,fontWeight:800,fontSize:14,letterSpacing:1}}>{s.codigo}</span></div>))}</div></div></div>);
}

function Inventario({mat,setMat,movs,setMovs,sup}){
  const [modo,setModo]=useState(false);
  const [sel,setSel]=useState(mat[0].id);
  const [cant,setCant]=useState(""); const [prov,setProv]=useState(""); const [nota,setNota]=useState("");
  const [eMin,setEMin]=useState(null); const [mVal,setMVal]=useState("");
  const save=()=>{if(!cant||Number(cant)<=0)return;const n=Number(cant),m=mat.find(x=>x.id===sel);setMovs(p=>[{id:Date.now(),tipo:"entrada",materialId:sel,materialNombre:m.nombre,cantidad:n,unidad:m.unidad,proveedor:prov,notas:nota,fecha:new Date().toISOString().split("T")[0],supervisor:sup.nombre},...p]);setMat(p=>p.map(x=>x.id===sel?{...x,stockActual:x.stockActual+n}:x));setCant("");setProv("");setNota("");setModo(false);};
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Inventario</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Materia prima en stock</p></div><Btn ch={modo?"✕ Cancelar":"+ Entrada"} fn={()=>setModo(!modo)} color={modo?B.textMid:`linear-gradient(135deg,${B.green},${B.tealDark})`} small/></div>{modo&&<Card accent={B.teal} ch={<><div style={{color:B.teal,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>Nueva Entrada</div><div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:16}}><S label="Material" value={sel} onChange={setSel} options={mat.map(m=>({v:m.id,l:m.nombre}))}/><F label={`Cantidad (${mat.find(m=>m.id===sel)?.unidad})`} value={cant} onChange={setCant} type="number" placeholder="0"/><F label="Proveedor" value={prov} onChange={setProv} placeholder="Nombre del proveedor"/><F label="Notas" value={nota} onChange={setNota} placeholder="Opcional"/></div><Btn ch="✓ Confirmar Entrada" fn={save} color={`linear-gradient(135deg,${B.green},${B.tealDark})`} full/></>}/>}{mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green,pct=Math.min(100,m.stockMinimo>0?(m.stockActual/(m.stockMinimo*3))*100:100);return(<Card key={m.id} style={{border:`1.5px solid ${cr?B.red+"44":bj?B.amber+"44":B.border}`}} ch={<><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}><div><div style={{color:B.textDark,fontSize:16,fontWeight:700}}>{m.nombre}</div><div style={{color:B.textLight,fontSize:12,marginTop:2}}>{m.unidad}</div></div>{(bj||cr)&&<span style={{background:cr?B.red+"15":B.amber+"15",color:cr?B.red:B.amber,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:800}}>{cr?"CRÍTICO":"BAJO"}</span>}</div><div style={{display:"flex",justifyCont function Dashboard({regs,mat,setVista}){
  const tL=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.ldpe)||0),0);
  const tM=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.mlldpe)||0),0);
  const tP=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||0),0);
  const tD=regs.reduce((s,r)=>s+(Number(r.desperdicio)||0)+(Number(r.desperdicioImpresion)||0)+(Number(r.desperdicioCorteRollo)||0)+(Number(r.desperdicioCorte)||0),0);
  const tF=regs.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const tR=regs.filter(r=>r.etapa==="reciclaje").reduce((s,r)=>s+(Number(r.materialRecuperado)||0),0);
  const yld=tP>0?((tP/(tP+tD))*100).toFixed(1):null;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><h2 style={{color:B.textDark,fontSize:22,fontWeight:800,margin:"0 0 2px"}}>Dashboard</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Resumen de producción</p></div>{alts.length>0&&<div style={{background:`${B.red}12`,border:`1.5px solid ${B.red}44`,borderRadius:12,padding:"12px 16px",display:"flex",gap:10,alignItems:"center",cursor:"pointer"}} onClick={()=>setVista("inventario")}><span style={{fontSize:20}}>🚨</span><div style={{flex:1}}><div style={{color:B.red,fontWeight:700,fontSize:14}}>Stock Bajo</div><div style={{color:B.textMid,fontSize:13}}>{alts.map(a=>a.nombre).join(", ")}</div></div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>}<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Stat label="LDPE" value={tL.toFixed(0)} unit="lbs" color={B.teal} sub={`Stock: ${mat.find(m=>m.id==="ldpe")?.stockActual.toFixed(0)} lbs`}/><Stat label="MLLDPE" value={tM.toFixed(0)} unit="lbs" color={B.navy} sub={`Stock: ${mat.find(m=>m.id==="mlldpe")?.stockActual.toFixed(0)} lbs`}/><Stat label="Película" value={tP.toFixed(0)} unit="lbs" color={B.green}/><Stat label="Desperdicios" value={tD.toFixed(0)} unit="lbs" color={B.red}/><Stat label="Fundas" value={tF.toLocaleString()} unit="uds" color={B.tealDark}/><Stat label="Recuperado" value={tR.toFixed(0)} unit="lbs" color="#6B7280"/></div>{yld&&<Card accent={B.green} ch={<><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Eficiencia de Extrusión</div><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{flex:1,height:10,background:B.bg,borderRadius:5,overflow:"hidden"}}><div style={{width:`${yld}%`,height:"100%",background:`linear-gradient(90deg,${B.teal},${B.green})`,borderRadius:5}}/></div><span style={{color:B.green,fontWeight:800,fontSize:20}}>{yld}%</span></div></>}/>}<Card ch={<><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Flujo de Producción</div><div style={{display:"flex",overflowX:"auto",gap:0}}>{ETAPAS.map((e,i)=>{const n=regs.filter(r=>r.etapa===e).length,c=CE[e];return(<div key={e} style={{display:"flex",alignItems:"center",flexShrink:0}}><div style={{background:B.bg,border:`1.5px solid ${c}44`,borderRadius:12,padding:"12px 10px",textAlign:"center",minWidth:72}}><div style={{fontSize:20}}>{ICONOS[e]}</div><div style={{color:c,fontSize:9,fontWeight:700,textTransform:"uppercase",margin:"3px 0"}}>{ETIQUETAS[e]}</div><div style={{color:B.textDark,fontWeight:800,fontSize:20}}>{n}</div></div>{i<ETAPAS.length-1&&<div style={{color:B.border,fontSize:18,padding:"0 3px"}}>›</div>}</div>);})}</div></>}/><Card ch={<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Inventario</div><button onClick={()=>setVista("inventario")} style={{background:"none",border:`1px solid ${B.border}`,color:B.teal,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Ver →</button></div>{mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green;return(<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${B.border}`}}><span style={{color:B.textDark,fontSize:14,fontWeight:600}}>{m.nombre}</span><div style={{display:"flex",alignItems:"center",gap:8}}>{(bj||cr)&&<span>{cr?"🚨":"⚠️"}</span>}<span style={{color:bc,fontWeight:800,fontSize:15}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div></div>);})}</>}/>{regs.length===0&&<Card style={{textAlign:"center",padding:40,border:`1.5px dashed ${B.border}`}} ch={<><div style={{fontSize:40,marginBottom:10}}>📋</div><div style={{color:B.textMid,fontSize:15,fontWeight:700}}>Sin registros aún</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca <strong>Registrar</strong> para agregar el primer turno</div></>}/> }</div>);
}

      </div>
    </div>
    <div style={{padding:"16px 16px 0"}}>
      {vista==="dashboard"&&<Dashboard regs={regs} mat={mat} setVista={setVista}/>}
      {vista==="registro"&&<Registro sup={sup} regs={regs} setRegs={setRegs} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs}/>}
      {vista==="inventario"&&<Inventario mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} sup={sup}/>}
      {vista==="maquinas"&&<Maquinas regs={regs}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:`1px solid ${B.border}`,paddingBottom:"env(safe-area-inset-bottom,0px)",boxShadow:"0 -2px 16px rgba(0,0,0,.08)"}}>
      <div style={{display:"grid",gridTemplateColumns:`repeat(${NAV.length},1fr)`}}>
        {NAV.map(n=>(<button key={n.id} onClick={()=>setVista(n.id)} style={{background:"none",border:"none",padding:"10px 4px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",position:"relative"}}><span style={{fontSize:22,lineHeight:1}}>{n.icon}</span><span style={{fontSize:10,fontWeight:700,color:vista===n.id?B.teal:B.textLight}}>{n.label}</span>{vista===n.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:28,height:3,borderRadius:2,background:B.teal}}/>}{n.badge>0&&<div style={{position:"absolute",top:6,right:"calc(50% - 18px)",background:B.red,color:"#fff",borderRadius:10,width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{n.badge}</div>}</button>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <script>
    if('serviceWorker' in navigator){
      const sw = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
    }
  </script>
</body>
</html>
