async function dbSave(r){
  try{
    await fetch(SUPA_URL+"/rest/v1/registros",{method:"POST",headers:Object.assign({},SH,{"Prefer":"return=minimal"}),body:JSON.stringify({
      id:String(r.id),etapa:r.etapa,fecha:r.fecha,maquina:r.maquina,
      producto:r.producto||null,cliente:r.cliente||null,
      supervisor_codigo:r.supervisorCodigo,supervisor_nombre:r.supervisorNombre,
      empleado:r.empleado||null,turno:r.turno||null,
      ldpe:r.ldpe?Number(r.ldpe):null,mlldpe:r.mlldpe?Number(r.mlldpe):null,
      pelicula:r.pelicula?Number(r.pelicula):null,
      desperdicio:r.desperdicio?Number(r.desperdicio):null,
      rollos_producidos:r.rollosProducidos?Number(r.rollosProducidos):null,
      lbs_impresion:r.lbsImpresion?Number(r.lbsImpresion):null,
      desperdicio_impresion:r.desperdicioImpresion?Number(r.desperdicioImpresion):null,
      lbs_corte_rollo:r.lbsSlitter?Number(r.lbsSlitter):null,

      desperdicio_reciclado:r.desperdicioReciclado?Number(r.desperdicioReciclado):null,
      material_recuperado:r.materialRecuperado?Number(r.materialRecuperado):null,
      notas:r.notas||null
    })});
  }catch(e){console.error("dbSave",e);}
}

      ldpe:x.ldpe,mlldpe:x.mlldpe,pelicula:x.pelicula,desperdicio:x.desperdicio,
      rollosProducidos:x.rollos_producidos,

      desperdicioReciclado:x.desperdicio_reciclado,materialRecuperado:x.material_recuperado,

  }catch(e){console.error("dbLoad",e);return[];}
}

  {sub&&<div style={{color:B.textLight,fontSize:11,marginTop:4}}>{sub}</div>}
</div>);
const F=({label,value,onChange,type,placeholder})=>(<div>
  <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:6}}>{label}</div>

</div>);

  <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:6}}>{label}</div>

  return(<Card style={{padding:0,overflow:"hidden"}} ch={
    <div>
      <div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:12}} onClick={()=>setExp(!exp)}>
        <div style={{width:36,height:36,borderRadius:10,background:c+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ICONOS[log.etapa]||"📝"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
            <Badge label={ETIQUETAS[log.etapa]||log.etapa} color={c}/>
            <span style={{color:B.textLight,fontSize:12}}>{log.maquina}</span>
            {log.turno&&<TurnoBadge turno={log.turno}/>}
          </div>
          <div style={{color:B.textMid,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {log.empleado?log.empleado+" · ":""}{log.producto||log.cliente||"—"} · {log.fecha}
          </div>
        </div>
        <span style={{color:B.textLight,fontSize:14,flexShrink:0}}>{exp?"▲":"▼"}</span>
      </div>
      {exp&&(<div style={{borderTop:"1px solid "+B.border,padding:"12px 14px",background:B.bg}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          {log.empleado&&<Pair k="Operador" v={log.empleado}/>}
          {log.supervisorNombre&&<Pair k="Supervisor" v={log.supervisorNombre.split(" ")[0]}/>}
          {log.turno&&<Pair k="Turno" v={log.turno}/>}
          {log.pelicula&&<Pair k="Película" v={log.pelicula+" lbs"} color={B.green}/>}
          {log.desperdicio&&<Pair k="Desperdicio" v={log.desperdicio+" lbs"} color={B.red}/>}
          {log.rollosProducidos&&<Pair k="Rollos" v={log.rollosProducidos}/>}
          {log.lbsImpresion&&<Pair k="Entrada imp." v={log.lbsImpresion+" lbs"}/>}
          {log.lbsSlitter&&<Pair k="Entrada slitter" v={log.lbsSlitter+" lbs"}/>}
          {log.anchoRollo&&<Pair k="Ancho" v={log.anchoRollo+" mm"}/>}
          {log.bolsasProducidas&&<Pair k="Fundas" v={Number(log.bolsasProducidas).toLocaleString()} color={B.teal}/>}
          {log.desperdicioReciclado&&<Pair k="Entrada rec." v={log.desperdicioReciclado+" lbs"}/>}
          {log.materialRecuperado&&<Pair k="Recuperado" v={log.materialRecuperado+" lbs"} color={B.green}/>}
          {log.notas&&<Pair k="Notas" v={log.notas}/>}
        </div>
        <Btn ch="Eliminar" fn={()=>onDel(log.id)} color={B.red} outline small/>
      </div>)}
    </div>
  }/>);
}

// ── Registro (now includes Mezcla as first stage + auto-stock) ───────────────
function Registro({sup,regs,setRegs,resinaLogs,setResinaLogs,mat,setMat,movs,setMovs,productoLogs,setProductoLogs}){
  const [form,setForm]=useState(F0);
  const [saved,setSaved]=useState(false);
  const [filt,setFilt]=useState("all");
  const set=k=>v=>setForm(f=>{const n=Object.assign({},f,{[k]:v});if(k==="etapa")n.maquina=(MAQUINAS[v]||[""])[0];return n;});

  const pelNeta=()=>{
    if(form.etapa!=="extrusion")return null;
    const p=Number(form.pelicula),n=Number(form.pesoNucleo||PESO_NUCLEO_DEFAULT),r=Number(form.rollosProducidos||0);
    if(!p)return null;
    return Math.max(0,r>0?p-(r*n):p).toFixed(2);
  };

  // Mezcla helpers
  const ldpeStock=(mat.find(m=>m.id==="ldpe")||{stockActual:0}).stockActual;
  const mlldpeStock=(mat.find(m=>m.id==="mlldpe")||{stockActual:0}).stockActual;
  const mezTotal=()=>{const l=Number(form.ldpeMezcla||0),m=Number(form.mlldpeMezcla||0);return l+m;};
  const mezPct=()=>{const t=mezTotal();if(!t)return null;return((Number(form.ldpeMezcla||0)/t)*100).toFixed(1);};

  const save=()=>{
    // Mezcla save logic
    if(form.etapa==="mezcla"){
      if(!form.ldpeMezcla&&!form.mlldpeMezcla)return;
      const b={id:Date.now(),fecha:form.fecha,ldpe:Number(form.ldpeMezcla)||0,mlldpe:Number(form.mlldpeMezcla)||0,total:mezTotal(),lote:form.lote,empleado:form.empleado,turno:form.turno,notas:form.notas,supervisorNombre:sup.nombre};
      [["ldpe",b.ldpe],["mlldpe",b.mlldpe]].forEach(([id,val])=>{
        if(!val)return;
        const m=mat.find(x=>x.id===id);
        if(!m)return;
        setMat(p=>p.map(x=>x.id===id?Object.assign({},x,{stockActual:Math.max(0,x.stockActual-val)}):x));
        setMovs(p=>[{id:Date.now()+Math.random(),tipo:"descuento",materialId:id,materialNombre:m.nombre,cantidad:val,unidad:m.unidad,maquina:"Mezcla",fecha:b.fecha,supervisor:sup.nombre,notas:"Lote: "+(b.lote||"—")},...p]);
      });
      setResinaLogs(p=>[b,...p]);
      dbSaveResina(b);
      setSaved(true);setTimeout(()=>setSaved(false),2000);
      setForm(Object.assign({},F0,{etapa:"mezcla",maquina:"MEZ-1",empleado:form.empleado,turno:form.turno}));
      return;
    }

    // Regular production save
    const r=Object.assign({},form,{id:Date.now(),supervisorNombre:sup.nombre,supervisorCodigo:sup.codigo});
    setRegs(p=>[r,...p]);
    dbSave(r);

    // Auto-stock: cortadora → bags, slitter → rolls go to almacén automatically
    if(form.etapa==="cortadora"&&Number(form.bolsasProducidas)>0){
      const entry={id:Date.now()+1,fecha:form.fecha,producto:form.producto||"Producto",cantidad:Number(form.bolsasProducidas),unidad:"uds",tipo:"entrada",destino:"",ordenId:"",notas:"Auto: Cortadora "+form.maquina,supervisor:sup.nombre,registroRef:r.id};
      setProductoLogs(p=>[entry,...p]);
      dbSaveProducto(entry);
    }
    if(form.etapa==="slitter"&&Number(form.rollosProducidos)>0){

        {form.etapa==="slitter"&&<div>

        {form.etapa==="reciclaje"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <F label="Entrada (lbs)" value={form.desperdicioReciclado} onChange={set("desperdicioReciclado")} type="number" placeholder="0"/>
          <F label="Recuperado (lbs)" value={form.materialRecuperado} onChange={set("materialRecuperado")} type="number" placeholder="0"/>
        </div>}

        <F label="Notas (opcional)" value={form.notas} onChange={set("notas")} placeholder="Observaciones..."/>
        <Btn ch={form.etapa==="mezcla"?"✓ Confirmar Lote":"+ Guardar Registro"} fn={save} full color={form.etapa==="mezcla"?"linear-gradient(135deg,"+B.purple+","+B.navy+")":undefined}/>
      </div>
    </div>}/>

    {/* Records list */}
    <div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Registros ({(filt==="mezcla"?filMezcla.length:filt==="all"?filRegs.length+filMezcla.length:filRegs.length)})</div>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,marginBottom:12,scrollbarWidth:"none"}}>
        {["all",...ETAPAS].map(e=>(<button key={e} onClick={()=>setFilt(e)} style={{background:filt===e?(CE[e]||B.teal):"transparent",border:"1.5px solid "+(filt===e?(CE[e]||B.teal):B.border),borderRadius:20,padding:"7px 14px",color:filt===e?"#fff":B.textMid,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{e==="all"?"Todos":ETIQUETAS[e]}</button>))}

              </div>

        </div>}/>))}

      {/* Regular production rows */}
      {filRegs.length===0&&filMezcla.length===0?<Card style={{textAlign:"center",padding:32,border:"1.5px dashed "+B.border}} ch={<div style={{color:B.textLight,fontSize:14}}>Sin registros aún.</div>}/>
      :<div style={{display:"flex",flexDirection:"column",gap:8}}>{filRegs.map(r=><LogRow key={r.id} log={r} onDel={id=>{setRegs(p=>p.filter(x=>x.id!==id));dbDelete(id);}}/>)}</div>}
    </div>
  </div>);
}

// ── Órdenes (with shipment tracking) ──────────────────────────────────────────
const ETAPAS_ORDEN=["pendiente","mezcla","extrusion","impresion","slitter","cortadora","listo"];
const ETIQ_ORDEN={pendiente:"Pendiente",mezcla:"🧪 Mezcla",extrusion:"Extrusión",impresion:"Impresión",slitter:"Slitter",cortadora:"Cortadora",listo:"✓ Listo",enviado:"📦 Enviado"};
const COLOR_ORDEN={pendiente:B.textLight,mezcla:"#7C3AED",extrusion:B.teal,impresion:B.navy,slitter:B.tealDark,cortadora:"#4E7C59",listo:B.green,enviado:B.navy};

function Ordenes({ordenes,setOrdenes,productoLogs,setProductoLogs,sup}){
  const [modo,setModo]=useState(false);
  const [exp,setExp]=useState(null);
  const [envioId,setEnvioId]=useState(null); // order id being shipped
  const [envioItems,setEnvioItems]=useState([]); // [{producto,cantidad,unidad}]
  const [envioFecha,setEnvioFecha]=useState(new Date().toISOString().split("T")[0]);
  const [form,setForm]=useState({cliente:"",fechaEnvio:"",puerto:TODOS_PUERTOS[0].v,notas:"",items:[{producto:"",cantidad:"",unidad:"uds"}]});
  const addItem=()=>setForm(f=>Object.assign({},f,{items:[...f.items,{producto:"",cantidad:"",unidad:"uds"}]}));
  const setItem=(i,k,v)=>setForm(f=>{const it=[...f.items];it[i]=Object.assign({},it[i],{[k]:v});return Object.assign({},f,{items:it});});
  const removeItem=i=>setForm(f=>Object.assign({},f,{items:f.items.filter((_,x)=>x!==i)}));
  const save=()=>{
    if(!form.cliente||form.items.some(x=>!x.producto))return;
    const o={id:Date.now(),cliente:form.cliente,fechaEnvio:form.fechaEnvio,puerto:form.puerto,notas:form.notas,items:form.items,etapa:"pendiente",creadoPor:sup.nombre,creadoEn:new Date().toISOString().split("T")[0],envios:[]};
    setOrdenes(p=>[o,...p]);
    dbSaveOrder(o);
    setForm({cliente:"",fechaEnvio:"",puerto:TODOS_PUERTOS[0].v,notas:"",items:[{producto:"",cantidad:"",unidad:"uds"}]});
    setModo(false);
  };
  const avanzar=o=>{
    const idx=ETAPAS_ORDEN.indexOf(o.etapa);
    if(idx>=ETAPAS_ORDEN.length-1)return;
    const next=ETAPAS_ORDEN[idx+1];
    setOrdenes(p=>p.map(x=>x.id===o.id?Object.assign({},x,{etapa:next}):x));
    dbUpdateOrder(o.id,{etapa:next});
  };
  const eliminar=id=>{setOrdenes(p=>p.filter(x=>x.id!==id));dbDeleteOrder(id);};

  // Start shipment flow
  const iniciarEnvio=o=>{
    setEnvioId(o.id);
    setEnvioFecha(new Date().toISOString().split("T")[0]);
    setEnvioItems((o.items||[]).map(it=>({producto:it.producto,cantidad:"",unidad:it.unidad,max:Number(it.cantidad||0)})));
  };

  // Calculate already shipped per product for an order
  const enviadoPorProducto=(o,producto)=>{
    if(!o.envios)return 0;
    return o.envios.reduce((s,env)=>{
      return s+(env.items||[]).filter(it=>it.producto===producto).reduce((ss,it)=>ss+Number(it.cantidad||0),0);
    },0);
  };

  // Confirm shipment
  const confirmarEnvio=()=>{
    const o=ordenes.find(x=>x.id===envioId);
    if(!o)return;
    const itemsEnviados=envioItems.filter(it=>Number(it.cantidad)>0).map(it=>({producto:it.producto,cantidad:Number(it.cantidad),unidad:it.unidad}));
    if(itemsEnviados.length===0)return;
    const envio={id:Date.now(),fecha:envioFecha,supervisor:sup.nombre,items:itemsEnviados};
    const newEnvios=[...(o.envios||[]),envio];

    // Check if fully shipped
    const allItems=o.items||[];
    let fullyShipped=true;
    allItems.forEach(it=>{
      const totalEnv=enviadoPorProducto(o,it.producto)+itemsEnviados.filter(e=>e.producto===it.producto).reduce((s,e)=>s+e.cantidad,0);
      if(totalEnv<Number(it.cantidad||0))fullyShipped=false;
    });

    const newEtapa=fullyShipped?"enviado":"listo";
    setOrdenes(p=>p.map(x=>x.id===envioId?Object.assign({},x,{envios:newEnvios,etapa:newEtapa}):x));
    dbUpdateOrder(o.id,{etapa:newEtapa,envios:JSON.stringify(newEnvios)});

    // Deduct from stock (create salida entries)
    itemsEnviados.forEach(it=>{
      const entry={id:Date.now()+Math.random(),fecha:envioFecha,producto:it.producto,cantidad:it.cantidad,unidad:it.unidad,tipo:"salida",destino:o.cliente+" → "+o.puerto,ordenId:String(o.id),notas:"Envío orden #"+String(o.id).slice(-4),supervisor:sup.nombre};
      setProductoLogs(p=>[entry,...p]);
      dbSaveProducto(entry);
    });

    setEnvioId(null);
    setEnvioItems([]);
  };

  const abiertas=ordenes.filter(o=>o.etapa!=="listo"&&o.etapa!=="enviado");
  const listas=ordenes.filter(o=>o.etapa==="listo");
  const enviadas=ordenes.filter(o=>o.etapa==="enviado");
  const esTerresetre=p=>PUERTOS_TERRESTRES.includes(p);

  const renderOrderCard=(o,section)=>{
    const ei=ETAPAS_ORDEN.indexOf(o.etapa==="enviado"?"listo":o.etapa);
    const c=COLOR_ORDEN[o.etapa];
    const items=o.items||[];
    const terrestre=esTerresetre(o.puerto);
    const isExp=exp===o.id;
    return(<Card key={o.id} accent={c} ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,cursor:"pointer"}} onClick={()=>setExp(isExp?null:o.id)}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <Badge label={o.etapa==="enviado"?"📦 Enviado":ETIQ_ORDEN[o.etapa]} color={c}/>
            {o.fechaEnvio&&<span style={{color:B.textLight,fontSize:12}}>📅 {o.fechaEnvio}</span>}
          </div>
          <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>{o.cliente}</div>
          {o.puerto&&<div style={{color:B.textLight,fontSize:12,marginTop:2}}>{terrestre?"🛣️":"🚢"} {o.puerto}</div>}
        </div>
        <span style={{color:B.textLight,fontSize:14}}>{isExp?"▲":"▼"}</span>
      </div>
      {section==="activas"&&<div>
        <div style={{display:"flex",gap:2,marginBottom:4}}>
          {ETAPAS_ORDEN.map((e,i)=>{const done=i<=ei,curr=i===ei;return(<div key={e} style={{flex:1,height:5,borderRadius:3,background:done?(curr?c:B.green):B.border}}/>);})}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:B.textLight,marginBottom:10}}><span>Inicio</span><span style={{color:B.green,fontWeight:700}}>Listo</span></div>
      </div>}
      <div style={{marginBottom:8}}>
        {items.slice(0,isExp?99:2).map((it,i)=>{
          const env=enviadoPorProducto(o,it.producto);
          return(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+B.border}}>
            <span style={{color:B.textDark,fontSize:13,fontWeight:600}}>{it.producto}</span>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {env>0&&<span style={{color:B.navy,fontSize:11,fontWeight:700}}>({env} enviado)</span>}
              <span style={{color:B.teal,fontWeight:800,fontSize:13}}>{Number(it.cantidad||0).toLocaleString()} {it.unidad}</span>
            </div>
          </div>);
        })}
        {!isExp&&items.length>2&&<div style={{color:B.textLight,fontSize:12,marginTop:4}}>+{items.length-2} más...</div>}
      </div>
      {isExp&&<div>
        {o.notas&&<div style={{color:B.textMid,fontSize:13,background:B.bg,borderRadius:8,padding:"8px 10px",marginBottom:10}}>📝 {o.notas}</div>}
        <div style={{color:B.textLight,fontSize:11,marginBottom:10}}>Creado por {o.creadoPor} · {o.creadoEn}</div>

        {/* Shipment history */}
        {(o.envios||[]).length>0&&<div style={{marginBottom:12}}>
          <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:6}}>Envíos realizados</div>
          {o.envios.map((env,ei)=>(<div key={ei} style={{background:B.bg,borderRadius:10,padding:"10px 12px",marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{color:B.navy,fontSize:12,fontWeight:800}}>📦 Envío {ei+1}</span>
              <span style={{color:B.textLight,fontSize:11}}>{env.fecha} · {env.supervisor}</span>
            </div>
            {(env.items||[]).map((it,ii)=>(<div key={ii} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"2px 0"}}>
              <span style={{color:B.textMid}}>{it.producto}</span>
              <span style={{color:B.navy,fontWeight:700}}>{Number(it.cantidad).toLocaleString()} {it.unidad}</span>
            </div>))}
          </div>))}
        </div>}

        {/* Envio form inline */}
        {envioId===o.id&&<div style={{background:B.navy+"08",border:"1.5px solid "+B.navy+"33",borderRadius:12,padding:"14px",marginBottom:10}}>
          <div style={{color:B.navy,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Registrar Envío</div>
          <F label="Fecha de Envío" value={envioFecha} onChange={setEnvioFecha} type="date"/>
          <div style={{marginTop:10}}>
            {envioItems.map((it,i)=>{
              const yaEnv=enviadoPorProducto(o,it.producto);
              const restante=it.max-yaEnv;
              return(<div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                <div style={{flex:1}}><span style={{color:B.textDark,fontSize:13,fontWeight:700}}>{it.producto}</span><span style={{color:B.textLight,fontSize:11,marginLeft:6}}>(máx: {restante} {it.unidad})</span></div>
                <input type="number" value={it.cantidad} onChange={e=>{const v=Math.min(Number(e.target.value),restante);setEnvioItems(p=>{const n=[...p];n[i]=Object.assign({},n[i],{cantidad:v>0?String(v):""});return n;});}} placeholder="0" style={Object.assign({},iS,{width:80,padding:"8px 10px",fontSize:14,textAlign:"center"})}/>
              </div>);
            })}
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <Btn ch="✓ Confirmar Envío" fn={confirmarEnvio} color={B.navy} small/>
            <Btn ch="Cancelar" fn={()=>setEnvioId(null)} color={B.textMid} outline small/>
          </div>
        </div>}

        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {o.etapa!=="listo"&&o.etapa!=="enviado"&&<Btn ch={"Avanzar → "+(ETIQ_ORDEN[ETAPAS_ORDEN[ei+1]]||"")} fn={()=>avanzar(o)} color={B.green} small/>}
          {o.etapa==="listo"&&envioId!==o.id&&<Btn ch="📦 Enviar" fn={()=>iniciarEnvio(o)} color={B.navy} small/>}
          <Btn ch="Eliminar" fn={()=>eliminar(o.id)} color={B.red} outline small/>
        </div>
      </div>}
    </div>}/>);
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Órdenes de Producción</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>{abiertas.length} activas · {listas.length} listas · {enviadas.length} enviadas</p></div>
      <Btn ch={modo?"✕ Cancelar":"+ Nueva"} fn={()=>setModo(!modo)} color={modo?B.textMid:("linear-gradient(135deg,"+B.teal+","+B.navy+")")} small/>
    </div>

    {modo&&<Card accent={B.teal} ch={<div>
      <div style={{color:B.teal,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:16}}>Nueva Orden de Producción</div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <F label="Cliente" value={form.cliente} onChange={v=>setForm(f=>Object.assign({},f,{cliente:v}))} placeholder="Ej: Ouesplast"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <F label="Fecha de Envío" value={form.fechaEnvio} onChange={v=>setForm(f=>Object.assign({},f,{fechaEnvio:v}))} type="date"/>
          <S label="Puerto / Destino" value={form.puerto} onChange={v=>setForm(f=>Object.assign({},f,{puerto:v}))} options={TODOS_PUERTOS}/>
        </div>
        {esTerresetre(form.puerto)&&<div style={{background:B.amber+"12",border:"1px solid "+B.amber+"33",borderRadius:10,padding:"10px 12px",fontSize:13,color:B.amber,fontWeight:600}}>🛣️ Frontera terrestre — verificar documentación de aduana</div>}
        <div>
          <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:10}}>Productos de la Orden</div>
          {form.items.map((it,i)=>(<div key={i} style={{background:B.bg,borderRadius:12,padding:"12px",marginBottom:8}}>
            <div style={{marginBottom:8}}><F label={"Producto "+(i+1)} value={it.producto} onChange={v=>setItem(i,"producto",v)} placeholder="Ej: Eau Lakay"/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <F label="Cantidad" value={it.cantidad} onChange={v=>setItem(i,"cantidad",v)} type="number" placeholder="0"/>
              <S label="Unidad" value={it.unidad} onChange={v=>setItem(i,"unidad",v)} options={[{v:"uds",l:"Unidades"},{v:"lbs",l:"Libras"},{v:"rollos",l:"Rollos"},{v:"bolsas",l:"Bolsas"}]}/>
            </div>
            {form.items.length>1&&<button onClick={()=>removeItem(i)} style={{background:"none",border:"1px solid "+B.red+"44",color:B.red,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>✕ Quitar</button>}
          </div>))}
          <button onClick={addItem} style={{background:"none",border:"1.5px dashed "+B.teal,borderRadius:10,padding:"10px",width:"100%",color:B.teal,fontWeight:700,cursor:"pointer",fontSize:13}}>+ Agregar Producto</button>
        </div>
        <F label="Notas" value={form.notas} onChange={v=>setForm(f=>Object.assign({},f,{notas:v}))} placeholder="Instrucciones especiales..."/>
        <Btn ch="📋 Crear Orden" fn={save} full/>
      </div>
    </div>}/>}

    {abiertas.length===0&&listas.length===0&&!modo&&<Card style={{textAlign:"center",padding:32,border:"1.5px dashed "+B.border}} ch={<div><div style={{fontSize:36,marginBottom:8}}>📋</div><div style={{color:B.textMid,fontSize:14,fontWeight:700}}>Sin órdenes activas</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca "+ Nueva" para registrar una orden</div></div>}/>}

    {abiertas.map(o=>renderOrderCard(o,"activas"))}

    {listas.length>0&&<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Listas para Envío ({listas.length})</div>
      {listas.map(o=>renderOrderCard(o,"listas"))}
    </div>}

    {enviadas.length>0&&<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Enviadas ({enviadas.length})</div>
      {enviadas.map(o=>renderOrderCard(o,"enviadas"))}
    </div>}
  </div>);
}

// ── Rendimiento — by employee ────────────────────────────────────────────────
function Rendimiento({regs,resinaLogs}){
  const [periodo,setPeriodo]=useState("diario");
  const [etapa,setEtapa]=useState("all");
  const [maquinaFil,setMaquinaFil]=useState("all");
  const [vista,setVistaR]=useState("empleados"); // "empleados" | "supervisores" | "maquinas"
  const [fechaCustom,setFechaCustom]=useState("");

  const hoy=new Date().toISOString().split("T")[0];
  const semanaAtras=new Date(Date.now()-7*86400000).toISOString().split("T")[0];
  const mesAtras=new Date(Date.now()-30*86400000).toISOString().split("T")[0];

  // All machines flat list
  const todasMaquinas=Object.values(MAQUINAS).flat();

  const filtFecha=r=>{
    const fecha=fechaCustom||null;
    if(fecha)return r.fecha===fecha;
    if(periodo==="diario")return r.fecha===hoy;
    if(periodo==="semanal")return r.fecha>=semanaAtras;
    return r.fecha>=mesAtras;
  };
  const base=regs.filter(filtFecha)
    .filter(r=>etapa==="all"||r.etapa===etapa)
    .filter(r=>maquinaFil==="all"||r.maquina===maquinaFil);

  // Aggregate by employee (free text) OR supervisor
  const byEmpleado=useMemo(()=>{
    const m={};
    base.forEach(r=>{
      const key=r.empleado?(r.empleado.trim()||"Sin nombre"):("SUP: "+r.supervisorNombre.split(" ")[0]);
      const emp=EMPLEADOS.find(e=>e.nombre===key);
      if(!m[key])m[key]={nombre:key,cargo:emp?emp.cargo:"",area:emp?emp.area:"general",esSup:!r.empleado,registros:0,pelicula:0,fundas:0,rollos:0,desperdicio:0,turnos:new Set(),etapas:new Set(),maquinas:new Set()};
      m[key].registros++;
      m[key].pelicula+=Number(r.pelicula||0);
      m[key].fundas+=Number(r.bolsasProducidas||0);
      m[key].rollos+=Number(r.rollosProducidos||0);
      m[key].desperdicio+=Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioSlitter||0)+Number(r.desperdicioCorte||0);
      if(r.turno)m[key].turnos.add(r.turno.includes("Noche")?"🌙 Noche":"☀️ Día");
      m[key].etapas.add(ETIQUETAS[r.etapa]||r.etapa);
      if(r.maquina)m[key].maquinas.add(r.maquina);
    });
    return Object.values(m).sort((a,b)=>b.registros-a.registros);
  },[base]);

  // Aggregate by machine
  const byMaquina=useMemo(()=>{
    const allRegs=regs.filter(filtFecha).filter(r=>etapa==="all"||r.etapa===etapa);
    const m={};
    todasMaquinas.forEach(mq=>{
      const etapaKey=Object.entries(MAQUINAS).find(([,v])=>v.includes(mq))?.[0]||"";
      m[mq]={maquina:mq,etapa:etapaKey,registros:0,pelicula:0,fundas:0,rollos:0,desperdicio:0,lbsImpresion:0,turnos:new Set(),operadores:new Set()};
    });
    allRegs.forEach(r=>{
      if(!r.maquina||!m[r.maquina])return;
      m[r.maquina].registros++;
      m[r.maquina].pelicula+=Number(r.pelicula||0);
      m[r.maquina].fundas+=Number(r.bolsasProducidas||0);
      m[r.maquina].rollos+=Number(r.rollosProducidos||0);
      m[r.maquina].lbsImpresion+=Number(r.lbsImpresion||0);
      m[r.maquina].desperdicio+=Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioSlitter||0)+Number(r.desperdicioCorte||0);
      if(r.turno)m[r.maquina].turnos.add(r.turno.includes("Noche")?"🌙":"☀️");
      if(r.empleado)m[r.maquina].operadores.add(r.empleado.split(" ")[0]);
    });
    return Object.values(m).sort((a,b)=>b.registros-a.registros);
  },[regs,etapa,periodo,fechaCustom]);

  const bySup=useMemo(()=>{
    const m={};
    SUPERVISORES.forEach(s=>{m[s.codigo]={nombre:s.nombre,codigo:s.codigo,registros:0,pelicula:0,fundas:0,desperdicio:0};});
    base.forEach(r=>{const k=r.supervisorCodigo;if(!m[k])return;m[k].registros++;m[k].pelicula+=Number(r.pelicula||0);m[k].fundas+=Number(r.bolsasProducidas||0);m[k].desperdicio+=Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioSlitter||0)+Number(r.desperdicioCorte||0);});
    return Object.values(m).sort((a,b)=>b.registros-a.registros);
  },[base]);

  const lista=vista==="empleados"?byEmpleado:vista==="maquinas"?byMaquina:bySup;
  const maxReg=Math.max(...lista.map(s=>s.registros),1);
  const maxFundas=Math.max(...lista.map(s=>s.fundas),1);
  const maxFilm=Math.max(...lista.map(s=>s.pelicula),1);

  const totalRegs=base.length;
  const totalFilm=base.reduce((s,r)=>s+Number(r.pelicula||0),0);
  const totalFundas=base.reduce((s,r)=>s+Number(r.bolsasProducidas||0),0);
  const totalDesp=base.reduce((s,r)=>s+Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioSlitter||0)+Number(r.desperdicioCorte||0),0);
  const periodoLabel=fechaCustom?fechaCustom:(periodo==="diario"?"hoy":periodo==="semanal"?"esta semana":"este mes");
  const perLabel={diario:"hoy",semanal:"esta semana",mensual:"este mes"};

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Rendimiento del Equipo</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Por empleado y por supervisor</p></div>

    {/* Period */}
    <div style={{display:"flex",gap:8}}>
      {["diario","semanal","mensual"].map(p=>(<button key={p} onClick={()=>setPeriodo(p)} style={{flex:1,background:periodo===p?("linear-gradient(135deg,"+B.teal+","+B.navy+")"):"#fff",border:"1.5px solid "+(periodo===p?B.teal:B.border),borderRadius:12,padding:"10px 6px",color:periodo===p?"#fff":B.textMid,fontSize:13,fontWeight:700,cursor:"pointer"}}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>))}
    </div>

    {/* View toggle */}
    <div style={{display:"flex",background:B.bg,borderRadius:12,padding:4,gap:3}}>
      {[{id:"empleados",label:"👷 Empleado"},{id:"maquinas",label:"⚙️ Máquina"},{id:"supervisores",label:"🎖️ Supervisor"}].map(v=>(<button key={v.id} onClick={()=>setVistaR(v.id)} style={{flex:1,background:vista===v.id?"#fff":"transparent",border:"none",borderRadius:10,padding:"9px 4px",color:vista===v.id?B.textDark:B.textLight,fontSize:12,fontWeight:700,cursor:"pointer",boxShadow:vista===v.id?"0 1px 4px rgba(0,0,0,.1)":"none"}}>{v.label}</button>))}
    </div>

    {/* Stage filter */}
    <div style={{display:"flex",gap:7,overflowX:"auto",scrollbarWidth:"none"}}>
      {["all",...ETAPAS].map(e=>(<button key={e} onClick={()=>setEtapa(e)} style={{background:etapa===e?(CE[e]||B.teal):"transparent",border:"1.5px solid "+(etapa===e?(CE[e]||B.teal):B.border),borderRadius:20,padding:"7px 12px",color:etapa===e?"#fff":B.textMid,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{e==="all"?"Todas":ETIQUETAS[e]}</button>))}
    </div>

    {/* Machine filter */}
    <div style={{display:"flex",gap:7,overflowX:"auto",scrollbarWidth:"none",alignItems:"center"}}>
      <span style={{color:B.textLight,fontSize:11,fontWeight:700,flexShrink:0}}>⚙️</span>
      {["all",...todasMaquinas].map(mq=>(<button key={mq} onClick={()=>setMaquinaFil(mq)} style={{background:maquinaFil===mq?B.navy:"transparent",border:"1.5px solid "+(maquinaFil===mq?B.navy:B.border),borderRadius:20,padding:"6px 11px",color:maquinaFil===mq?"#fff":B.textMid,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{mq==="all"?"Todas":mq}</button>))}
    </div>

    {/* Custom date picker */}
    <div style={{display:"flex",alignItems:"center",gap:8,background:B.card,border:"1.5px solid "+B.border,borderRadius:12,padding:"9px 14px"}}>
      <span style={{fontSize:14}}>📅</span>
      <span style={{color:B.textMid,fontSize:12,fontWeight:600,flex:1}}>Fecha específica</span>
      <input type="date" value={fechaCustom} onChange={e=>{setFechaCustom(e.target.value);}} style={{border:"none",background:"transparent",color:B.teal,fontSize:12,fontWeight:700,cursor:"pointer"}}/>
      {fechaCustom&&<button onClick={()=>setFechaCustom("")} style={{background:"none",border:"none",color:B.textLight,fontSize:12,cursor:"pointer",padding:0}}>✕</button>}
    </div>

    {/* Totals */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Registros" value={totalRegs} unit="" color={B.teal} sub={periodoLabel}/>
      <Stat label="Película" value={totalFilm.toFixed(0)} unit="lbs" color={B.green} sub={periodoLabel}/>
      <Stat label="Fundas" value={totalFundas.toLocaleString()} unit="uds" color={B.navy} sub={periodoLabel}/>
      <Stat label="Desperdicio" value={totalDesp.toFixed(0)} unit="lbs" color={B.red} sub={periodoLabel}/>
    </div>

    {/* Bars */}
    <Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:14}}>
        {vista==="empleados"?"👷 Por Empleado":vista==="maquinas"?"⚙️ Por Máquina":"🎖️ Por Supervisor"}
        {maquinaFil!=="all"&&<span style={{color:B.teal,marginLeft:8}}>{maquinaFil}</span>}
        {fechaCustom&&<span style={{color:B.amber,marginLeft:8,fontWeight:600}}>{fechaCustom}</span>}
      </div>
      {lista.every(s=>s.registros===0)?
        <div style={{textAlign:"center",padding:24,color:B.textLight,fontSize:14}}>Sin datos para {perLabel[periodo]}</div>:
        lista.map(s=>{
          const pctR=(s.registros/maxReg)*100;
          const pctF=maxFundas>0?(s.fundas/maxFundas)*100:0;
          const pctP=maxFilm>0?(s.pelicula/maxFilm)*100:0;
          const turnos=s.turnos?Array.from(s.turnos).join(" · "):"";
          const etapasList=s.etapas?Array.from(s.etapas).join(", "):"";
          return(<div key={s.nombre||s.codigo} style={{marginBottom:20,paddingBottom:20,borderBottom:"1px solid "+B.border}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{flex:1}}>
                {vista==="maquinas"
                  ?<div>
                    <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>{s.maquina}</div>
                    <div style={{color:CE[s.etapa]||B.teal,fontSize:11,fontWeight:700,marginTop:1}}>{ETIQUETAS[s.etapa]||s.etapa}</div>
                    <div style={{color:B.textLight,fontSize:11,marginTop:2}}>{Array.from(s.turnos).join(" ")+" · "}{Array.from(s.operadores).slice(0,3).join(", ")}{s.operadores.size>3?"...":""}</div>
                  </div>
                  :<div>
                    <div style={{color:B.textDark,fontSize:14,fontWeight:800}}>{s.nombre.split(" ")[0]} {s.nombre.split(" ")[1]||""}</div>
                    {vista==="empleados"?<div>
                      {s.cargo&&<div style={{color:B.teal,fontSize:11,fontWeight:700,marginTop:1}}>{s.cargo}</div>}
                      <div style={{color:B.textLight,fontSize:11,marginTop:2}}>{turnos&&turnos+" · "}{s.maquinas&&Array.from(s.maquinas).join(", ")}</div>
                    </div>:
                      <div style={{color:B.textLight,fontSize:11,marginTop:2}}>{s.codigo}</div>
                    }
                  </div>
                }
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:B.teal,fontWeight:800,fontSize:18}}>{s.registros}</div>
                <div style={{color:B.textLight,fontSize:10}}>registros</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
              <span style={{color:B.textLight,fontSize:11,width:58,flexShrink:0}}>Registros</span>
              <div style={{flex:1,height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:pctR+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.tealLight+")",borderRadius:4}}/></div>
              <span style={{color:B.textDark,fontSize:12,fontWeight:700,width:24,textAlign:"right"}}>{s.registros}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
              <span style={{color:B.textLight,fontSize:11,width:58,flexShrink:0}}>Fundas</span>
              <div style={{flex:1,height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:pctF+"%",height:"100%",background:"linear-gradient(90deg,"+B.navy+",#6B85B8)",borderRadius:4}}/></div>
              <span style={{color:B.textDark,fontSize:12,fontWeight:700,width:48,textAlign:"right"}}>{s.fundas>0?s.fundas.toLocaleString():"—"}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{color:B.textLight,fontSize:11,width:58,flexShrink:0}}>Película</span>

    {/* Ranking */}
    {base.length>0&&lista.some(s=>s.registros>0)&&<Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>🏆 Ranking {perLabel[periodo]}</div>
      {lista.filter(s=>s.registros>0).map((s,i)=>{
        const medals=["🥇","🥈","🥉"];
        return(<div key={s.nombre||s.codigo} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<lista.filter(x=>x.registros>0).length-1?"1px solid "+B.border:"none"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:i===0?"linear-gradient(135deg,#F6E05E,#D97706)":i===1?"linear-gradient(135deg,#CBD5E0,#718096)":i===2?"linear-gradient(135deg,#C05621,#9C4221)":B.bg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:i<3?14:12,color:i<3?"#fff":B.textLight,flexShrink:0}}>{i<3?medals[i]:i+1}</div>
          <div style={{flex:1}}>
            <div style={{color:B.textDark,fontSize:14,fontWeight:700}}>{s.nombre.split(" ")[0]} {s.nombre.split(" ")[1]||""}</div>
            {s.cargo&&<div style={{color:B.teal,fontSize:11,fontWeight:600}}>{s.cargo}</div>}
            <div style={{color:B.textLight,fontSize:12}}>
              {s.registros} registros
              {s.fundas>0?" · "+s.fundas.toLocaleString()+" fundas":""}
              {s.pelicula>0?" · "+s.pelicula.toFixed(0)+" lbs film":""}
            </div>
          </div>
          {i===0&&<span style={{fontSize:20}}>⭐</span>}
        </div>);
      })}
    </div>}/>}
  </div>);
}

    <div style={{display:"flex",background:B.bg,borderRadius:12,padding:4,gap:3}}>

      <button onClick={()=>setSeccion("prima")} style={{flex:1,background:seccion==="prima"?"#fff":"transparent",border:"none",borderRadius:10,padding:"10px 4px",color:seccion==="prima"?B.textDark:B.textLight,fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:seccion==="prima"?"0 1px 4px rgba(0,0,0,.1)":"none"}}>📦 Materia Prima</button>

function ProductoTerminado({logs,setLogs,ordenes,sup}){
  const [modo,setModo]=useState(false); // "entrada" | "salida" | false
  const [saved,setSaved]=useState(false);
  const [filProd,setFilProd]=useState("all");
  const F0p={fecha:new Date().toISOString().split("T")[0],producto:"Eau Lakay",cantidad:"",unidad:"uds",tipo:"entrada",destino:"",ordenId:"",notas:""};
  const [form,setForm]=useState(F0p);
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  // Summary per product: total produced, total shipped, in warehouse
  const resumen=React.useMemo(()=>{
    const m={};
    PRODUCTOS.filter(p=>p!=="Otro").forEach(p=>{m[p]={producto:p,producido:0,enviado:0,ajuste:0};});
    logs.forEach(l=>{
      if(!m[l.producto])m[l.producto]={producto:l.producto,producido:0,enviado:0,ajuste:0};
      if(l.tipo==="entrada")m[l.producto].producido+=l.cantidad;
      else if(l.tipo==="salida")m[l.producto].enviado+=l.cantidad;
      else if(l.tipo==="ajuste")m[l.producto].ajuste+=l.cantidad;
    });
    return Object.values(m).map(p=>({...p,almacen:p.producido-p.enviado+p.ajuste}))
      .filter(p=>p.producido>0||logs.some(l=>l.producto===p.producto));
  },[logs]);

  const save=()=>{
    if(!form.cantidad||!form.producto)return;
    const entry={id:Date.now(),fecha:form.fecha,producto:form.producto,cantidad:Number(form.cantidad),
      unidad:form.unidad,tipo:form.tipo,destino:form.destino,ordenId:form.ordenId,
      notas:form.notas,supervisor:sup.nombre};
    setLogs(p=>[entry,...p]);
    dbSaveProducto(entry);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
    setForm(Object.assign({},F0p,{producto:form.producto,tipo:form.tipo}));
    setModo(false);
  };

  const del=id=>{setLogs(p=>p.filter(x=>x.id!==id));dbDeleteProducto(id);};

  const prodFil=filProd==="all"?logs:logs.filter(l=>l.producto===filProd);
  const totalAlmacen=resumen.reduce((s,r)=>s+Math.max(0,r.almacen),0);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>📦 Producto Terminado</h2>
        <p style={{color:B.textLight,fontSize:13,margin:0}}>Producido · Enviado · En almacén</p>
      </div>
      {saved&&<span style={{background:B.green+"18",color:B.green,borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:700}}>✓ Guardado</span>}
    </div>

    {/* Summary cards */}
    {resumen.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
      {resumen.map(r=>{
        const pct=r.producido>0?(r.enviado/r.producido*100).toFixed(0):0;
        const enAlm=Math.max(0,r.almacen);
        const alerta=enAlm>0&&r.producido>0;
        return(<Card key={r.producto} style={{padding:"14px 16px"}} ch={<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{color:B.textDark,fontSize:15,fontWeight:800}}>{r.producto}</div>
              <div style={{display:"flex",gap:12,marginTop:3}}>
                <span style={{color:B.green,fontSize:12,fontWeight:700}}>✅ Producido: {r.producido.toLocaleString()}</span>
                <span style={{color:B.navy,fontSize:12,fontWeight:700}}>🚢 Enviado: {r.enviado.toLocaleString()}</span>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{color:alerta?B.amber:B.textLight,fontSize:22,fontWeight:900}}>{enAlm.toLocaleString()}</div>
              <div style={{color:alerta?B.amber:B.textLight,fontSize:10,fontWeight:700}}>{r.unidad||"uds"} en almacén</div>
            </div>
          </div>
          {r.producido>0&&<div style={{height:6,background:B.bg,borderRadius:3,overflow:"hidden"}}>
            <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.green+")",borderRadius:3}}/>
          </div>}
          {r.producido>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:B.textLight,marginTop:4}}>
            <span>0</span><span style={{color:B.teal,fontWeight:700}}>{pct}% enviado</span><span>{r.producido.toLocaleString()}</span>
          </div>}
        </div>}/>);
      })}
    </div>}

    {/* Action buttons */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <button onClick={()=>setModo(modo==="entrada"?false:"entrada")} style={{background:modo==="entrada"?B.green:"#fff",border:"2px solid "+(modo==="entrada"?B.green:B.border),borderRadius:14,padding:"13px 8px",cursor:"pointer",textAlign:"center"}}>
        <div style={{fontSize:22}}>📥</div>
        <div style={{color:modo==="entrada"?"#fff":B.textDark,fontSize:13,fontWeight:800,marginTop:4}}>Entrada</div>
        <div style={{color:modo==="entrada"?"rgba(255,255,255,.8)":B.textLight,fontSize:11}}>Producción lista</div>
      </button>
      <button onClick={()=>setModo(modo==="salida"?false:"salida")} style={{background:modo==="salida"?B.navy:"#fff",border:"2px solid "+(modo==="salida"?B.navy:B.border),borderRadius:14,padding:"13px 8px",cursor:"pointer",textAlign:"center"}}>
        <div style={{fontSize:22}}>📤</div>
        <div style={{color:modo==="salida"?"#fff":B.textDark,fontSize:13,fontWeight:800,marginTop:4}}>Envío</div>
        <div style={{color:modo==="salida"?"rgba(255,255,255,.8)":B.textLight,fontSize:11}}>Sale al cliente</div>
      </button>
    </div>

    {/* Form */}
    {modo&&<Card ch={<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{color:B.textDark,fontSize:15,fontWeight:800}}>{modo==="entrada"?"📥 Nueva Entrada":"📤 Nuevo Envío"}</div>
        <button onClick={()=>setModo(false)} style={{background:"none",border:"none",color:B.textLight,fontSize:18,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <F label="Fecha" value={form.fecha} onChange={set("fecha")} type="date"/>
        <S label="Producto" value={form.producto} onChange={set("producto")} options={PRODUCTOS.map(p=>({v:p,l:p}))}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10}}>
        <F label="Cantidad" value={form.cantidad} onChange={set("cantidad")} type="number" placeholder="0"/>
        <S label="Unidad" value={form.unidad} onChange={set("unidad")} options={[{v:"uds",l:"uds"},{v:"lbs",l:"lbs"},{v:"rollos",l:"rollos"}]}/>
      </div>
      {modo==="salida"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
        <F label="Destino / Cliente" value={form.destino} onChange={set("destino")} placeholder="Ej: Ouesplast, Jimaní"/>
        <S label="Vincular a Orden (opcional)" value={form.ordenId} onChange={set("ordenId")}
          options={[{v:"",l:"— Sin orden —"},...ordenes.map(o=>({v:String(o.id),l:o.cliente+" ("+o.fechaEnvio+")"}))]}/> 
      </div>}
      <F label="Notas" value={form.notas} onChange={set("notas")} placeholder="Observaciones..."/>
      <Btn ch={"✓ Guardar "+(modo==="entrada"?"Entrada":"Envío")} fn={save} full color={modo==="entrada"?B.green:B.navy}/>
    </div>}/>}

    {/* Movement log */}
    <Card ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Movimientos</div>
        <div style={{display:"flex",gap:6,overflowX:"auto"}}>
          <button onClick={()=>setFilProd("all")} style={{background:filProd==="all"?B.teal:"transparent",border:"1.5px solid "+(filProd==="all"?B.teal:B.border),borderRadius:20,padding:"4px 10px",color:filProd==="all"?"#fff":B.textMid,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>Todos</button>
          {[...new Set(logs.map(l=>l.producto))].map(p=>(<button key={p} onClick={()=>setFilProd(p)} style={{background:filProd===p?B.navy:"transparent",border:"1.5px solid "+(filProd===p?B.navy:B.border),borderRadius:20,padding:"4px 10px",color:filProd===p?"#fff":B.textMid,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{p.split(" ")[0]}</button>))}
        </div>
      </div>
      {prodFil.length===0?<div style={{textAlign:"center",padding:24,color:B.textLight,fontSize:13}}>Sin movimientos aún</div>:
        prodFil.slice(0,30).map(l=>{
          const isEnv=l.tipo==="salida";
          return(<div key={l.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid "+B.border}}>
            <div style={{width:36,height:36,borderRadius:10,background:(isEnv?B.navy:B.green)+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{isEnv?"📤":"📥"}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                <span style={{color:isEnv?B.navy:B.green,fontWeight:800,fontSize:12}}>{isEnv?"ENVÍO":"ENTRADA"}</span>
                <span style={{color:B.textLight,fontSize:11}}>{l.fecha}</span>
              </div>
              <div style={{color:B.textDark,fontSize:13,fontWeight:700}}>{l.producto}</div>
              {l.destino&&<div style={{color:B.textLight,fontSize:11}}>→ {l.destino}</div>}
              {l.notas&&<div style={{color:B.textLight,fontSize:11,fontStyle:"italic"}}>{l.notas}</div>}
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{color:isEnv?B.navy:B.green,fontWeight:900,fontSize:16}}>{isEnv?"-":"+"}  {l.cantidad.toLocaleString()}</div>
              <div style={{color:B.textLight,fontSize:10}}>{l.unidad}</div>
              <button onClick={()=>del(l.id)} style={{background:"none",border:"none",color:B.red+"88",fontSize:11,cursor:"pointer",marginTop:2}}>✕</button>
            </div>
          </div>);
        })
      }
    </div>}/>
  </div>);
}

function Dashboard({regs,mat,ordenes,resinaLogs,setVista}){
  const tP=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||0),0);
  const tI=regs.filter(r=>r.etapa==="impresion").reduce((s,r)=>s+(Number(r.lbsImpresion)||0),0);
  const tD=regs.reduce((s,r)=>s+(Number(r.desperdicio)||0)+(Number(r.desperdicioImpresion)||0)+(Number(r.desperdicioSlitter)||0)+(Number(r.desperdicioCorte)||0),0);
  const tF=regs.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const tR=regs.filter(r=>r.etapa==="reciclaje").reduce((s,r)=>s+(Number(r.materialRecuperado)||0),0);
  const yld=tP>0?((tP/(tP+tD))*100).toFixed(1):null;
  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo);
  const ordenesActivas=(ordenes||[]).filter(o=>o.etapa!=="listo");

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{color:B.textDark,fontSize:22,fontWeight:800,margin:"0 0 2px"}}>Dashboard</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Resumen de producción</p></div>

    {alts.length>0&&<div style={{background:B.red+"12",border:"1.5px solid "+B.red+"44",borderRadius:12,padding:"12px 16px",display:"flex",gap:10,alignItems:"center",cursor:"pointer"}} onClick={()=>setVista("almacen")}><span style={{fontSize:20}}>🚨</span><div style={{flex:1}}><div style={{color:B.red,fontWeight:700,fontSize:14}}>Stock Bajo</div><div style={{color:B.textMid,fontSize:13}}>{alts.map(a=>a.nombre).join(", ")}</div></div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>}

    {ordenesActivas.length>0&&<div style={{background:B.teal+"10",border:"1.5px solid "+B.teal+"44",borderRadius:12,padding:"12px 16px",cursor:"pointer"}} onClick={()=>setVista("ordenes")}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{color:B.teal,fontWeight:700,fontSize:14}}>📋 Órdenes Activas ({ordenesActivas.length})</div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>
      {ordenesActivas.slice(0,2).map(o=>(<div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}><span style={{color:B.textDark,fontSize:13,fontWeight:600}}>{o.cliente}</span><Badge label={ETIQ_ORDEN[o.etapa]} color={COLOR_ORDEN[o.etapa]}/></div>))}
    </div>}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Stat label="Extrusión" value={tP.toFixed(0)} unit="lbs" color={B.teal} sub="Producción"/>
      <Stat label="Impresión" value={tI.toFixed(0)} unit="lbs" color={B.navy} sub="Procesado"/>
      <Stat label="Fundas" value={tF.toLocaleString()} unit="uds" color={B.tealDark} sub="Cortadora"/>
      <Stat label="Desperdicio" value={tD.toFixed(0)} unit="lbs" color={B.red} sub="Total"/>
    </div>

    {yld&&<Card accent={B.green} ch={<div><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Eficiencia de Extrusión</div><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{flex:1,height:10,background:B.bg,borderRadius:5,overflow:"hidden"}}><div style={{width:yld+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.green+")",borderRadius:5}}/></div><span style={{color:B.green,fontWeight:800,fontSize:20}}>{yld}%</span></div></div>}/>}

    <Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Flujo de Producción</div>
      <div style={{display:"flex",overflowX:"auto",gap:0,paddingBottom:4}}>
        {ETAPAS.map((e,i)=>{const n=e==="mezcla"?resinaLogs.length:regs.filter(r=>r.etapa===e).length;const c=CE[e];return(<div key={e} style={{display:"flex",alignItems:"center",flexShrink:0}}><div style={{background:B.bg,border:"1.5px solid "+c+"44",borderRadius:12,padding:"12px 10px",textAlign:"center",minWidth:72}}><div style={{fontSize:20}}>{ICONOS[e]}</div><div style={{color:c,fontSize:9,fontWeight:700,textTransform:"uppercase",margin:"3px 0"}}>{ETIQUETAS[e]}</div><div style={{color:B.textDark,fontWeight:800,fontSize:20}}>{n}</div></div>{i<ETAPAS.length-1&&<div style={{color:B.border,fontSize:18,padding:"0 3px"}}>›</div>}</div>);})}
      </div>
    </div>}/>

    <Card ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Inventario</div>
        <button onClick={()=>setVista("almacen")} style={{background:"none",border:"1px solid "+B.border,color:B.teal,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Ver →</button>
      </div>
      {mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green;return(<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+B.border}}><span style={{color:B.textDark,fontSize:14,fontWeight:600}}>{m.nombre}</span><div style={{display:"flex",alignItems:"center",gap:8}}>{(bj||cr)&&<span>{cr?"🚨":"⚠️"}</span>}<span style={{color:bc,fontWeight:800,fontSize:15}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div></div>);})}
    </div>}/>

    {regs.length===0&&<Card style={{textAlign:"center",padding:40,border:"1.5px dashed "+B.border}} ch={<div><div style={{fontSize:40,marginBottom:10}}>📋</div><div style={{color:B.textMid,fontSize:15,fontWeight:700}}>Sin registros aún</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca <strong>Registrar</strong> para comenzar</div></div>}/>}
  </div>);
}

function App(){
  const [sup,setSup]=useState(null);
  const [regs,setRegs]=useState([]);
  const [resinaLogs,setResinaLogs]=useState([]);
  const [mat,setMat]=useState(MATERIALES_INIT);
  const [movs,setMovs]=useState([]);
  const [ordenes,setOrdenes]=useState([]);
  const [productoLogs,setProductoLogs]=useState([]);
  const [vista,setVista]=useState("dashboard");
  const [dbLoading,setDbLoading]=useState(true);

  useEffect(()=>{
    Promise.all([dbLoad(),dbLoadOrders(),dbLoadResina(),dbLoadProductos()]).then(([r,o,res,pt])=>{
      setRegs(r);setOrdenes(o);setResinaLogs(res);setProductoLogs(pt);setDbLoading(false);
    }).catch(()=>setDbLoading(false));
  },[]);

  if(!sup)return <Login onLogin={setSup}/>;

  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo).length;
  const ordenesActivas=ordenes.filter(o=>o.etapa!=="listo").length;

  const ptEnAlmacen=productoLogs.reduce((s,l)=>{
    if(l.tipo==="entrada")return s+l.cantidad;
    if(l.tipo==="salida")return s-l.cantidad;
    return s;
  },0);
  const NAV=[
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"registro",icon:"➕",label:"Registrar"},
    {id:"ordenes",icon:"📋",label:"Órdenes",badge:ordenesActivas},
    {id:"almacen",icon:"📦",label:"Almacén",badge:alts||Math.max(0,Math.round(ptEnAlmacen/1000))||0},
    {id:"rendimiento",icon:"📈",label:"Equipo"},
  ];

  return(<div style={{minHeight:"100dvh",background:B.bg,paddingBottom:84}}>
    {/* Header */}
    <div style={{background:"linear-gradient(135deg,"+B.navyDeep+","+B.tealDark+")",padding:"env(safe-area-inset-top,0px) 16px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><Logo s={30}/><div><div style={{color:"#fff",fontSize:15,fontWeight:800,lineHeight:1.1}}>palamo</div><div style={{color:B.tealLight,fontSize:9,fontWeight:700,letterSpacing:1.5}}>PRODUCCIÓN</div></div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{textAlign:"right"}}><div style={{color:"#fff",fontSize:13,fontWeight:700,lineHeight:1.1}}>{sup.nombre.split(" ")[0]}</div><div style={{color:B.tealLight,fontSize:10,fontWeight:600}}>{sup.codigo}</div></div>
          <button onClick={()=>setSup(null)} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"7px 10px",color:"rgba(255,255,255,.8)",fontSize:12,fontWeight:700,cursor:"pointer"}}>Salir</button>
        </div>
      </div>
    </div>

    {/* Content */}
    <div style={{padding:"16px 16px 0"}}>
      {dbLoading&&<div style={{textAlign:"center",padding:40,color:B.textLight}}><div style={{fontSize:32,marginBottom:8}}>⏳</div><div style={{fontSize:14}}>Cargando datos...</div></div>}
      {!dbLoading&&vista==="dashboard"&&<Dashboard regs={regs} mat={mat} ordenes={ordenes} resinaLogs={resinaLogs} setVista={setVista}/>}
      {!dbLoading&&vista==="registro"&&<Registro sup={sup} regs={regs} setRegs={setRegs} resinaLogs={resinaLogs} setResinaLogs={setResinaLogs} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} productoLogs={productoLogs} setProductoLogs={setProductoLogs}/>}
      {!dbLoading&&vista==="ordenes"&&<Ordenes ordenes={ordenes} setOrdenes={setOrdenes} productoLogs={productoLogs} setProductoLogs={setProductoLogs} sup={sup}/>}
      {!dbLoading&&vista==="rendimiento"&&<Rendimiento regs={regs} resinaLogs={resinaLogs}/>}
      {!dbLoading&&vista==="almacen"&&<AlmacenUnificado logs={productoLogs} setLogs={setProductoLogs} ordenes={ordenes} sup={sup} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs}/>}
    </div>

    {/* Bottom nav */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:"1px solid "+B.border,paddingBottom:"env(safe-area-inset-bottom,0px)",boxShadow:"0 -2px 16px rgba(0,0,0,.08)"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat("+NAV.length+",1fr)"}}>
        {NAV.map(n=>(<button key={n.id} onClick={()=>setVista(n.id)} style={{background:"none",border:"none",padding:"8px 2px 5px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",position:"relative"}}>
          <span style={{fontSize:18,lineHeight:1}}>{n.icon}</span>
          <span style={{fontSize:9,fontWeight:700,color:vista===n.id?B.teal:B.textLight}}>{n.label}</span>
          {vista===n.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:3,borderRadius:2,background:B.teal}}/>}
          {n.badge>0&&<div style={{position:"absolute",top:4,right:"calc(50% - 16px)",background:B.red,color:"#fff",borderRadius:10,width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{n.badge}</div>}
        </button>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    if('serviceWorker' in navigator){
      const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
    }
  </script>
</body>
</html>
