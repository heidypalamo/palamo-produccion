<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#1C2540"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Palamo"/>
  <title>Palamo · Control de Producción</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#F0F4F7;overscroll-behavior:none}
    ::-webkit-scrollbar{display:none}
    input,select{font-family:'Inter',system-ui,sans-serif}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const {useState}=React;
const B={teal:"#5BADA8",tealLight:"#7EC8C4",tealDark:"#3D8C88",navy:"#3B4A6B",navyDark:"#2A3550",navyDeep:"#1C2540",bg:"#F0F4F7",card:"#FFFFFF",border:"#E2E8F0",textDark:"#1C2540",textMid:"#4A5568",textLight:"#94A3B8",red:"#E05252",green:"#38A169",amber:"#D97706"};
const SUPERVISORES=[{codigo:"DLS001",nombre:"Daniel De Los Santos",cargo:"Gerente de Producción"},{codigo:"OAD002",nombre:"Otilio Aníbal De Jesús",cargo:"Supervisor"},{codigo:"SNU003",nombre:"Scarlet Dayana Núñez",cargo:"Supervisora / ADM"},{codigo:"YAC004",nombre:"Yendhy Acosta",cargo:"Recursos Humanos"},{codigo:"SAR005",nombre:"Sartori",cargo:"Supervisor"}];
const MATERIALES_INIT=[{id:"ldpe",nombre:"Resina LDPE",unidad:"lbs",stockActual:0,stockMinimo:1000,color:B.teal},{id:"mlldpe",nombre:"Resina MLLDPE",unidad:"lbs",stockActual:0,stockMinimo:600,color:B.navy},{id:"rollos",nombre:"Rollos de Película",unidad:"uds",stockActual:0,stockMinimo:10,color:B.tealDark}];
const MAQUINAS={extrusion:["EXT-1","EXT-2","EXT-3","EXT-4","EXT-5"],impresion:["IMP-1","IMP-2"],corte_rollo:["SLI-1","SLI-2"],cortadora:["COR-1","COR-2","COR-3","COR-4","COR-5"],reciclaje:["REC-1"]};
const ETAPAS=["extrusion","impresion","corte_rollo","cortadora","reciclaje"];
const ETIQUETAS={extrusion:"Extrusión",impresion:"Impresión",corte_rollo:"Corte Rollo",cortadora:"Cortadora",reciclaje:"Reciclaje"};
const ICONOS={extrusion:"⚙️",impresion:"🖨️",corte_rollo:"✂️",cortadora:"🛠️",reciclaje:"♻️"};
const CE={extrusion:B.teal,impresion:B.navy,corte_rollo:B.tealDark,cortadora:"#4E7C59",reciclaje:"#6B7280"};
const PRODUCTOS=["Funda de Agua","Funda de Pan","Bolsa Transparente 17×24 C200","Rollo Transparente","Otro"];
const F0={etapa:"extrusion",fecha:new Date().toISOString().split("T")[0],maquina:"EXT-1",producto:"Funda de Agua",cliente:"",ldpe:"",mlldpe:"",pelicula:"",desperdicio:"",rollosProducidos:"",anchoRollo:"",bolsasProducidas:"",desperdicioReciclado:"",materialRecuperado:"",notas:""};
const iS={background:"#F8FAFC",border:`1.5px solid ${B.border}`,borderRadius:10,padding:"13px 14px",color:B.textDark,fontSize:16,outline:"none",width:"100%",boxSizing:"border-box",WebkitAppearance:"none"};

function Logo({s=32}){return(<svg width={s} height={s} viewBox="0 0 200 200" fill="none"><path d="M100 10 C45 10 10 55 10 100 C10 155 55 185 100 185 C130 185 155 170 165 150 C175 130 168 105 148 92 C135 84 118 88 110 100 C102 112 108 128 120 132 C132 136 142 126 138 114" stroke={B.teal} strokeWidth="36" strokeLinecap="round" fill="none"/><path d="M138 114 C134 102 122 96 112 100 C102 104 96 116 100 128 C104 140 118 146 130 140" stroke={B.navy} strokeWidth="30" strokeLinecap="round" fill="none"/></svg>);}
function F({label,value,onChange,type="text",placeholder}){return(<div style={{display:"flex",flexDirection:"column",gap:6}}><span style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>{label}</span><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} inputMode={type==="number"?"decimal":undefined} style={iS} onFocus={e=>e.target.style.borderColor=B.teal} onBlur={e=>e.target.style.borderColor=B.border}/></div>);}
function S({label,value,onChange,options}){return(<div style={{display:"flex",flexDirection:"column",gap:6}}><span style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>{label}</span><select value={value} onChange={e=>onChange(e.target.value)} style={{...iS,cursor:"pointer"}}>{options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select></div>);}
function Btn({ch,fn,color,outline,small,full}){const bg=outline?"transparent":(color||`linear-gradient(135deg,${B.teal},${B.navy})`);return(<button onClick={fn} style={{background:bg,border:`2px solid ${outline?(color||B.teal):"transparent"}`,borderRadius:12,padding:small?"10px 16px":"15px 24px",color:outline?(color||B.teal):"#fff",fontSize:small?13:15,fontWeight:700,cursor:"pointer",width:full?"100%":undefined,boxShadow:outline?"none":"0 3px 12px rgba(91,173,168,.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:6}} onMouseDown={e=>e.currentTarget.style.opacity=".85"} onMouseUp={e=>e.currentTarget.style.opacity="1"}>{ch}</button>);}
function Card({ch,style,accent}){return(<div style={{background:B.card,borderRadius:14,border:`1.5px solid ${accent?accent+"33":B.border}`,borderLeft:accent?`4px solid ${accent}`:undefined,boxShadow:"0 1px 6px rgba(0,0,0,.06)",padding:16,...style}}>{ch}</div>);}
function Badge({label,color}){return <span style={{background:color+"18",color,border:`1px solid ${color}44`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,textTransform:"uppercase"}}>{label}</span>;}
function Stat({label,value,unit,color,sub}){return(<Card accent={color} style={{padding:"14px 16px"}} ch={<><div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:6}}>{label}</div><div style={{display:"flex",alignItems:"baseline",gap:4}}><span style={{color:B.textDark,fontSize:24,fontWeight:800,lineHeight:1}}>{value}</span>{unit&&<span style={{color:B.textLight,fontSize:12}}>{unit}</span>}</div>{sub&&<div style={{color:B.textLight,fontSize:11,marginTop:4}}>{sub}</div>}</>}/>);}
function Pair({k,v,color}){return(<div><div style={{color:B.textLight,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.6,marginBottom:2}}>{k}</div><div style={{color:color||B.textDark,fontSize:14,fontWeight:700}}>{v}</div></div>);}

function LogRow({log,onDel}){
  const [exp,setExp]=useState(false);
  const c=CE[log.etapa];
  return(<Card style={{padding:0,overflow:"hidden"}} ch={<><div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:12}} onClick={()=>setExp(!exp)}><div style={{width:36,height:36,borderRadius:10,background:c+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ICONOS[log.etapa]}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}><Badge label={ETIQUETAS[log.etapa]} color={c}/><span style={{color:B.textLight,fontSize:12}}>{log.maquina}</span></div><div style={{color:B.textMid,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{log.producto||log.cliente||"—"} · {log.fecha}</div></div><span style={{color:B.textLight,fontSize:18,transform:exp?"rotate(180deg)":"rotate(0)",display:"inline-block"}}>⌄</span></div>{exp&&(<div style={{borderTop:`1px solid ${B.border}`,padding:"12px 14px",background:B.bg}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>{log.supervisorNombre&&<Pair k="Supervisor" v={log.supervisorNombre.split(" ")[0]}/>}{log.ldpe&&<Pair k="LDPE" v={`${log.ldpe} lbs`}/>}{log.mlldpe&&<Pair k="MLLDPE" v={`${log.mlldpe} lbs`}/>}{log.pelicula&&<Pair k="Película" v={`${log.pelicula} lbs`} color={B.green}/>}{log.desperdicio&&<Pair k="Desperdicio" v={`${log.desperdicio} lbs`} color={B.red}/>}{log.rollosProducidos&&<Pair k="Rollos" v={log.rollosProducidos}/>}{log.bolsasProducidas&&<Pair k="Fundas" v={Number(log.bolsasProducidas).toLocaleString()}/>}{log.desperdicioReciclado&&<Pair k="Entrada" v={`${log.desperdicioReciclado} lbs`}/>}{log.materialRecuperado&&<Pair k="Recuperado" v={`${log.materialRecuperado} lbs`} color={B.green}/>}{log.notas&&<Pair k="Notas" v={log.notas}/>}</div><Btn ch="🗑 Eliminar" fn={()=>onDel(log.id)} color={B.red} outline small/></div>)}</>}/>);
}

function Login({onLogin}){
  const [c,setC]=useState(""); const [e,setE]=useState("");
  const go=()=>{const s=SUPERVISORES.find(x=>x.codigo===c.toUpperCase().trim());if(s)onLogin(s);else{setE("Código incorrecto");setC("");}};
  return(<div style={{minHeight:"100dvh",background:`linear-gradient(160deg,${B.navyDeep} 0%,${B.navyDark} 55%,${B.tealDark} 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}><div style={{width:"100%",maxWidth:400}}><div style={{textAlign:"center",marginBottom:36}}><div style={{display:"inline-flex",alignItems:"center",gap:14,background:"rgba(255,255,255,.08)",borderRadius:20,padding:"14px 24px"}}><Logo s={48}/><div style={{textAlign:"left"}}><div style={{display:"flex",alignItems:"baseline"}}><span style={{color:"rgba(255,255,255,.5)",fontSize:18,fontWeight:300}}>p</span><span style={{color:"#fff",fontSize:18,fontWeight:800}}>alamo</span></div><div style={{color:B.tealLight,fontSize:12,fontWeight:800,letterSpacing:1}}>lásticos</div><div style={{color:"rgba(255,255,255,.4)",fontSize:10,letterSpacing:1.5}}>Dominicano S.R.L.</div></div></div><div style={{color:"rgba(255,255,255,.5)",fontSize:13,letterSpacing:2,textTransform:"uppercase",marginTop:16}}>Control de Producción</div></div><div style={{background:"rgba(255,255,255,.95)",borderRadius:20,padding:24,marginBottom:20,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:8}}>Código de Supervisor</div><input type="text" value={c} onChange={ev=>{setC(ev.target.value.toUpperCase());setE("")}} onKeyDown={ev=>ev.key==="Enter"&&go()} placeholder="Ej: DLS001" style={{...iS,fontSize:22,textAlign:"center",letterSpacing:6,fontWeight:800,color:B.navy,borderColor:e?B.red:B.border,marginBottom:e?8:16}} onFocus={ev=>ev.target.style.borderColor=B.teal} onBlur={ev=>ev.target.style.borderColor=e?B.red:B.border}/>{e&&<div style={{color:B.red,fontSize:13,fontWeight:600,textAlign:"center",marginBottom:12}}>⚠ {e}</div>}<Btn ch="Entrar →" fn={go} full/></div><div style={{display:"flex",flexDirection:"column",gap:8}}>{SUPERVISORES.map(s=>(<div key={s.codigo} onClick={()=>{setC(s.codigo);setE("")}} style={{background:"rgba(255,255,255,.1)",borderRadius:12,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",border:"1px solid rgba(255,255,255,.15)"}}><div><div style={{color:"#fff",fontSize:14,fontWeight:600}}>{s.nombre}</div><div style={{color:"rgba(255,255,255,.5)",fontSize:12}}>{s.cargo}</div></div><span style={{color:B.tealLight,fontWeight:800,fontSize:14,letterSpacing:1}}>{s.codigo}</span></div>))}</div></div></div>);
}

function Inventario({mat,setMat,movs,setMovs,sup}){
  const [modo,setModo]=useState(false);
  const [sel,setSel]=useState(mat[0].id);
  const [cant,setCant]=useState(""); const [prov,setProv]=useState(""); const [nota,setNota]=useState("");
  const [eMin,setEMin]=useState(null); const [mVal,setMVal]=useState("");
  const save=()=>{if(!cant||Number(cant)<=0)return;const n=Number(cant),m=mat.find(x=>x.id===sel);setMovs(p=>[{id:Date.now(),tipo:"entrada",materialId:sel,materialNombre:m.nombre,cantidad:n,unidad:m.unidad,proveedor:prov,notas:nota,fecha:new Date().toISOString().split("T")[0],supervisor:sup.nombre},...p]);setMat(p=>p.map(x=>x.id===sel?{...x,stockActual:x.stockActual+n}:x));setCant("");setProv("");setNota("");setModo(false);};
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Inventario</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Materia prima en stock</p></div><Btn ch={modo?"✕ Cancelar":"+ Entrada"} fn={()=>setModo(!modo)} color={modo?B.textMid:`linear-gradient(135deg,${B.green},${B.tealDark})`} small/></div>{modo&&<Card accent={B.teal} ch={<><div style={{color:B.teal,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>Nueva Entrada</div><div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:16}}><S label="Material" value={sel} onChange={setSel} options={mat.map(m=>({v:m.id,l:m.nombre}))}/><F label={`Cantidad (${mat.find(m=>m.id===sel)?.unidad})`} value={cant} onChange={setCant} type="number" placeholder="0"/><F label="Proveedor" value={prov} onChange={setProv} placeholder="Nombre del proveedor"/><F label="Notas" value={nota} onChange={setNota} placeholder="Opcional"/></div><Btn ch="✓ Confirmar Entrada" fn={save} color={`linear-gradient(135deg,${B.green},${B.tealDark})`} full/></>}/>}{mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green,pct=Math.min(100,m.stockMinimo>0?(m.stockActual/(m.stockMinimo*3))*100:100);return(<Card key={m.id} style={{border:`1.5px solid ${cr?B.red+"44":bj?B.amber+"44":B.border}`}} ch={<><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}><div><div style={{color:B.textDark,fontSize:16,fontWeight:700}}>{m.nombre}</div><div style={{color:B.textLight,fontSize:12,marginTop:2}}>{m.unidad}</div></div>{(bj||cr)&&<span style={{background:cr?B.red+"15":B.amber+"15",color:cr?B.red:B.amber,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:800}}>{cr?"CRÍTICO":"BAJO"}</span>}</div><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:B.textLight,fontSize:12,fontWeight:600}}>Stock actual</span><span style={{color:bc,fontWeight:800,fontSize:18}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div><div style={{height:8,background:B.bg,borderRadius:4,overflow:"hidden",marginBottom:12}}><div style={{width:`${pct}%`,height:"100%",background:bc,borderRadius:4}}/></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:B.bg,borderRadius:8,padding:"10px 12px"}}><span style={{color:B.textLight,fontSize:12,fontWeight:600}}>Mínimo de alerta</span>{eMin===m.id?(<div style={{display:"flex",gap:6,alignItems:"center"}}><input type="number" value={mVal} onChange={e=>setMVal(e.target.value)} autoFocus style={{...iS,width:80,padding:"7px 10px",fontSize:15}}/><button onClick={()=>{const v=Number(mVal);if(!isNaN(v)&&v>=0)setMat(p=>p.map(x=>x.id===m.id?{...x,stockMinimo:v}:x));setEMin(null)}} style={{background:B.green,border:"none",borderRadius:8,color:"#fff",padding:"8px 12px",cursor:"pointer",fontWeight:700,fontSize:14}}>✓</button></div>):(<div style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:B.textDark,fontWeight:700,fontSize:14}}>{m.stockMinimo} {m.unidad}</span><button onClick={()=>{setEMin(m.id);setMVal(String(m.stockMinimo))}} style={{background:"none",border:`1px solid ${B.border}`,borderRadius:7,color:B.textLight,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>Editar</button></div>)}</div>{movs.filter(x=>x.materialId===m.id).slice(0,2).map(mv=>(<div key={mv.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderTop:`1px solid ${B.border}`,marginTop:6}}><span style={{color:B.textLight,fontSize:12}}>{mv.fecha}</span>{mv.proveedor&&<span style={{color:B.textMid,fontSize:12}}>{mv.proveedor}</span>}<span style={{color:B.green,fontWeight:700,fontSize:13}}>+{mv.cantidad} {mv.unidad}</span></div>))}</>}/>);})}{movs.length>0&&<div><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Historial ({movs.length})</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{movs.map(mv=>{const id=mv.tipo==="descuento";return(<Card key={mv.id} style={{padding:"12px 14px"}} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{flex:1}}><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}><Badge label={id?"Descuento":"Entrada"} color={id?B.red:B.green}/><span style={{color:B.textLight,fontSize:12}}>{mv.fecha}</span></div><div style={{color:B.textDark,fontSize:14,fontWeight:600}}>{mv.materialNombre}</div>{(mv.proveedor||mv.maquina)&&<div style={{color:B.textLight,fontSize:12}}>{mv.proveedor||mv.maquina}</div>}</div><span style={{color:id?B.red:B.green,fontWeight:800,fontSize:18}}>{id?"-":"+"}{mv.cantidad} {mv.unidad}</span></div>}/>);})}</div></div>}</div>);
}

function Registro({sup,regs,setRegs,mat,setMat,movs,setMovs}){
  const [form,setForm]=useState(F0);const [saved,setSaved]=useState(false);const [filt,setFilt]=useState("all");
  const set=k=>v=>setForm(f=>{const n={...f,[k]:v};if(k==="etapa")n.maquina=MAQUINAS[v][0];return n;});
  const desc=reg=>{if(reg.etapa!=="extrusion")return;[["ldpe",reg.ldpe],["mlldpe",reg.mlldpe]].forEach(([id,val])=>{const c=Number(val);if(!c)return;const m=mat.find(x=>x.id===id);if(!m)return;setMat(p=>p.map(x=>x.id===id?{...x,stockActual:Math.max(0,x.stockActual-c)}:x));setMovs(p=>[{id:Date.now()+Math.random(),tipo:"descuento",materialId:id,materialNombre:m.nombre,cantidad:c,unidad:m.unidad,maquina:reg.maquina,fecha:reg.fecha,supervisor:reg.supervisorNombre,notas:`Prod: ${reg.producto}`},...p]);});};
  const save=()=>{const r={...form,id:Date.now(),supervisorNombre:sup.nombre,supervisorCodigo:sup.codigo};setRegs(p=>[r,...p]);desc(r);setSaved(true);setTimeout(()=>setSaved(false),2000);setForm({...F0,etapa:form.etapa,maquina:MAQUINAS[form.etapa][0]});};
  const fil=filt==="all"?regs:regs.filter(r=>r.etapa===filt);
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><Card ch={<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{color:B.textDark,fontSize:18,fontWeight:800,margin:"0 0 2px"}}>Nuevo Registro</h2><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:22,height:22,borderRadius:"50%",background:`linear-gradient(135deg,${B.teal},${B.navy})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:800}}>{sup.nombre.charAt(0)}</div><span style={{color:B.teal,fontSize:12,fontWeight:700}}>{sup.codigo}</span></div></div>{saved&&<span style={{background:B.green+"18",color:B.green,borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:700}}>✓ Guardado</span>}</div><div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:16,scrollbarWidth:"none"}}>{ETAPAS.map(e=>(<button key={e} onClick={()=>set("etapa")(e)} style={{background:form.etapa===e?CE[e]:"transparent",border:`2px solid ${form.etapa===e?CE[e]:B.border}`,borderRadius:20,padding:"9px 16px",color:form.etapa===e?"#fff":B.textMid,fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{ICONOS[e]} {ETIQUETAS[e]}</button>))}</div>{form.etapa==="extrusion"&&(form.ldpe||form.mlldpe)&&<div style={{background:`${B.teal}12`,border:`1px solid ${B.teal}33`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:B.tealDark,fontWeight:500}}>⚡ Se descontará <strong>{form.ldpe||0} lbs LDPE</strong> y <strong>{form.mlldpe||0} lbs MLLDPE</strong> del inventario.</div>}<div style={{display:"flex",flexDirection:"column",gap:14}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><F label="Fecha" value={form.fecha} onChange={set("fecha")} type="date"/><S label="Máquina" value={form.maquina} onChange={set("maquina")} options={MAQUINAS[form.etapa].map(m=>({v:m,l:m}))}/></div>{(form.etapa==="extrusion"||form.etapa==="cortadora"||form.etapa==="corte_rollo")&&<S label="Producto" value={form.producto} onChange={set("producto")} options={PRODUCTOS.map(p=>({v:p,l:p}))}/>}{form.etapa==="extrusion"&&<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><F label="LDPE (lbs)" value={form.ldpe} onChange={set("ldpe")} type="number" placeholder="0"/><F label="MLLDPE (lbs)" value={form.mlldpe} onChange={set("mlldpe")} type="number" placeholder="0"/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><F label="Película (lbs)" value={form.pelicula} onChange={set("pelicula")} type="number" placeholder="0"/><F label="Desperdicios (lbs)" value={form.desperdicio} onChange={set("desperdicio")} type="number" placeholder="0"/></div></>}{form.etapa==="impresion"&&<><F label="Producto / Cliente" value={form.cliente} onChange={set("cliente")} placeholder="Nombre"/><F label="Rollos Impresos" value={form.rollosProducidos} onChange={set("rollosProducidos")} type="number" placeholder="0"/></>}{form.etapa==="corte_rollo"&&<><F label="Producto / Cliente" value={form.cliente} onChange={set("cliente")} placeholder="Nombre"/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><F label="Rollos" value={form.rollosProducidos} onChange={set("rollosProducidos")} type="number" placeholder="0"/><F label="Ancho (mm)" value={form.anchoRollo} onChange={set("anchoRollo")} type="number" placeholder="0"/></div></>}{form.etapa==="cortadora"&&<><F label="Producto / Cliente" value={form.cliente} onChange={set("cliente")} placeholder="Nombre"/><F label="Fundas Producidas" value={form.bolsasProducidas} onChange={set("bolsasProducidas")} type="number" placeholder="0"/></>}{form.etapa==="reciclaje"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><F label="Entrada (lbs)" value={form.desperdicioReciclado} onChange={set("desperdicioReciclado")} type="number" placeholder="0"/><F label="Recuperado (lbs)" value={form.materialRecuperado} onChange={set("materialRecuperado")} type="number" placeholder="0"/></div>}<F label="Notas (opcional)" value={form.notas} onChange={set("notas")} placeholder="Observaciones…"/><Btn ch="+ Guardar Registro" fn={save} full/></div></>}/><div><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Registros ({fil.length})</div><div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,marginBottom:12,scrollbarWidth:"none"}}>{["all",...ETAPAS].map(e=>(<button key={e} onClick={()=>setFilt(e)} style={{background:filt===e?(CE[e]||B.teal):"transparent",border:`1.5px solid ${filt===e?(CE[e]||B.teal):B.border}`,borderRadius:20,padding:"7px 14px",color:filt===e?"#fff":B.textMid,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{e==="all"?"Todos":ETIQUETAS[e]}</button>))}</div>{fil.length===0?<Card style={{textAlign:"center",padding:32,border:`1.5px dashed ${B.border}`}} ch={<div style={{color:B.textLight,fontSize:14}}>Sin registros aún.</div>}/>:<div style={{display:"flex",flexDirection:"column",gap:8}}>{fil.map(r=><LogRow key={r.id} log={r} onDel={id=>setRegs(p=>p.filter(x=>x.id!==id))}/>)}</div>}</div></div>);
}

function Dashboard({regs,mat,setVista}){
  const tL=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.ldpe)||0),0);
  const tM=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.mlldpe)||0),0);
  const tP=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||0),0);
  const tD=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.desperdicio)||0),0);
  const tF=regs.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const tR=regs.filter(r=>r.etapa==="reciclaje").reduce((s,r)=>s+(Number(r.materialRecuperado)||0),0);
  const yld=tP>0?((tP/(tP+tD))*100).toFixed(1):null;
  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo);
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><h2 style={{color:B.textDark,fontSize:22,fontWeight:800,margin:"0 0 2px"}}>Dashboard</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Resumen de producción</p></div>{alts.length>0&&<div style={{background:`${B.red}12`,border:`1.5px solid ${B.red}44`,borderRadius:12,padding:"12px 16px",display:"flex",gap:10,alignItems:"center",cursor:"pointer"}} onClick={()=>setVista("inventario")}><span style={{fontSize:20}}>🚨</span><div style={{flex:1}}><div style={{color:B.red,fontWeight:700,fontSize:14}}>Stock Bajo</div><div style={{color:B.textMid,fontSize:13}}>{alts.map(a=>a.nombre).join(", ")}</div></div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>}<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Stat label="LDPE" value={tL.toFixed(0)} unit="lbs" color={B.teal} sub={`Stock: ${mat.find(m=>m.id==="ldpe")?.stockActual.toFixed(0)} lbs`}/><Stat label="MLLDPE" value={tM.toFixed(0)} unit="lbs" color={B.navy} sub={`Stock: ${mat.find(m=>m.id==="mlldpe")?.stockActual.toFixed(0)} lbs`}/><Stat label="Película" value={tP.toFixed(0)} unit="lbs" color={B.green}/><Stat label="Desperdicio" value={tD.toFixed(0)} unit="lbs" color={B.red}/><Stat label="Fundas" value={tF.toLocaleString()} unit="uds" color={B.tealDark}/><Stat label="Recuperado" value={tR.toFixed(0)} unit="lbs" color="#6B7280"/></div>{yld&&<Card accent={B.green} ch={<><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Eficiencia de Extrusión</div><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{flex:1,height:10,background:B.bg,borderRadius:5,overflow:"hidden"}}><div style={{width:`${yld}%`,height:"100%",background:`linear-gradient(90deg,${B.teal},${B.green})`,borderRadius:5}}/></div><span style={{color:B.green,fontWeight:800,fontSize:20}}>{yld}%</span></div></>}/>}<Card ch={<><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Flujo de Producción</div><div style={{display:"flex",overflowX:"auto",gap:0}}>{ETAPAS.map((e,i)=>{const n=regs.filter(r=>r.etapa===e).length,c=CE[e];return(<div key={e} style={{display:"flex",alignItems:"center",flexShrink:0}}><div style={{background:B.bg,border:`1.5px solid ${c}44`,borderRadius:12,padding:"12px 10px",textAlign:"center",minWidth:72}}><div style={{fontSize:20}}>{ICONOS[e]}</div><div style={{color:c,fontSize:9,fontWeight:700,textTransform:"uppercase",margin:"3px 0"}}>{ETIQUETAS[e]}</div><div style={{color:B.textDark,fontWeight:800,fontSize:20}}>{n}</div></div>{i<ETAPAS.length-1&&<div style={{color:B.border,fontSize:18,padding:"0 3px"}}>›</div>}</div>);})}</div></>}/><Card ch={<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Inventario</div><button onClick={()=>setVista("inventario")} style={{background:"none",border:`1px solid ${B.border}`,color:B.teal,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Ver →</button></div>{mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green;return(<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${B.border}`}}><span style={{color:B.textDark,fontSize:14,fontWeight:600}}>{m.nombre}</span><div style={{display:"flex",alignItems:"center",gap:8}}>{(bj||cr)&&<span>{cr?"🚨":"⚠️"}</span>}<span style={{color:bc,fontWeight:800,fontSize:15}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div></div>);})}</>}/>{regs.length===0&&<Card style={{textAlign:"center",padding:40,border:`1.5px dashed ${B.border}`}} ch={<><div style={{fontSize:40,marginBottom:10}}>📋</div><div style={{color:B.textMid,fontSize:15,fontWeight:700}}>Sin registros aún</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca <strong>Registrar</strong> para agregar el primer turno</div></>}/> }</div>);
}

function Maquinas({regs}){
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Máquinas</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Actividad por máquina</p></div>{[{label:"Extrusoras",mqs:MAQUINAS.extrusion,c:CE.extrusion,i:"⚙️"},{label:"Impresoras",mqs:MAQUINAS.impresion,c:CE.impresion,i:"🖨️"},{label:"Slitters",mqs:MAQUINAS.corte_rollo,c:CE.corte_rollo,i:"✂️"},{label:"Cortadoras",mqs:MAQUINAS.cortadora,c:CE.cortadora,i:"🛠️"},{label:"Reciclaje",mqs:MAQUINAS.reciclaje,c:CE.reciclaje,i:"♻️"}].map(g=>(<Card key={g.label} ch={<><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}><span style={{fontSize:18}}>{g.i}</span><span style={{color:B.textDark,fontSize:15,fontWeight:700}}>{g.label}</span></div><div style={{display:"flex",flexDirection:"column",gap:8}}>{g.mqs.map(m=>{const n=regs.filter(r=>r.maquina===m).length,mx=Math.max(...g.mqs.map(mm=>regs.filter(r=>r.maquina===mm).length),1);return(<div key={m} style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:g.c,fontWeight:800,fontSize:13,width:50,flexShrink:0}}>{m}</span><div style={{flex:1,height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:`${(n/mx)*100}%`,height:"100%",background:g.c,borderRadius:4}}/></div><span style={{color:B.textDark,fontWeight:700,fontSize:14,width:28,textAlign:"right",flexShrink:0}}>{n}</span>{n===0&&<span style={{color:B.textLight,fontSize:10,fontWeight:600}}>IDLE</span>}</div>);})}</div></>}/>))}</div>);
}

function App(){
  const [sup,setSup]=useState(null);
  const [regs,setRegs]=useState([]);
  const [mat,setMat]=useState(MATERIALES_INIT);
  const [movs,setMovs]=useState([]);
  const [vista,setVista]=useState("dashboard");
  if(!sup)return <Login onLogin={setSup}/>;
  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo).length;
  const NAV=[{id:"dashboard",icon:"📊",label:"Inicio"},{id:"registro",icon:"➕",label:"Registrar"},{id:"inventario",icon:"📦",label:"Inventario",badge:alts},{id:"maquinas",icon:"⚙️",label:"Máquinas"}];
  return(<div style={{minHeight:"100dvh",background:B.bg,paddingBottom:80}}>
    <div style={{background:`linear-gradient(135deg,${B.navyDeep},${B.tealDark})`,padding:"env(safe-area-inset-top,0px) 16px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><Logo s={30}/><div><div style={{color:"#fff",fontSize:15,fontWeight:800,lineHeight:1.1}}><span style={{opacity:.5,fontWeight:300}}>p</span>alamo</div><div style={{color:B.tealLight,fontSize:9,fontWeight:700,letterSpacing:1.5}}>PRODUCCIÓN</div></div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{textAlign:"right"}}><div style={{color:"#fff",fontSize:13,fontWeight:700,lineHeight:1.1}}>{sup.nombre.split(" ")[0]}</div><div style={{color:B.tealLight,fontSize:10,fontWeight:600}}>{sup.codigo}</div></div><button onClick={()=>setSup(null)} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"7px 10px",color:"rgba(255,255,255,.8)",fontSize:12,fontWeight:700,cursor:"pointer"}}>Salir</button></div>
      </div>
    </div>
    <div style={{padding:"16px 16px 0"}}>
      {vista==="dashboard"&&<Dashboard regs={regs} mat={mat} setVista={setVista}/>}
      {vista==="registro"&&<Registro sup={sup} regs={regs} setRegs={setRegs} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs}/>}
      {vista==="inventario"&&<Inventario mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} sup={sup}/>}
      {vista==="maquinas"&&<Maquinas regs={regs}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:`1px solid ${B.border}`,paddingBottom:"env(safe-area-inset-bottom,0px)",boxShadow:"0 -2px 16px rgba(0,0,0,.08)"}}>
      <div style={{display:"grid",gridTemplateColumns:`repeat(${NAV.length},1fr)`}}>
        {NAV.map(n=>(<button key={n.id} onClick={()=>setVista(n.id)} style={{background:"none",border:"none",padding:"10px 4px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",position:"relative"}}><span style={{fontSize:22,lineHeight:1}}>{n.icon}</span><span style={{fontSize:10,fontWeight:700,color:vista===n.id?B.teal:B.textLight}}>{n.label}</span>{vista===n.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:28,height:3,borderRadius:2,background:B.teal}}/>}{n.badge>0&&<div style={{position:"absolute",top:6,right:"calc(50% - 18px)",background:B.red,color:"#fff",borderRadius:10,width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{n.badge}</div>}</button>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
