function Dashboard({regs,mat,ordenes,resinaLogs,setVista}){
  const tP=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||0),0);
  const tI=regs.filter(r=>r.etapa==="impresion").reduce((s,r)=>s+(Number(r.lbsImpresion)||0),0);
  const tD=regs.reduce((s,r)=>s+(Number(r.desperdicio)||0)+(Number(r.desperdicioImpresion)||0)+(Number(r.desperdicioSlitter)||0)+(Number(r.desperdicioCorte)||0),0);
  const tF=regs.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const tR=regs.filter(r=>r.etapa==="reciclaje").reduce((s,r)=>s+(Number(r.materialRecuperado)||0),0);
  const yld=tP>0?((tP/(tP+tD))*100).toFixed(1):null;
  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo);
  const ordenesActivas=(ordenes||[]).filter(o=>o.etapa!=="listo");

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{color:B.textDark,fontSize:22,fontWeight:800,margin:"0 0 2px"}}>Dashboard</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Resumen de producción</p></div>

    {alts.length>0&&<div style={{background:B.red+"12",border:"1.5px solid "+B.red+"44",borderRadius:12,padding:"12px 16px",display:"flex",gap:10,alignItems:"center",cursor:"pointer"}} onClick={()=>setVista("almacen")}><span style={{fontSize:20}}>🚨</span><div style={{flex:1}}><div style={{color:B.red,fontWeight:700,fontSize:14}}>Stock Bajo</div><div style={{color:B.textMid,fontSize:13}}>{alts.map(a=>a.nombre).join(", ")}</div></div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>}

    {ordenesActivas.length>0&&<div style={{background:B.teal+"10",border:"1.5px solid "+B.teal+"44",borderRadius:12,padding:"12px 16px",cursor:"pointer"}} onClick={()=>setVista("ordenes")}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{color:B.teal,fontWeight:700,fontSize:14}}>📋 Órdenes Activas ({ordenesActivas.length})</div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>
      {ordenesActivas.slice(0,2).map(o=>(<div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}><span style={{color:B.textDark,fontSize:13,fontWeight:600}}>{o.cliente}</span><Badge label={ETIQ_ORDEN[o.etapa]} color={COLOR_ORDEN[o.etapa]}/></div>))}
    </div>}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Stat label="Extrusión" value={tP.toFixed(0)} unit="lbs" color={B.teal} sub="Producción"/>
      <Stat label="Impresión" value={tI.toFixed(0)} unit="lbs" color={B.navy} sub="Procesado"/>
      <Stat label="Fundas" value={tF.toLocaleString()} unit="uds" color={B.tealDark} sub="Cortadora"/>
      <Stat label="Desperdicio" value={tD.toFixed(0)} unit="lbs" color={B.red} sub="Total"/>
    </div>

    {yld&&<Card accent={B.green} ch={<div><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Eficiencia de Extrusión</div><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{flex:1,height:10,background:B.bg,borderRadius:5,overflow:"hidden"}}><div style={{width:yld+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.green+")",borderRadius:5}}/></div><span style={{color:B.green,fontWeight:800,fontSize:20}}>{yld}%</span></div></div>}/>}

    <Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Flujo de Producción</div>
      <div style={{display:"flex",overflowX:"auto",gap:0,paddingBottom:4}}>
        {ETAPAS.map((e,i)=>{const n=e==="mezcla"?resinaLogs.length:regs.filter(r=>r.etapa===e).length;const c=CE[e];return(<div key={e} style={{display:"flex",alignItems:"center",flexShrink:0}}><div style={{background:B.bg,border:"1.5px solid "+c+"44",borderRadius:12,padding:"12px 10px",textAlign:"center",minWidth:72}}><div style={{fontSize:20}}>{ICONOS[e]}</div><div style={{color:c,fontSize:9,fontWeight:700,textTransform:"uppercase",margin:"3px 0"}}>{ETIQUETAS[e]}</div><div style={{color:B.textDark,fontWeight:800,fontSize:20}}>{n}</div></div>{i<ETAPAS.length-1&&<div style={{color:B.border,fontSize:18,padding:"0 3px"}}>›</div>}</div>);})}
      </div>
    </div>}/>

    <Card ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Inventario</div>
        <button onClick={()=>setVista("almacen")} style={{background:"none",border:"1px solid "+B.border,color:B.teal,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Ver →</button>
      </div>
      {mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green;return(<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+B.border}}><span style={{color:B.textDark,fontSize:14,fontWeight:600}}>{m.nombre}</span><div style={{display:"flex",alignItems:"center",gap:8}}>{(bj||cr)&&<span>{cr?"🚨":"⚠️"}</span>}<span style={{color:bc,fontWeight:800,fontSize:15}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div></div>);})}
    </div>}/>

    {regs.length===0&&<Card style={{textAlign:"center",padding:40,border:"1.5px dashed "+B.border}} ch={<div><div style={{fontSize:40,marginBottom:10}}>📋</div><div style={{color:B.textMid,fontSize:15,fontWeight:700}}>Sin registros aún</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca <strong>Registrar</strong> para comenzar</div></div>}/>}
  </div>);
}

// ── Accounting: Gastos ────────────────────────────────────────────────────────
function GastosModule({gastos,setGastos,sup}){
  const [modo,setModo]=useState(false);
  const [form,setForm]=useState({fecha:new Date().toISOString().split("T")[0],categoria:"materia_prima",monto:"",descripcion:"",proveedor:""});
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  const save=async()=>{
    if(!form.monto)return;
    const g={id:String(Date.now()),fecha:form.fecha,categoria:form.categoria,monto:Number(form.monto),descripcion:form.descripcion,proveedor:form.proveedor,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setGastos(prev=>[g,...prev]);
    await dbSaveGasto(g);
    setForm({fecha:new Date().toISOString().split("T")[0],categoria:"materia_prima",monto:"",descripcion:"",proveedor:""});
    setModo(false);
  };

  const del=async(id)=>{setGastos(prev=>prev.filter(g=>g.id!==id));await dbDeleteGasto(id);};

  const totByCat=useMemo(()=>{
    const m={};gastos.forEach(g=>{m[g.categoria]=(m[g.categoria]||0)+Number(g.monto);});return m;
  },[gastos]);
  const totalGastos=gastos.reduce((s,g)=>s+Number(g.monto),0);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Total Gastos" value={"$"+totalGastos.toLocaleString()} color={B.red}/>
      <Stat label="Registros" value={gastos.length} color={B.navy}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      {CATEGORIAS_GASTO.map(c=><div key={c.v} style={{background:"#fff",borderRadius:12,padding:"10px 12px",border:"1.5px solid "+B.border}}>
        <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{c.l}</div>
        <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>${(totByCat[c.v]||0).toLocaleString()}</div>
      </div>)}
    </div>
    {!modo&&<Btn ch="+ Nuevo Gasto" fn={()=>setModo(true)} full/>}
    {modo&&<Card ch={<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{color:B.navy,fontSize:16,fontWeight:800}}>Nuevo Gasto</div>
      <F label="Fecha" value={form.fecha} onChange={set("fecha")} type="date"/>
      <S label="Categoría" value={form.categoria} onChange={set("categoria")} options={CATEGORIAS_GASTO}/>
      <F label="Monto (RD$)" value={form.monto} onChange={set("monto")} type="number" placeholder="0.00"/>
      <F label="Descripción" value={form.descripcion} onChange={set("descripcion")} placeholder="Detalle del gasto"/>
      <F label="Proveedor" value={form.proveedor} onChange={set("proveedor")} placeholder="Nombre del proveedor"/>
      <div style={{display:"flex",gap:8}}>
        <Btn ch="Guardar" fn={save} full/><Btn ch="Cancelar" fn={()=>setModo(false)} outline small/>
      </div>
    </div>}/>}
    {gastos.map(g=><Card key={g.id} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
          <Badge label={(CATEGORIAS_GASTO.find(c=>c.v===g.categoria)||{l:g.categoria}).l} color={B.navy}/>
          <span style={{color:B.textLight,fontSize:12}}>{g.fecha}</span>
        </div>
        <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>RD$ {Number(g.monto).toLocaleString()}</div>
        {g.descripcion&&<div style={{color:B.textMid,fontSize:13}}>{g.descripcion}</div>}
        {g.proveedor&&<div style={{color:B.textLight,fontSize:12}}>Proveedor: {g.proveedor}</div>}
      </div>
      <Btn ch="✕" fn={()=>{if(confirm("¿Seguro que desea eliminar este gasto?"))del(g.id);}} color={B.red} outline small/>
    </div>}/>)}
  </div>);
}

// ── Accounting: Facturación ──────────────────────────────────────────────────
function Facturacion({facturas,setFacturas,productoLogs,ordenes,sup,pagos,setPagos}){
  const [modo,setModo]=useState(false);
  const [exp,setExp]=useState(null);
  const nextNum=()=>{const y=new Date().getFullYear();const ex=facturas.filter(f=>f.numero&&f.numero.startsWith("FAC-"+y));const mx=ex.reduce((max,f)=>{const n=parseInt((f.numero||"").split("-")[2])||0;return n>max?n:max;},0);return"FAC-"+y+"-"+String(mx+1).padStart(3,"0");};

  // Compute available stock from producto terminado
  const stockDisponible=React.useMemo(()=>{
    const m={};
    productoLogs.forEach(l=>{
      if(!m[l.producto])m[l.producto]={producto:l.producto,almacen:0,unidad:l.unidad||"uds"};
      if(l.tipo==="entrada")m[l.producto].almacen+=l.cantidad;
      else if(l.tipo==="salida")m[l.producto].almacen-=l.cantidad;
      else if(l.tipo==="ajuste")m[l.producto].almacen+=l.cantidad;
    });
    return Object.values(m).filter(p=>p.almacen>0);
  },[productoLogs]);
  const prodOptions=stockDisponible.map(p=>({v:p.producto,l:p.producto+" ("+Math.max(0,p.almacen)+" "+p.unidad+")"}));
  const defaultProd=prodOptions.length>0?prodOptions[0].v:"";

  const [form,setForm]=useState({numero:nextNum(),fecha:new Date().toISOString().split("T")[0],cliente:"",ncf:"",notas:"",items:[{producto:defaultProd,cantidad:"",precio:""}]});
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  const addItem=()=>setForm(f=>Object.assign({},f,{items:[...f.items,{producto:defaultProd,cantidad:"",precio:""}]}));
  const setItem=(i,k,v)=>setForm(f=>{const items=[...f.items];items[i]=Object.assign({},items[i],{[k]:v});return Object.assign({},f,{items});});
  const rmItem=(i)=>setForm(f=>Object.assign({},f,{items:f.items.filter((_,j)=>j!==i)}));

  const subtotal=form.items.reduce((s,it)=>s+(Number(it.cantidad)||0)*(Number(it.precio)||0),0);
  const itbis=subtotal*0.18;
  const total=subtotal+itbis;

  const save=async()=>{
    if(!form.cliente||!form.items.length)return;
    const fId=String(Date.now());
    const factura={id:fId,numero:form.numero,fecha:form.fecha,cliente:form.cliente,ncf:form.ncf||null,orden_id:null,subtotal,impuesto:itbis,total,estado:"pendiente",notas:form.notas,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setFacturas(prev=>[Object.assign({},factura,{_items:form.items.map((it,i)=>({id:fId+"-"+i,factura_id:fId,producto:it.producto,cantidad:Number(it.cantidad)||0,precio_unitario:Number(it.precio)||0,subtotal:(Number(it.cantidad)||0)*(Number(it.precio)||0)}))}),...prev]);
    await dbSaveFactura(factura);
    for(const [i,it] of form.items.entries()){
      await dbSaveFacturaItem({id:fId+"-"+i,factura_id:fId,producto:it.producto,cantidad:Number(it.cantidad)||0,precio_unitario:Number(it.precio)||0,subtotal:(Number(it.cantidad)||0)*(Number(it.precio)||0)});
    }
    setForm({numero:nextNum(),fecha:new Date().toISOString().split("T")[0],cliente:"",ncf:"",notas:"",items:[{producto:defaultProd,cantidad:"",precio:""}]});
    setModo(false);
  };

  const marcarPagada=async(f)=>{
    setFacturas(prev=>prev.map(x=>x.id===f.id?Object.assign({},x,{estado:"pagada"}):x));
    await dbUpdateFactura(f.id,{estado:"pagada"});
    const pago={id:String(Date.now()),tipo:"cobro",referencia_id:f.id,referencia_tipo:"factura",monto:f.total,fecha:new Date().toISOString().split("T")[0],metodo:"transferencia",notas:"Pago factura "+f.numero,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setPagos(prev=>[pago,...prev]);
    await dbSavePago(pago);
  };

  const del=async(id)=>{setFacturas(prev=>prev.filter(f=>f.id!==id));await dbDeleteFacturaItems(id);await dbDeleteFactura(id);};

  const printFactura=(f)=>{
    const items=(f._items||[]);
    const sub=items.reduce((s,it)=>s+(Number(it.subtotal)||0),0);

      ".inv-box{text-align:right}.inv-box h1{margin:0;font-size:22px;color:#1C2540}.inv-box p{margin:2px 0;font-size:12px;color:#64748B}"+
      ".info{display:flex;justify-content:space-between;margin:16px 0}"+
      ".info div{font-size:13px}.info .label{color:#64748B;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:2px}"+
      ".totals{text-align:right;margin-top:10px}.totals div{margin:4px 0;font-size:14px}"+
      ".totals .grand{font-size:20px;font-weight:800;color:#1C2540;border-top:2px solid #1C2540;padding-top:8px;margin-top:8px}"+
      ".badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}"+
      ".footer{margin-top:40px;text-align:center;font-size:10px;color:#94A3B8;border-top:1px solid #E2E8F0;padding-top:12px}"+
      "@media print{body{margin:20px}button{display:none!important}}"+
      "</style></head><body>"+
      "<div class='header'><div style='display:flex;align-items:center'><img src='"+LOGO_IMG+"' class='logo'/><div class='co'><h2>"+EMPRESA_INFO.nombre+"</h2><p>"+EMPRESA_INFO.dir+"</p><p>"+EMPRESA_INFO.email+" · "+EMPRESA_INFO.web+"</p><p class='rnc'>"+EMPRESA_INFO.rnc+"</p></div></div>"+

      "<p><span class='badge' style='background:"+(f.estado==="pagada"?"#DEF7EC;color:#03543F":"#FEF3C7;color:#92400E")+"'>"+(f.estado==="pagada"?"PAGADA":"PENDIENTE")+"</span></p>"+
      "</div></div>"+
      "<div class='info'><div><div class='label'>Cliente</div><div><b>"+(f.cliente||"—")+"</b></div></div>"+
      (f.ncf?"<div><div class='label'>NCF</div><div><b>"+f.ncf+"</b></div></div>":"")+
      "<div><div class='label'>Creado por</div><div>"+(f.creado_por||"—")+"</div></div></div>"+
      "<table><thead><tr><th>#</th><th>Producto</th><th>Cantidad</th><th>Precio Unit.</th><th style='text-align:right'>Subtotal</th></tr></thead><tbody>"+
      items.map((it,i)=>"<tr><td>"+(i+1)+"</td><td>"+it.producto+"</td><td>"+Number(it.cantidad).toLocaleString()+"</td><td>RD$ "+Number(it.precio_unitario).toLocaleString()+"</td><td style='text-align:right;font-weight:700'>RD$ "+Number(it.subtotal).toLocaleString()+"</td></tr>").join("")+
      "</tbody></table>"+
      "<div class='totals'><div><span style='color:#64748B'>Subtotal:</span> RD$ "+sub.toLocaleString()+"</div>"+
      "<div><span style='color:#64748B'>ITBIS (18%):</span> RD$ "+tax.toLocaleString()+"</div>"+
      "<div class='grand'>Total: RD$ "+tot.toLocaleString()+"</div></div>"+
      (f.notas?"<div style='margin-top:20px;padding:12px;background:#F8FAFC;border-radius:8px;font-size:12px;color:#64748B'><b>Notas:</b> "+f.notas+"</div>":"")+
      "<div class='footer'>"+EMPRESA_INFO.nombre+" · "+EMPRESA_INFO.dir+"<br>"+EMPRESA_INFO.email+" · "+EMPRESA_INFO.web+" · "+EMPRESA_INFO.rnc+"</div>"+
      "<div style='text-align:center;margin-top:20px'><button onclick='window.print()' style='background:#1C2540;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer'>Guardar como PDF</button></div>"+
      "</body></html>");
    w.document.close();
  };

  const totalFacturado=facturas.reduce((s,f)=>s+Number(f.total||0),0);
  const totalPendiente=facturas.filter(f=>f.estado==="pendiente").reduce((s,f)=>s+Number(f.total||0),0);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Total Facturado" value={"$"+totalFacturado.toLocaleString()} color={B.green}/>
      <Stat label="Pendiente" value={"$"+totalPendiente.toLocaleString()} color={B.amber}/>

    {!modo&&<Btn ch="+ Nueva Factura" fn={()=>{setForm(f=>Object.assign({},f,{numero:nextNum()}));setModo(true);}} full/>}

      <div style={{display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid "+B.teal,paddingBottom:12}}>
        <img src={LOGO_IMG} alt="Logo" style={{width:50,height:50,objectFit:"contain"}}/>
        <div style={{flex:1}}>
          <div style={{color:B.navy,fontSize:14,fontWeight:800}}>{EMPRESA_INFO.nombre}</div>
          <div style={{color:B.textLight,fontSize:10,lineHeight:1.3}}>{EMPRESA_INFO.dir}</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <F label="Número" value={form.numero} onChange={set("numero")}/>
        <F label="Fecha" value={form.fecha} onChange={set("fecha")} type="date"/>
      </div>
      <F label="Cliente" value={form.cliente} onChange={set("cliente")} placeholder="Nombre del cliente"/>
      <F label="NCF" value={form.ncf} onChange={set("ncf")} placeholder="Número de Comprobante Fiscal"/>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:4}}>Productos en Almacén</div>

      {form.items.map((it,i)=>{const lineTotal=(Number(it.cantidad)||0)*(Number(it.precio)||0);const stk=stockDisponible.find(s=>s.producto===it.producto);return(<div key={i} style={{background:B.bg,borderRadius:10,padding:"10px 12px",marginBottom:6}}>
        <S label="" value={it.producto} onChange={v=>setItem(i,"producto",v)} options={prodOptions}/>
        {stk&&<div style={{color:B.teal,fontSize:11,fontWeight:600,margin:"4px 0 6px"}}>Disponible: {Math.max(0,stk.almacen)} {stk.unidad}</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 30px",gap:6,alignItems:"end"}}>
          <F label="Cant." value={it.cantidad} onChange={v=>setItem(i,"cantidad",v)} type="number"/>
          <F label="Precio Unit." value={it.precio} onChange={v=>setItem(i,"precio",v)} type="number"/>
          {form.items.length>1&&<button onClick={()=>rmItem(i)} style={{background:"none",border:"none",color:B.red,fontSize:18,cursor:"pointer",paddingBottom:13}}>✕</button>}
        </div>
        {lineTotal>0&&<div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}><span style={{color:B.navy,fontSize:13,fontWeight:700}}>RD$ {lineTotal.toLocaleString()}</span></div>}
      </div>);})}
      <button onClick={addItem} style={{background:"none",border:"1.5px dashed "+B.border,borderRadius:10,padding:10,color:B.teal,fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Agregar producto</button>
      <div style={{background:B.bg,borderRadius:10,padding:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:B.textLight,fontSize:13}}>Subtotal</span><span style={{color:B.textDark,fontSize:14,fontWeight:700}}>RD$ {subtotal.toLocaleString()}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:B.textLight,fontSize:13}}>ITBIS (18%)</span><span style={{color:B.textDark,fontSize:14,fontWeight:700}}>RD$ {itbis.toLocaleString()}</span></div>

        <Btn ch="Guardar Factura" fn={save} full/><Btn ch="Cancelar" fn={()=>setModo(false)} outline small/>

    </div>}/>}
    {facturas.map(f=><Card key={f.id} accent={f.estado==="pagada"?B.green:f.estado==="anulada"?B.red:B.border} ch={<div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>

          <span style={{color:B.textLight,fontSize:14}}>{exp===f.id?"▲":"▼"}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{color:B.textMid,fontSize:13}}>{f.cliente}</div><div style={{color:B.textLight,fontSize:12}}>{f.fecha}</div></div>

      </div>

            <div style={{color:B.navy,fontSize:11,fontWeight:800}}>{EMPRESA_INFO.nombre}</div>
            <div style={{color:B.textLight,fontSize:9}}>{EMPRESA_INFO.dir}</div>
            <div style={{color:B.textLight,fontSize:9}}>{EMPRESA_INFO.email} · {EMPRESA_INFO.web}</div>
            <div style={{color:B.teal,fontSize:9,fontWeight:700}}>{EMPRESA_INFO.rnc}</div>
          </div>
        </div>

          <span style={{color:B.textMid}}>{it.producto} x{it.cantidad}</span>

        </div>)}
        {f.notas&&<div style={{color:B.textLight,fontSize:12,marginTop:6}}>Nota: {f.notas}</div>}

          <Btn ch="Eliminar" fn={()=>{if(confirm("¿Seguro que desea eliminar esta factura?"))del(f.id);}} color={B.red} outline small/>
        </div>
      </div>}
    </div>}/>)}
  </div>);
}

// ── Accounting: Cuentas por Cobrar ───────────────────────────────────────────
function CuentasCobrar({facturas,setFacturas,pagos,setPagos,sup}){
  const [payId,setPayId]=useState(null);
  const [payForm,setPayForm]=useState({monto:"",fecha:new Date().toISOString().split("T")[0],metodo:"transferencia"});

  const pendientes=facturas.filter(f=>f.estado==="pendiente"||f.estado==="parcial");
  const hoy=new Date();
  const aging=(fecha)=>{const d=Math.floor((hoy-new Date(fecha))/(1000*60*60*24));return d;};

  const buckets={a:0,b:0,c:0,d:0};
  pendientes.forEach(f=>{const d=aging(f.fecha);const amt=Number(f.total||0);if(d<=30)buckets.a+=amt;else if(d<=60)buckets.b+=amt;else if(d<=90)buckets.c+=amt;else buckets.d+=amt;});
  const totalPend=pendientes.reduce((s,f)=>s+Number(f.total||0),0);

  const registrarPago=async(f)=>{
    const monto=Number(payForm.monto);if(!monto)return;
    const pago={id:String(Date.now()),tipo:"cobro",referencia_id:f.id,referencia_tipo:"factura",monto,fecha:payForm.fecha,metodo:payForm.metodo,notas:"Abono factura "+f.numero,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setPagos(prev=>[pago,...prev]);
    await dbSavePago(pago);
    const pagosFactura=pagos.filter(p=>p.referencia_id===f.id&&p.tipo==="cobro").reduce((s,p)=>s+Number(p.monto),0)+monto;
    const nuevoEstado=pagosFactura>=Number(f.total)?"pagada":"parcial";
    setFacturas(prev=>prev.map(x=>x.id===f.id?Object.assign({},x,{estado:nuevoEstado}):x));
    await dbUpdateFactura(f.id,{estado:nuevoEstado});
    setPayId(null);setPayForm({monto:"",fecha:new Date().toISOString().split("T")[0],metodo:"transferencia"});
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Total por Cobrar" value={"$"+totalPend.toLocaleString()} color={B.amber}/>
      <Stat label="Facturas Pend." value={pendientes.length} color={B.navy}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
      {[{l:"0-30d",v:buckets.a,c:B.green},{l:"31-60d",v:buckets.b,c:B.amber},{l:"61-90d",v:buckets.c,c:B.red},{l:"90+d",v:buckets.d,c:B.purple}].map(b=><div key={b.l} style={{background:"#fff",borderRadius:10,padding:"8px 10px",border:"1.5px solid "+B.border,textAlign:"center"}}>
        <div style={{color:B.textLight,fontSize:9,fontWeight:700}}>{b.l}</div>
        <div style={{color:b.c,fontSize:14,fontWeight:800}}>${b.v.toLocaleString()}</div>
      </div>)}
    </div>
    {pendientes.map(f=><Card key={f.id} ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{color:B.navy,fontWeight:800}}>{f.numero}</span><Badge label={aging(f.fecha)+" días"} color={aging(f.fecha)>60?B.red:aging(f.fecha)>30?B.amber:B.green}/></div>
          <div style={{color:B.textMid,fontSize:13}}>{f.cliente}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>RD$ {Number(f.total||0).toLocaleString()}</div>
          <div style={{color:B.textLight,fontSize:11}}>{f.fecha}</div>
        </div>
      </div>
      {payId===f.id?<div style={{borderTop:"1px solid "+B.border,paddingTop:10,display:"flex",flexDirection:"column",gap:8}}>
        <F label="Monto" value={payForm.monto} onChange={v=>setPayForm(p=>Object.assign({},p,{monto:v}))} type="number" placeholder="0.00"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <F label="Fecha" value={payForm.fecha} onChange={v=>setPayForm(p=>Object.assign({},p,{fecha:v}))} type="date"/>
          <S label="Método" value={payForm.metodo} onChange={v=>setPayForm(p=>Object.assign({},p,{metodo:v}))} options={METODOS_PAGO}/>

        <div style={{display:"flex",gap:8}}><Btn ch="Registrar Pago" fn={()=>registrarPago(f)} small/><Btn ch="Cancelar" fn={()=>setPayId(null)} outline small/></div>
      </div>:<div style={{display:"flex",gap:8,marginTop:6}}><Btn ch="Registrar Pago" fn={()=>setPayId(f.id)} small/></div>}
    </div>}/>)}
    {!pendientes.length&&<div style={{textAlign:"center",padding:30,color:B.textLight}}>No hay facturas pendientes de cobro</div>}
  </div>);
}

// ── Accounting: Cuentas por Pagar ────────────────────────────────────────────
function CuentasPagarModule({cuentasPagar,setCuentasPagar,pagos,setPagos,sup}){
  const [modo,setModo]=useState(false);
  const [payId,setPayId]=useState(null);
  const [viewImg,setViewImg]=useState(null);
  const [payForm,setPayForm]=useState({monto:"",fecha:new Date().toISOString().split("T")[0],metodo:"transferencia"});
  const [form,setForm]=useState({proveedor:"",concepto:"",monto:"",moneda:"RD$",fecha_factura:new Date().toISOString().split("T")[0],fecha_vencimiento:"",notas:"",imagen:""});
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  const handleImg=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>setForm(f=>Object.assign({},f,{imagen:ev.target.result}));
    reader.readAsDataURL(file);
  };

  const save=async()=>{
    if(!form.proveedor||!form.monto)return;
    const c={id:String(Date.now()),proveedor:form.proveedor,concepto:form.concepto,monto:Number(form.monto),moneda:form.moneda,fecha_factura:form.fecha_factura,fecha_vencimiento:form.fecha_vencimiento||null,estado:"pendiente",pagado:0,notas:form.notas,imagen:form.imagen||null,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setCuentasPagar(prev=>[c,...prev]);
    await dbSaveCuentaPagar(c);
    setForm({proveedor:"",concepto:"",monto:"",moneda:"RD$",fecha_factura:new Date().toISOString().split("T")[0],fecha_vencimiento:"",notas:"",imagen:""});
    setModo(false);
  };

  const registrarPago=async(cp)=>{
    const monto=Number(payForm.monto);if(!monto)return;
    const pago={id:String(Date.now()),tipo:"pago",referencia_id:cp.id,referencia_tipo:"cuenta_pagar",monto,fecha:payForm.fecha,metodo:payForm.metodo,notas:"Pago a "+cp.proveedor,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setPagos(prev=>[pago,...prev]);
    await dbSavePago(pago);
    const pagado=Number(cp.pagado||0)+monto;
    const nuevoEstado=pagado>=Number(cp.monto)?"pagada":"parcial";
    setCuentasPagar(prev=>prev.map(x=>x.id===cp.id?Object.assign({},x,{pagado,estado:nuevoEstado}):x));
    await dbUpdateCuentaPagar(cp.id,{pagado,estado:nuevoEstado});
    setPayId(null);setPayForm({monto:"",fecha:new Date().toISOString().split("T")[0],metodo:"transferencia"});
  };

  const del=async(id)=>{setCuentasPagar(prev=>prev.filter(c=>c.id!==id));await dbDeleteCuentaPagar(id);};

  const totalPend=cuentasPagar.filter(c=>c.estado!=="pagada").reduce((s,c)=>s+Number(c.monto||0)-Number(c.pagado||0),0);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Total por Pagar" value={"$"+totalPend.toLocaleString()} color={B.red}/>
      <Stat label="Cuentas" value={cuentasPagar.filter(c=>c.estado!=="pagada").length} color={B.navy}/>
    </div>
    {!modo&&<Btn ch="+ Nueva Cuenta" fn={()=>setModo(true)} full/>}
    {modo&&<Card ch={<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{color:B.navy,fontSize:16,fontWeight:800}}>Nueva Cuenta por Pagar</div>
      <F label="Proveedor" value={form.proveedor} onChange={set("proveedor")} placeholder="Nombre del proveedor"/>
      <F label="Concepto" value={form.concepto} onChange={set("concepto")} placeholder="Descripción"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 100px",gap:10}}>
        <F label={"Monto ("+form.moneda+")"} value={form.monto} onChange={set("monto")} type="number" placeholder="0.00"/>
        <S label="Moneda" value={form.moneda} onChange={set("moneda")} options={[{v:"RD$",l:"RD$"},{v:"USD",l:"USD"}]}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <F label="Fecha Factura" value={form.fecha_factura} onChange={set("fecha_factura")} type="date"/>
        <F label="Vencimiento" value={form.fecha_vencimiento} onChange={set("fecha_vencimiento")} type="date"/>
      </div>
      <div>
        <div style={{fontSize:12,fontWeight:600,color:B.textMid,marginBottom:6}}>Foto de Factura</div>
        <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,border:"1.5px dashed "+B.border,borderRadius:10,padding:"14px 12px",cursor:"pointer",color:B.teal,fontSize:13,fontWeight:700,background:form.imagen?"#F0FDF4":B.bg}}>
          <input type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
          {form.imagen?"✓ Imagen adjunta — Cambiar":"📷 Adjuntar foto de factura"}
        </label>
        {form.imagen&&<img src={form.imagen} alt="Preview" style={{width:"100%",maxHeight:200,objectFit:"contain",borderRadius:8,marginTop:8,border:"1px solid "+B.border}}/>}
      </div>
      <F label="Notas" value={form.notas} onChange={set("notas")} placeholder="Observaciones"/>
      <div style={{display:"flex",gap:8}}><Btn ch="Guardar" fn={save} full/><Btn ch="Cancelar" fn={()=>setModo(false)} outline small/></div>
    </div>}/>}
    {cuentasPagar.map(cp=><Card key={cp.id} accent={cp.estado==="pagada"?B.green:B.border} ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div>
          <div style={{color:B.navy,fontSize:14,fontWeight:800}}>{cp.proveedor}</div>
          <div style={{color:B.textMid,fontSize:13}}>{cp.concepto}</div>
          <div style={{color:B.textLight,fontSize:11}}>{cp.fecha_factura}{cp.fecha_vencimiento?" → "+cp.fecha_vencimiento:""}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>{cp.moneda||"RD$"} {Number(cp.monto||0).toLocaleString()}</div>
          <Badge label={cp.estado==="pagada"?"Pagada":cp.estado==="parcial"?"Parcial":"Pendiente"} color={cp.estado==="pagada"?B.green:cp.estado==="parcial"?B.amber:B.red}/>
          {Number(cp.pagado)>0&&<div style={{color:B.green,fontSize:11,marginTop:2}}>Pagado: {cp.moneda||"RD$"} {Number(cp.pagado).toLocaleString()}</div>}
        </div>
      </div>
      {cp.imagen&&<div style={{marginTop:6}}>
        {viewImg===cp.id?<div><img src={cp.imagen} alt="Factura" style={{width:"100%",maxHeight:300,objectFit:"contain",borderRadius:8,border:"1px solid "+B.border}}/><button onClick={()=>setViewImg(null)} style={{background:"none",border:"none",color:B.textLight,fontSize:12,cursor:"pointer",marginTop:4}}>Ocultar</button></div>
        :<button onClick={()=>setViewImg(cp.id)} style={{background:B.bg,border:"1px solid "+B.border,borderRadius:8,padding:"6px 12px",color:B.teal,fontSize:12,fontWeight:700,cursor:"pointer"}}>📷 Ver factura</button>}
      </div>}
      {cp.estado!=="pagada"&&(payId===cp.id?<div style={{borderTop:"1px solid "+B.border,paddingTop:10,display:"flex",flexDirection:"column",gap:8}}>
        <F label="Monto" value={payForm.monto} onChange={v=>setPayForm(p=>Object.assign({},p,{monto:v}))} type="number" placeholder="0.00"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <F label="Fecha" value={payForm.fecha} onChange={v=>setPayForm(p=>Object.assign({},p,{fecha:v}))} type="date"/>
          <S label="Método" value={payForm.metodo} onChange={v=>setPayForm(p=>Object.assign({},p,{metodo:v}))} options={METODOS_PAGO}/>
        </div>
        <div style={{display:"flex",gap:8}}><Btn ch="Pagar" fn={()=>registrarPago(cp)} small/><Btn ch="Cancelar" fn={()=>setPayId(null)} outline small/></div>
      </div>:<div style={{display:"flex",gap:8,marginTop:6}}>
        <Btn ch="Registrar Pago" fn={()=>setPayId(cp.id)} small/>
        <Btn ch="Eliminar" fn={()=>{if(confirm("¿Seguro que desea eliminar esta cuenta?"))del(cp.id);}} color={B.red} outline small/>
      </div>)}
    </div>}/>)}
    {!cuentasPagar.length&&<div style={{textAlign:"center",padding:30,color:B.textLight}}>No hay cuentas por pagar registradas</div>}
  </div>);
}

// ── Accounting: Resumen Financiero ───────────────────────────────────────────
function ResumenFinanciero({facturas,gastos,cuentasPagar,pagos,resinaLogs,movs}){
  const [periodo,setPeriodo]=useState("mensual");
  const hoy=new Date();

  const filtrarPorPeriodo=(fecha)=>{
    const d=new Date(fecha);
    if(periodo==="diario")return d.toDateString()===hoy.toDateString();
    if(periodo==="semanal"){const w=new Date(hoy);w.setDate(w.getDate()-7);return d>=w;}
    const m=new Date(hoy.getFullYear(),hoy.getMonth(),1);return d>=m;
  };

  const ingresos=facturas.filter(f=>(f.estado==="pagada"||f.estado==="parcial")&&filtrarPorPeriodo(f.fecha)).reduce((s,f)=>s+Number(f.total||0),0);
  const costoMP=gastos.filter(g=>g.categoria==="materia_prima"&&filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const gastosOp=gastos.filter(g=>g.categoria!=="materia_prima"&&filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const totalGastos=gastos.filter(g=>filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const utilidad=ingresos-totalGastos;
  const margen=ingresos>0?((utilidad/ingresos)*100).toFixed(1):0;

  // Price per pound: total MP cost / total lbs purchased
  const totalLbsCompradas=(movs||[]).filter(m=>m.tipo==="entrada"&&(m.materialId==="ldpe"||m.materialId==="mlldpe")&&filtrarPorPeriodo(m.fecha)).reduce((s,m)=>s+Number(m.cantidad||0),0);
  const costoMPPeriodo=gastos.filter(g=>g.categoria==="materia_prima"&&filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const precioLibra=totalLbsCompradas>0?(costoMPPeriodo/totalLbsCompradas).toFixed(2):null;

  const porPagar=cuentasPagar.filter(c=>c.estado!=="pagada").reduce((s,c)=>s+Number(c.monto||0)-Number(c.pagado||0),0);
  const porCobrar=facturas.filter(f=>f.estado==="pendiente"||f.estado==="parcial").reduce((s,f)=>s+Number(f.total||0),0);

  // Monthly breakdown for chart (last 6 months)
  const meses=[];
  for(let i=5;i>=0;i--){
    const d=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
    const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const label=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][d.getMonth()];
    const ingM=facturas.filter(f=>(f.estado==="pagada"||f.estado==="parcial")&&f.fecha&&f.fecha.startsWith(key)).reduce((s,f)=>s+Number(f.total||0),0);
    const gasM=gastos.filter(g=>g.fecha&&g.fecha.startsWith(key)).reduce((s,g)=>s+Number(g.monto||0),0);
    meses.push({label,ing:ingM,gas:gasM,util:ingM-gasM});
  }
  const maxMes=Math.max(...meses.map(m=>Math.max(m.ing,m.gas)),1);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:6}}>
      {["diario","semanal","mensual"].map(p=><button key={p} onClick={()=>setPeriodo(p)} style={{background:periodo===p?B.navy:"transparent",border:"1.5px solid "+(periodo===p?B.navy:B.border),borderRadius:20,padding:"7px 14px",color:periodo===p?"#fff":B.textMid,fontSize:12,fontWeight:700,cursor:"pointer"}}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Ingresos" value={"$"+ingresos.toLocaleString()} color={B.green}/>
      <Stat label="Costo MP" value={"$"+costoMP.toLocaleString()} color={B.amber}/>
      <Stat label="Gastos Op." value={"$"+gastosOp.toLocaleString()} color={B.red}/>
      <Stat label="Utilidad" value={(utilidad>=0?"$":"-$")+Math.abs(utilidad).toLocaleString()} color={utilidad>=0?B.teal:B.red} sub={"Margen: "+margen+"%"}/>
    </div>
    <Card ch={<div>
      <div style={{color:B.navy,fontSize:14,fontWeight:800,marginBottom:10}}>Costo por Libra</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <div style={{background:B.teal+"12",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Lbs Compradas</div>
          <div style={{color:B.teal,fontSize:18,fontWeight:800}}>{totalLbsCompradas.toLocaleString()}</div>
        </div>
        <div style={{background:B.amber+"12",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Costo MP</div>
          <div style={{color:B.amber,fontSize:18,fontWeight:800}}>RD$ {costoMPPeriodo.toLocaleString()}</div>
        </div>
        <div style={{background:B.navy+"12",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Precio/Lb</div>
          <div style={{color:B.navy,fontSize:18,fontWeight:800}}>{precioLibra?"RD$ "+precioLibra:"—"}</div>
        </div>
      </div>
      {!precioLibra&&<div style={{color:B.textLight,fontSize:11,marginTop:8,textAlign:"center"}}>Registre compras de materia prima y gastos de MP para ver el costo por libra</div>}
    </div>}/>
    <Card ch={<div>
      <div style={{color:B.navy,fontSize:14,fontWeight:800,marginBottom:12}}>Flujo de Caja</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{background:B.green+"15",borderRadius:10,padding:12,textAlign:"center"}}>
          <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Por Cobrar</div>
          <div style={{color:B.green,fontSize:18,fontWeight:800}}>RD$ {porCobrar.toLocaleString()}</div>
        </div>
        <div style={{background:B.red+"15",borderRadius:10,padding:12,textAlign:"center"}}>
          <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Por Pagar</div>
          <div style={{color:B.red,fontSize:18,fontWeight:800}}>RD$ {porPagar.toLocaleString()}</div>
        </div>
      </div>
    </div>}/>
    <Card ch={<div>
      <div style={{color:B.navy,fontSize:14,fontWeight:800,marginBottom:12}}>Últimos 6 Meses</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {meses.map((m,i)=><div key={i}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{color:B.textMid,fontSize:12,fontWeight:700}}>{m.label}</span>
            <span style={{color:m.util>=0?B.green:B.red,fontSize:12,fontWeight:800}}>{m.util>=0?"+":""}{m.util.toLocaleString()}</span>
          </div>
          <div style={{display:"flex",gap:3,height:16}}>
            <div style={{background:B.green,borderRadius:4,height:"100%",width:Math.max(2,(m.ing/maxMes)*100)+"%",transition:"width .3s"}} title={"Ingresos: "+m.ing}/>
            <div style={{background:B.red,borderRadius:4,height:"100%",width:Math.max(2,(m.gas/maxMes)*100)+"%",transition:"width .3s"}} title={"Gastos: "+m.gas}/>
          </div>
        </div>)}
      </div>
      <div style={{display:"flex",gap:12,marginTop:8}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:3,background:B.green}}/><span style={{color:B.textLight,fontSize:11}}>Ingresos</span></div>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:3,background:B.red}}/><span style={{color:B.textLight,fontSize:11}}>Gastos</span></div>
      </div>
    </div>}/>
    <Card ch={<div>
      <div style={{color:B.navy,fontSize:14,fontWeight:800,marginBottom:12}}>Desglose de Gastos</div>
      {CATEGORIAS_GASTO.map(cat=>{
        const amt=gastos.filter(g=>g.categoria===cat.v&&filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
        const pct=totalGastos>0?((amt/totalGastos)*100).toFixed(0):0;
        return <div key={cat.v} style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
            <span style={{color:B.textMid,fontSize:12,fontWeight:600}}>{cat.l}</span>
            <span style={{color:B.textDark,fontSize:12,fontWeight:700}}>RD$ {amt.toLocaleString()} ({pct}%)</span>
          </div>
          <div style={{height:8,background:B.bg,borderRadius:4}}>
            <div style={{height:"100%",background:B.teal,borderRadius:4,width:pct+"%",transition:"width .3s"}}/>
          </div>
        </div>;
      })}
    </div>}/>
  </div>);
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [sup,setSup]=useState(null);
  const [regs,setRegs]=useState([]);
  const [resinaLogs,setResinaLogs]=useState([]);
  const [mat,setMat]=useState(MATERIALES_INIT);
  const [movs,setMovs]=useState([]);
  const [ordenes,setOrdenes]=useState([]);
  const [productoLogs,setProductoLogs]=useState([]);
  const [vista,setVista]=useState("dashboard");
  const [dbLoading,setDbLoading]=useState(true);
  const [facturas,setFacturas]=useState([]);
  const [cuentasPagar,setCuentasPagar]=useState([]);
  const [gastos,setGastos]=useState([]);
  const [pagos,setPagos]=useState([]);

  useEffect(()=>{
    Promise.all([dbLoad(),dbLoadOrders(),dbLoadResina(),dbLoadProductos(),dbLoadMovimientos()]).then(([r,o,res,pt,mvs])=>{
      setRegs(r);setOrdenes(o);setResinaLogs(res);setProductoLogs(pt);
      setMovs(mvs);
      // Reconstruct mat stock from movements
      const stock={};
      mvs.forEach(mv=>{
        if(!stock[mv.materialId])stock[mv.materialId]=0;
        stock[mv.materialId]+=(mv.tipo==="entrada"?1:-1)*mv.cantidad;
      });
      setMat(prev=>prev.map(m=>stock[m.id]!==undefined?Object.assign({},m,{stockActual:Math.max(0,stock[m.id])}):m));
      setDbLoading(false);
    }).catch(()=>setDbLoading(false));
  },[]);

  useEffect(()=>{
    if(sup&&isContador(sup)){
      Promise.all([dbLoadFacturas(),dbLoadCuentasPagar(),dbLoadGastos(),dbLoadPagos()])
        .then(([f,cp,g,p])=>{setFacturas(f);setCuentasPagar(cp);setGastos(g);setPagos(p);});
    }
  },[sup]);

  if(!sup)return <Login onLogin={setSup}/>;

  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo).length;
  const ordenesActivas=ordenes.filter(o=>o.etapa!=="listo").length;

  const ptEnAlmacen=productoLogs.reduce((s,l)=>{
    if(l.tipo==="entrada")return s+l.cantidad;
    if(l.tipo==="salida")return s-l.cantidad;
    return s;
  },0);
  const isOp=sup.rol==="operador";
  const NAV=isOp?[
    {id:"dashboard",icon:"🏭",label:"Producción"},
    {id:"registro",icon:"➕",label:"Registrar"},
    {id:"ordenes",icon:"📋",label:"Órdenes",badge:ordenesActivas},
  ]:[
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"registro",icon:"➕",label:"Registrar"},
    {id:"ordenes",icon:"📋",label:"Órdenes",badge:ordenesActivas},
    {id:"almacen",icon:"📦",label:"Almacén",badge:alts||Math.max(0,Math.round(ptEnAlmacen/1000))||0},
    ...(isContador(sup)?[{id:"contabilidad",icon:"💰",label:"Contab."}]:[]),
    {id:"rendimiento",icon:"📈",label:"Equipo"},
  ];

  return(<div style={{minHeight:"100dvh",background:isOp?"linear-gradient(160deg,"+B.navyDeep+" 0%,#1a2038 40%,"+B.navyDark+" 100%)":B.bg,paddingBottom:84}}>
    {/* Header */}
    <div style={{background:"linear-gradient(135deg,"+B.navyDeep+","+B.tealDark+")",padding:"env(safe-area-inset-top,0px) 16px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><Logo s={30}/><div><div style={{color:"#fff",fontSize:15,fontWeight:800,lineHeight:1.1}}>palamo</div><div style={{color:B.tealLight,fontSize:9,fontWeight:700,letterSpacing:1.5}}>{isOp?"OPERADOR":"PRODUCCIÓN"}</div></div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{textAlign:"right"}}><div style={{color:"#fff",fontSize:13,fontWeight:700,lineHeight:1.1}}>{sup.nombre.split(" ")[0]}</div><div style={{color:B.tealLight,fontSize:10,fontWeight:600}}>{sup.cargo}</div></div>
          <button onClick={()=>setSup(null)} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"7px 10px",color:"rgba(255,255,255,.8)",fontSize:12,fontWeight:700,cursor:"pointer"}}>Salir</button>
        </div>
      </div>
    </div>

    {/* Content */}
    <div style={{padding:"16px 16px 0"}}>
      {dbLoading&&<div style={{textAlign:"center",padding:40,color:B.textLight}}><div style={{fontSize:32,marginBottom:8}}>⏳</div><div style={{fontSize:14}}>Cargando datos...</div></div>}
      {!dbLoading&&vista==="dashboard"&&sup.rol==="operador"&&<PanelProduccion regs={regs} ordenes={ordenes} sup={sup} setVista={setVista}/>}
      {!dbLoading&&vista==="dashboard"&&sup.rol!=="operador"&&<Dashboard regs={regs} mat={mat} ordenes={ordenes} resinaLogs={resinaLogs} setVista={setVista}/>}
      {!dbLoading&&vista==="registro"&&<Registro sup={sup} regs={regs} setRegs={setRegs} resinaLogs={resinaLogs} setResinaLogs={setResinaLogs} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} productoLogs={productoLogs} setProductoLogs={setProductoLogs} ordenes={ordenes} setOrdenes={setOrdenes}/>}
      {!dbLoading&&vista==="ordenes"&&<Ordenes ordenes={ordenes} setOrdenes={setOrdenes} productoLogs={productoLogs} setProductoLogs={setProductoLogs} sup={sup}/>}
      {!dbLoading&&vista==="rendimiento"&&<Rendimiento regs={regs} resinaLogs={resinaLogs}/>}
      {!dbLoading&&vista==="almacen"&&<AlmacenUnificado logs={productoLogs} setLogs={setProductoLogs} ordenes={ordenes} sup={sup} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} regs={regs}/>}
      {!dbLoading&&vista==="contabilidad"&&isContador(sup)&&<Contabilidad facturas={facturas} setFacturas={setFacturas} cuentasPagar={cuentasPagar} setCuentasPagar={setCuentasPagar} gastos={gastos} setGastos={setGastos} pagos={pagos} setPagos={setPagos} productoLogs={productoLogs} ordenes={ordenes} regs={regs} resinaLogs={resinaLogs} movs={movs} sup={sup}/>}
    </div>

    {/* Bottom nav */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:isOp?"rgba(28,37,64,.97)":"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:"1px solid "+(isOp?"rgba(255,255,255,.1)":B.border),paddingBottom:"env(safe-area-inset-bottom,0px)",boxShadow:isOp?"0 -2px 16px rgba(0,0,0,.3)":"0 -2px 16px rgba(0,0,0,.08)"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat("+NAV.length+",1fr)"}}>
        {NAV.map(n=>(<button key={n.id} onClick={()=>setVista(n.id)} style={{background:"none",border:"none",padding:"8px 2px 5px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",position:"relative"}}>
          <span style={{fontSize:18,lineHeight:1}}>{n.icon}</span>
          <span style={{fontSize:9,fontWeight:700,color:vista===n.id?B.teal:(isOp?"rgba(255,255,255,.4)":B.textLight)}}>{n.label}</span>
          {vista===n.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:3,borderRadius:2,background:B.teal}}/>}
          {n.badge>0&&<div style={{position:"absolute",top:4,right:"calc(50% - 16px)",background:B.red,color:"#fff",borderRadius:10,width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{n.badge}</div>}
        </button>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    if('serviceWorker' in navigator){
      const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
    }
  </script>
</body>
</html>
