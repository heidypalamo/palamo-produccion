function LogRow({log,onDel}){
  const [exp,setExp]=useState(false);
  const c=CE[log.etapa];
  return(<Card style={{padding:0,overflow:"hidden"}} ch={<><div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:12}} onClick={()=>setExp(!exp)}><div style={{width:36,height:36,borderRadius:10,background:c+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ICONOS[log.etapa]}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}><Badge label={ETIQUETAS[log.etapa]} color={c}/><span style={{color:B.textLight,fontSize:12}}>{log.maquina}</span></div><div style={{color:B.textMid,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{log.producto||log.cliente||"—"} · {log.fecha}</div></div><span style={{color:B.textLight,fontSize:18,transform:exp?"rotate(180deg)":"rotate(0)",display:"inline-block"}}>⌄</span></div>{exp&&(<div style={{borderTop:`1px solid ${B.border}`,padding:"12px 14px",background:B.bg}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>{log.supervisorNombre&&<Pair k="Supervisor" v={log.supervisorNombre.split(" ")[0]}/>}{log.ldpe&&<Pair k="LDPE" v={`${log.ldpe} lbs`}/>}{log.mlldpe&&<Pair k="MLLDPE" v={`${log.mlldpe} lbs`}/>}{log.pelicula&&<Pair k="Película" v={`${log.pelicula} lbs`} color={B.green}/>}{log.desperdicio&&<Pair k="Desperdicio" v={`${log.desperdicio} lbs`} color={B.red}/>}{log.rollosProducidos&&<Pair k="Rollos" v={log.rollosProducidos}/>}{log.bolsasProducidas&&<Pair k="Fundas" v={Number(log.bolsasProducidas).toLocaleString()}/>}{log.desperdicioReciclado&&<Pair k="Entrada" v={`${log.desperdicioReciclado} lbs`}/>}{log.materialRecuperado&&<Pair k="Recuperado" v={`${log.materialRecuperado} lbs`} color={B.green}/>}{log.notas&&<Pair k="Notas" v={log.notas}/>}</div><Btn ch="🗑 Eliminar" fn={()=>onDel(log.id)} color={B.red} outline small/></div>)}</>}/>);

function Login({onLogin}){

}

function Maquinas({regs}){
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Máquinas</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Actividad por máquina</p></div>{[{label:"Extrusoras",mqs:MAQUINAS.extrusion,c:CE.extrusion,i:"⚙️"},{label:"Impresoras",mqs:MAQUINAS.impresion,c:CE.impresion,i:"🖨️"},{label:"Slitters",mqs:MAQUINAS.corte_rollo,c:CE.corte_rollo,i:"✂️"},{label:"Cortadoras",mqs:MAQUINAS.cortadora,c:CE.cortadora,i:"🛠️"},{label:"Reciclaje",mqs:MAQUINAS.reciclaje,c:CE.reciclaje,i:"♻️"}].map(g=>(<Card key={g.label} ch={<><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}><span style={{fontSize:18}}>{g.i}</span><span style={{color:B.textDark,fontSize:15,fontWeight:700}}>{g.label}</span></div><div style={{display:"flex",flexDirection:"column",gap:8}}>{g.mqs.map(m=>{const n=regs.filter(r=>r.maquina===m).length,mx=Math.max(...g.mqs.map(mm=>regs.filter(r=>r.maquina===mm).length),1);return(<div key={m} style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:g.c,fontWeight:800,fontSize:13,width:50,flexShrink:0}}>{m}</span><div style={{flex:1,height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:`${(n/mx)*100}%`,height:"100%",background:g.c,borderRadius:4}}/></div><span style={{color:B.textDark,fontWeight:700,fontSize:14,width:28,textAlign:"right",flexShrink:0}}>{n}</span>{n===0&&<span style={{color:B.textLight,fontSize:10,fontWeight:600}}>IDLE</span>}</div>);})}</div></>}/>))}</div>);
}

function App(){
  const [sup,setSup]=useState(null);
  const [regs,setRegs]=useState([]);
  const [mat,setMat]=useState(MATERIALES_INIT);
  const [movs,setMovs]=useState([]);
  const [vista,setVista]=useState("dashboard");
  if(!sup)return <Login onLogin={setSup}/>;
  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo).length;
  const NAV=[{id:"dashboard",icon:"📊",label:"Inicio"},{id:"registro",icon:"➕",label:"Registrar"},{id:"inventario",icon:"📦",label:"Inventario",badge:alts},{id:"maquinas",icon:"⚙️",label:"Máquinas"}];
  return(<div style={{minHeight:"100dvh",background:B.bg,paddingBottom:80}}>
    <div style={{background:`linear-gradient(135deg,${B.navyDeep},${B.tealDark})`,padding:"env(safe-area-inset-top,0px) 16px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><Logo s={30}/><div><div style={{color:"#fff",fontSize:15,fontWeight:800,lineHeight:1.1}}><span style={{opacity:.5,fontWeight:300}}>p</span>alamo</div><div style={{color:B.tealLight,fontSize:9,fontWeight:700,letterSpacing:1.5}}>PRODUCCIÓN</div></div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{textAlign:"right"}}><div style={{color:"#fff",fontSize:13,fontWeight:700,lineHeight:1.1}}>{sup.nombre.split(" ")[0]}</div><div style={{color:B.tealLight,fontSize:10,fontWeight:600}}>{sup.codigo}</div></div><button onClick={()=>setSup(null)} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"7px 10px",color:"rgba(255,255,255,.8)",fontSize:12,fontWeight:700,cursor:"pointer"}}>Salir</button></div>
      </div>
    </div>
    <div style={{padding:"16px 16px 0"}}>
      {vista==="dashboard"&&<Dashboard regs={regs} mat={mat} setVista={setVista}/>}
      {vista==="registro"&&<Registro sup={sup} regs={regs} setRegs={setRegs} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs}/>}
      {vista==="inventario"&&<Inventario mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} sup={sup}/>}
      {vista==="maquinas"&&<Maquinas regs={regs}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:`1px solid ${B.border}`,paddingBottom:"env(safe-area-inset-bottom,0px)",boxShadow:"0 -2px 16px rgba(0,0,0,.08)"}}>
      <div style={{display:"grid",gridTemplateColumns:`repeat(${NAV.length},1fr)`}}>
        {NAV.map(n=>(<button key={n.id} onClick={()=>setVista(n.id)} style={{background:"none",border:"none",padding:"10px 4px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",position:"relative"}}><span style={{fontSize:22,lineHeight:1}}>{n.icon}</span><span style={{fontSize:10,fontWeight:700,color:vista===n.id?B.teal:B.textLight}}>{n.label}</span>{vista===n.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:28,height:3,borderRadius:2,background:B.teal}}/>}{n.badge>0&&<div style={{position:"absolute",top:6,right:"calc(50% - 18px)",background:B.red,color:"#fff",borderRadius:10,width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{n.badge}</div>}</button>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
